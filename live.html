<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dear Guard · 실시간 장부</title>
<meta property="og:type"        content="website">
<meta property="og:title"       content="Dear Guard · 실시간 장부" id="og-title">
<meta property="og:description" content="디어가드 스마트 축의 운영 시스템" id="og-desc">
<meta name="twitter:title"      content="Dear Guard · 실시간 장부" id="tw-title">
<meta name="twitter:description" content="디어가드 스마트 축의 운영 시스템" id="tw-desc">
<meta property="og:image"       content="https://dear-guard.vercel.app/icon.png">
<meta property="og:image:width" content="512">
<meta property="og:image:height"content="512">
<meta property="og:url"         content="" id="og-url">
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Dear Guard">
<meta name="theme-color" content="#F5F3F0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0EDE8;--bg2:#fff;--bg3:#F9F7F4;--border:#E5E0D8;
  --gold:#B8933A;--gold2:#C7A96B;--text:#111827;--text2:#6B7280;--text3:#9CA3AF;
  --blue:#2563EB;--pink:#DB2777;--green:#059669;--red:#DC2626;
}
html,body{height:100%;background:var(--bg);font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:var(--text);font-size:13px}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:12px}
.spinner{width:32px;height:32px;border:2.5px solid rgba(199,169,107,.2);border-top-color:var(--gold2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-logo{font-family:Georgia,serif;font-size:18px;font-weight:700;color:var(--gold2);letter-spacing:2px}
#error-screen{display:none;position:fixed;inset:0;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:10px;text-align:center;padding:24px}
#error-screen h2{font-size:18px;font-weight:800}
#error-screen p{font-size:13px;color:var(--text3);line-height:1.6}
#app{display:none;height:100vh;flex-direction:column;overflow:hidden}
#hdr{background:var(--bg2);border-bottom:1.5px solid var(--border);padding:10px 16px;flex-shrink:0;display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:stretch}
#hdr-wedding{background:linear-gradient(135deg,#FDF8F0,#FFFAF3);border:1.5px solid #E8D5B0;border-radius:12px;padding:16px 20px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:12px;height:100%}
.wedding-brand{font-family:Georgia,serif;font-size:11px;font-weight:700;color:var(--gold2);letter-spacing:2px;opacity:.8;margin-bottom:6px}
.wedding-names{font-size:32px;font-weight:900;color:#111;letter-spacing:-.5px;margin-bottom:6px;line-height:1.1}
.wedding-info{font-size:16px;font-weight:600;color:#374151;margin-bottom:6px}
.wedding-footer{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:2px}
#mode-badge{font-size:13px;font-weight:700;border-radius:10px;padding:4px 12px;border:1px solid #E0E0E0;color:#9CA3AF;background:#F5F5F5}
.live-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(5,150,105,.08);border:1px solid rgba(5,150,105,.2);border-radius:16px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--green)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.excel-btn{background:#217346;color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.live-stream-btn{display:inline-flex;align-items:center;gap:5px;background:#B9875C;color:#fff;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:800;text-decoration:none;white-space:nowrap;letter-spacing:.3px;transition:background .15s;border:none}
.live-stream-btn:hover{background:#A07248}
#last-upd{font-size:10px;color:var(--text3)}
#hdr-summary{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:8px;align-items:stretch;grid-template-rows:auto auto}
@media(min-width:901px){
  #hdr-summary.single-mode{grid-template-columns:1.4fr 1fr 1fr;grid-template-rows:auto}
  #hdr-summary.single-mode .sum-card.total{grid-row:auto}
  #hdr-summary.single-mode #ticket-sum-card{grid-column:auto}
}
@media(max-width:900px){
  #hdr-summary.single-mode{grid-template-columns:1fr 1fr;grid-template-rows:auto auto}
  #hdr-summary.single-mode .sum-card.total{grid-row:span 2}
  #hdr-summary.single-mode #ticket-sum-card{grid-column:auto}
}
.sum-card{border-radius:10px;padding:10px 14px;display:flex;flex-direction:column;justify-content:center}
.sum-card.total{background:linear-gradient(135deg,#FDF8F0,#FFF5E4);border:1.5px solid #E8D5B0}
.sum-card.groom{background:#EFF6FF;border:1.5px solid #BFDBFE}
.sum-card.bride{background:#FDF2F8;border:1.5px solid #FBCFE8}
.sum-card.ticket{background:#F5F3FF;border:1.5px solid #DDD6FE}
.sum-lbl{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px}
.sum-lbl.gold{color:#A07030}
.sum-lbl.blue{color:#1D4ED8}
.sum-lbl.pink{color:#9D174D}
.sum-lbl.purple{color:#6D28D9}
.sum-val{font-size:22px;font-weight:900;line-height:1;margin-bottom:4px}
.sum-val.gold{color:var(--gold2)}
.sum-val.blue{color:var(--blue);font-size:20px}
.sum-val.pink{color:var(--pink);font-size:20px}
.sum-val.purple{color:#7C3AED}
.sum-sub{font-size:13px;color:var(--text3)}
.sum-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:4px}
#body{flex:1;display:grid;grid-template-columns:380px 1fr;overflow:hidden;min-height:0}
#left-panel{overflow-y:auto;padding:8px;background:#F5F3EF;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:6px;height:100%}
.pcard{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:10px 12px}
.pcard-title{font-size:13px;font-weight:700;color:var(--text3);letter-spacing:.3px;text-transform:uppercase;margin-bottom:8px}
.prow{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #F5F3F0;font-size:13px}
.prow:last-child{border-bottom:none;padding-bottom:0}
.prow-lbl{color:var(--text2)}
.prow-val{font-weight:700;color:var(--text)}
.ho-item{background:var(--bg3);border-radius:6px;padding:7px 9px;margin-bottom:5px;font-size:11px}
.ho-lbl{font-size:9px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.ho-val{font-weight:600;color:var(--text);line-height:1.5;word-break:break-all}
.ho-pw{font-size:22px;font-weight:900;color:var(--gold2);letter-spacing:4px;text-align:center;padding:8px;background:var(--bg3);border-radius:6px;margin-bottom:5px}
.ho-link{display:block;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-size:11px;font-weight:700;color:var(--blue);text-decoration:none;margin-bottom:4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ho-template{display:flex;align-items:center;justify-content:center;gap:5px;background:#FDF8F0;border:1.5px solid #E8D5B0;border-radius:7px;padding:8px;text-decoration:none;color:var(--gold2);font-size:12px;font-weight:700}
.flower-row{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid #F5F3F0;font-size:14px}
.flower-row:last-child{border-bottom:none}
.ops-row{display:flex;gap:6px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #F5F3F0;font-size:13px}
.ops-row:last-child{border-bottom:none}
#center-panel{overflow:hidden;display:flex;flex-direction:column;background:var(--bg2)}
#tbl-ctrl{padding:7px 12px;border-bottom:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px;background:#FAFAF8}
.tbl-ctrl-title{font-size:14px;font-weight:800;color:var(--text);white-space:nowrap}
.ctrl-select{height:30px;border:1.5px solid var(--border);border-radius:6px;padding:0 8px;font-size:12px;background:var(--bg2);color:var(--text);cursor:pointer;outline:none}
.ctrl-select:focus{border-color:var(--gold2)}
.ctrl-input{height:30px;border:1.5px solid var(--border);border-radius:6px;padding:0 8px;font-size:12px;background:var(--bg2);color:var(--text);outline:none;width:120px}
.ctrl-input:focus{border-color:var(--gold2)}
.ctrl-tab{border-radius:14px;padding:4px 12px;font-size:12px;font-weight:700;border:1.5px solid #E0E0E0;background:#F5F5F5;color:#6B7280;cursor:pointer;transition:all .1s;white-space:nowrap}
.ctrl-tab.on{background:#111;color:#fff;border-color:#111}
#tbl-wrap{overflow:hidden;display:flex;flex-direction:column;flex:1;min-height:0}
.tbl-head{display:flex;align-items:center;background:#F5F3EF;border-bottom:2px solid var(--border);flex-shrink:0;font-size:12px;font-weight:700;color:var(--text3)}
.tbl-body{overflow-y:auto;flex:1}
#split-wrap{flex:1;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;min-height:0}
.side-col{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.side-col:last-child{border-right:none}
.side-col-hdr{padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.side-col-hdr.groom{background:#EFF6FF}
.side-col-hdr.bride{background:#FDF2F8}
.side-col-body{overflow-y:auto;flex:1}
.tbl-row{display:flex;align-items:center;border-bottom:1px solid #ECEAE6;font-size:14px;transition:background .1s;min-height:48px}
.tbl-row:hover{background:rgba(199,169,107,.04)}
.tbl-row.new-item{animation:fadeIn .3s ease;background:rgba(199,169,107,.06)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.tc-num{width:42px;flex-shrink:0;padding:7px 5px;text-align:center;font-size:12px;font-weight:700;color:var(--gold2)}
.tc-side{width:40px;flex-shrink:0;padding:6px 4px;text-align:center}
.tc-name{flex:1;min-width:90px;padding:7px 10px;overflow:hidden}
.tc-name-main{font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:17px}
.tc-name-sub{font-size:13px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.tc-amt{width:100px;flex-shrink:0;padding:7px 10px;text-align:right;font-weight:900;color:var(--gold2);font-size:17px}
.tc-tkt{width:90px;flex-shrink:0;padding:7px 6px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.tc-pay{width:62px;flex-shrink:0;padding:7px 5px;text-align:center}
.tc-time{width:54px;flex-shrink:0;padding:7px 5px;text-align:right;font-size:13px;color:var(--text3)}
.th-sort{cursor:pointer;user-select:none}
.th-sort:hover{color:var(--text)}
.th-sort.asc::after{content:" ↑";color:var(--gold2)}
.th-sort.desc::after{content:" ↓";color:var(--gold2)}
.badge-adult{display:inline-block;background:#FEF3C7;color:#D97706;border-radius:4px;padding:3px 7px;font-size:13px;font-weight:700}
.badge-child{display:inline-block;background:#EDE9FE;color:#7C3AED;border-radius:4px;padding:3px 7px;font-size:13px;font-weight:700}
.badge-cash{display:inline-block;background:#D1FAE5;color:#059669;border-radius:4px;padding:3px 8px;font-size:13px;font-weight:700}
.badge-trans{display:inline-block;background:#EDE9FE;color:#7C3AED;border-radius:4px;padding:3px 8px;font-size:13px;font-weight:700}
.badge-side-g{display:inline-block;background:#EFF6FF;color:#2563EB;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700}
.badge-side-b{display:inline-block;background:#FDF2F8;color:#DB2777;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700}
#upd{position:fixed;top:10px;right:10px;background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.25);border-radius:14px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--green);display:none;z-index:50}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}
@media(max-width:900px){
  html,body{height:auto;overflow:auto}
  #app{height:auto;overflow:visible}
  #hdr{grid-template-columns:1fr;padding:8px 10px}
  #hdr-summary{grid-template-columns:1fr 1fr;row-gap:6px}
  #body{grid-template-columns:1fr;height:auto;overflow:visible;display:flex;flex-direction:column}
  #left-panel{display:flex !important}
  #split-wrap{grid-template-columns:1fr}
}
.ho-compact-row{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;margin-bottom:6px}
.ho-compact-row.links{grid-template-columns:1fr 1fr 1fr}
.ho-compact-cell{background:var(--bg3);border-radius:6px;padding:7px 9px;font-size:11px;min-width:0}
.ho-compact-cell .ho-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.ho-compact-cell a.ho-link{display:block;background:transparent;border:none;padding:0;margin:0;font-size:11px;font-weight:700;color:var(--blue);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:900px){
  .tc-name-sub{white-space:normal;overflow:visible;text-overflow:unset;word-break:keep-all;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
  #tbl-ctrl{flex-wrap:wrap;gap:4px 6px;align-items:center}
  #tbl-filter-row{display:flex;align-items:center;gap:6px;width:100%;min-width:0}
  #tbl-filter-row .ctrl-select{flex:0 0 auto}
  #tbl-filter-row .ctrl-input{flex:1;min-width:0;width:auto}
  #tbl-filter-row span[style*="flex:1"]{display:none}
  #tbl-filter-row #tbl-cnt{white-space:nowrap}
}
</style>
</head>
<body>

<div id="loading"><div class="loading-logo">Dear Guard</div><div class="spinner"></div></div>
<div id="error-screen">
  <h2>⚠️ 링크를 확인해주세요</h2>
  <p>유효하지 않은 링크입니다.<br>담당 매니저에게 올바른 링크를 요청해주세요.</p>
</div>

<div id="app">
  <div id="hdr">
    <div id="hdr-wedding" style="text-align:center;justify-content:center">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="wedding-brand" style="text-align:center;margin-bottom:2px">DEAR GUARD</div>
        <div class="wedding-names" id="hdr-names" style="font-size:32px;text-align:center;line-height:1.15">—</div>
        <div style="text-align:center;display:flex;flex-direction:column;gap:4px">
          <div class="wedding-info" id="hdr-info-dt" style="font-size:16px;font-weight:600;color:#374151;line-height:1.4">—</div>
          <div class="wedding-info" id="hdr-info-hall" style="font-size:16px;font-weight:700;color:#C7A96B;line-height:1.4">—</div>
        </div>
      </div>
      <div class="wedding-footer" style="justify-content:center">
        <span id="mode-badge"></span>
        <span class="live-pill"><span class="live-dot"></span>실시간</span>
        <a id="groom-live-btn-1" href="#" target="_blank" class="live-stream-btn" style="display:none;visibility:hidden;width:0;padding:0;margin:0;overflow:hidden"></a>
        <a id="groom-live-btn-2" href="#" target="_blank" class="live-stream-btn" style="display:none;visibility:hidden;width:0;padding:0;margin:0;overflow:hidden"></a>
        <a id="bride-live-btn-1" href="#" target="_blank" class="live-stream-btn" style="display:none;visibility:hidden;width:0;padding:0;margin:0;overflow:hidden"></a>
        <a id="bride-live-btn-2" href="#" target="_blank" class="live-stream-btn" style="display:none;visibility:hidden;width:0;padding:0;margin:0;overflow:hidden"></a>
        <button class="excel-btn" onclick="downloadExcel()">📥 엑셀 다운로드</button>
        <span id="last-upd" style="font-size:11px"></span>
      </div>
    </div>

    <div id="hdr-summary">
      <div class="sum-card total" style="grid-row:span 2;justify-content:space-between">
        <div>
          <div class="sum-lbl gold">총 축의금</div>
          <div class="sum-val gold" style="font-size:42px;white-space:nowrap" id="total-amount">0원</div>
          <div class="sum-sub" id="total-cnt-sub">총 0건</div>
        </div>
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid #E8D5B0">
          <div class="sum-row"><span style="color:#9CA3AF;font-size:13px">💵 현금</span><span style="font-weight:800;color:#059669;font-size:18px" id="cash-cnt">0건</span></div>
          <div class="sum-row"><span style="color:#9CA3AF;font-size:13px">📱 계좌</span><span style="font-weight:800;color:#7C3AED;font-size:18px" id="transfer-cnt">0건</span></div>
        </div>
      </div>
      <div class="sum-card groom" id="groom-sum-card">
        <div class="sum-lbl blue">🤵 신랑측</div>
        <div class="sum-val blue" id="groom-total">0원</div>
        <div class="sum-sub" id="groom-cnt-sub">0건</div>
      </div>
      <div class="sum-card bride" id="bride-sum-card">
        <div class="sum-lbl pink">👰 신부측</div>
        <div class="sum-val pink" id="bride-total">0원</div>
        <div class="sum-sub" id="bride-cnt-sub">0건</div>
      </div>
      <div class="sum-card ticket" style="grid-column:span 2" id="ticket-sum-card">
        <div class="sum-lbl purple" style="margin-bottom:6px">🎫 식권 현황</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="ticket-detail-wrap">
          <div id="ticket-groom-wrap">
            <div style="font-size:12px;font-weight:700;color:#2563EB;margin-bottom:4px">🤵 신랑측</div>
            <div style="display:flex;gap:12px;font-size:15px">
              <span style="color:#6B7280">대인 <strong style="color:#D97706" id="groom-adult-tkt">0</strong></span>
              <span style="color:#6B7280">소인 <strong style="color:#7C3AED" id="groom-child-tkt">0</strong></span>
            </div>
          </div>
          <div id="ticket-bride-wrap">
            <div style="font-size:12px;font-weight:700;color:#DB2777;margin-bottom:4px">👰 신부측</div>
            <div style="display:flex;gap:12px;font-size:15px">
              <span style="color:#6B7280">대인 <strong style="color:#D97706" id="bride-adult-tkt">0</strong></span>
              <span style="color:#6B7280">소인 <strong style="color:#7C3AED" id="bride-child-tkt">0</strong></span>
            </div>
          </div>
        </div>
        <div style="display:none;gap:16px;font-size:13px" id="ticket-single-wrap">
          <span style="color:#6B7280">대인 <strong style="color:#D97706" id="total-adult">0</strong></span>
          <span style="color:#6B7280">소인 <strong style="color:#7C3AED" id="total-child">0</strong></span>
        </div>
      </div>
    </div>
  </div>

  <div id="body">
    <div id="left-panel">
      <div style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:6px;flex-shrink:0" id="live-ho-tab-bar">
        <button id="live-tab-groom" onclick="setLiveHoTab('groom')" style="flex:1;padding:7px 4px;font-size:12px;font-weight:700;border:none;background:none;color:#2563EB;cursor:pointer;border-bottom:2px solid #2563EB;margin-bottom:-2px">🤵 신랑측</button>
        <button id="live-tab-bride" onclick="setLiveHoTab('bride')" style="flex:1;padding:7px 4px;font-size:12px;font-weight:700;border:none;background:none;color:#9CA3AF;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px">👰 신부측</button>
      </div>
      <div id="live-pane-groom" style="display:flex;flex-direction:column;gap:6px">
        <div class="pcard" id="groom-info-card">
          <div class="pcard-title" style="color:#2563EB">🤵 신랑측 운영정보</div>
          <div id="groom-info-body"></div>
        </div>
      </div>
      <div id="live-pane-bride" style="display:none;flex-direction:column;gap:6px">

<script>
const SUPABASE_URL='https://fmvomfjmkbklhaaapkbk.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_3GWkLSDzMFw6FfA_839Ydw_C5F1paf2';
const sb={
  h:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`},
  url:(t,q='')=>`${SUPABASE_URL}/rest/v1/${t}${q}`,
  async get(t,q=''){ const r=await fetch(sb.url(t,q),{headers:sb.h}); if(!r.ok) throw new Error(await r.text()); return r.json(); }
};

let schedule=null,logs=[],opsLogs=[],preShares=[],newIds=new Set();
let currentViewSide='both'; // 'both' | 'groom' | 'bride'
let _sortKey='num',_sortDir='desc',_activeTab='all';

const fmt=n=>n>=10000?Math.round(n/10000)+'만원':n.toLocaleString()+'원';
const fmtFull=n=>n.toLocaleString()+'원';
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtTime=iso=>{const d=new Date(iso);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};
const getToken=()=>new URLSearchParams(location.search).get('t')||'';
const se=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};

// ── viewSide 필터 함수 ──
function getVisibleLogs(){
  if(currentViewSide==='groom') return logs.filter(l=>l.side==='신랑측');
  if(currentViewSide==='bride') return logs.filter(l=>l.side==='신부측');
  return logs;
}
function getVisibleOpsLogs(){
  if(currentViewSide==='groom') return opsLogs.filter(l=>l.side==='신랑측');
  if(currentViewSide==='bride') return opsLogs.filter(l=>l.side==='신부측');
  return opsLogs.filter(l=>l.side!=='_internal');
}
function getVisiblePreShares(){
  if(currentViewSide==='groom') return preShares.filter(t=>t.side==='신랑측');
  if(currentViewSide==='bride') return preShares.filter(t=>t.side==='신부측');
  return preShares;
}

// ── 운영정보 측별 탭 ──
var _liveHoTab='groom';
function setLiveHoTab(side){
  _liveHoTab=side;
  var tg=document.getElementById('live-tab-groom');
  var tb=document.getElementById('live-tab-bride');
  var pg=document.getElementById('live-pane-groom');
  var pb=document.getElementById('live-pane-bride');
  var blue='#2563EB',pink='#DB2777',gray='#9CA3AF';
  if(tg){tg.style.color=(side==='groom')?blue:gray;tg.style.borderBottomColor=(side==='groom')?blue:'transparent';}
  if(tb){tb.style.color=(side==='bride')?pink:gray;tb.style.borderBottomColor=(side==='bride')?pink:'transparent';}
  if(pg) pg.style.display=(side==='groom')?'flex':'none';
  if(pb) pb.style.display=(side==='bride')?'flex':'none';
  if(window.innerWidth<=900) renderOpsList();
}

async function init(){
  const token=getToken();
  if(!token){showError();return;}
  try{
    let rows=await sb.get('schedules',`?dashboard_token=eq.${encodeURIComponent(token)}`);
    let viewSide='both';
    if(!rows.length){
      rows=await sb.get('schedules',`?groom_token=eq.${encodeURIComponent(token)}`);
      if(rows.length) viewSide='groom';
    }
    if(!rows.length){
      rows=await sb.get('schedules',`?bride_token=eq.${encodeURIComponent(token)}`);
      if(rows.length) viewSide='bride';
    }
    if(!rows.length) throw new Error('not found');
    schedule=rows[0];
    currentViewSide=viewSide; // ★ 전역 저장

    const g=(schedule.groom_name||'').trim(),b=(schedule.bride_name||'').trim();
    let displayTitle;
    if(viewSide==='groom')      displayTitle=g?`${g} 신랑측 실시간 장부`:'신랑측 실시간 장부';
    else if(viewSide==='bride') displayTitle=b?`${b} 신부측 실시간 장부`:'신부측 실시간 장부';
    else{
      const names=(g&&b)?`${g} ♥ ${b}`:g?`${g} 신랑측`:b?`${b} 신부측`:schedule.hall||'—';
      displayTitle=`${names} · 실시간 장부`;
    }
    const displayDesc='디어가드 스마트 축의 운영 시스템';
    const names=(g&&b)?`${g} ♥ ${b}`:g?`${g} 신랑측`:b?`${b} 신부측`:schedule.hall||'—';
    se('hdr-names',names);
    const _d=new Date((schedule.date||'')+'T00:00:00');
    const _days=['일','월','화','수','목','금','토'];
    const _day=schedule.date?` (${_days[_d.getDay()]})`:'';
    document.getElementById('hdr-info-dt').textContent=`${schedule.date||''}${_day} · ${(schedule.time||'').slice(0,5)}`;
    document.getElementById('hdr-info-hall').textContent=schedule.hall||'';
    document.title=displayTitle;
    const setMeta=(id,val)=>{const el=document.getElementById(id);if(el)el.setAttribute('content',val);};
    setMeta('og-title',displayTitle);setMeta('og-desc',displayDesc);
    setMeta('tw-title',displayTitle);setMeta('tw-desc',displayDesc);
    setMeta('og-url',location.href);

    // ★ 개별 토큰 접속 시 반대측 탭 숨김
    if(currentViewSide==='groom'){
      const tb=document.getElementById('live-tab-bride');
      if(tb) tb.style.display='none';
    } else if(currentViewSide==='bride'){
      const tg=document.getElementById('live-tab-groom');
      if(tg) tg.style.display='none';
      setLiveHoTab('bride');
    }

    await loadLogs();
    renderHandover();
    applyWeddingMode();
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    subscribeRealtime();
    setInterval(()=>{loadLogs();},8000);
  }catch(e){console.error('[DG]',e);showError();}
}

function showError(){
  document.getElementById('loading').style.display='none';
  document.getElementById('error-screen').style.display='flex';
}

async function loadLogs(){
  if(!schedule)return;
  try{
    const [nl,no,np]=await Promise.all([
      sb.get('contribution_logs',`?schedule_id=eq.${schedule.id}&order=created_at.desc`),
      sb.get('operation_logs',`?schedule_id=eq.${schedule.id}&order=created_at.desc`),
      sb.get('ticket_additions',`?schedule_id=eq.${schedule.id}&type=eq.pre_share`)
    ]);
    const oldIds=new Set(logs.map(l=>l.id));
    nl.forEach(l=>{if(!oldIds.has(l.id))newIds.add(l.id);});
    logs=nl;opsLogs=no;preShares=np;
    renderStats();renderList();renderOpsList();applyWeddingMode();renderHandover();
    showUpdBadge();
    se('last-upd','갱신 '+fmtTime(new Date().toISOString()));
  }catch(e){console.error('[DG] loadLogs',e);}
}

function renderStats(){
  const vLogs=getVisibleLogs();
  const vShares=getVisiblePreShares();
  const total=vLogs.reduce((s,l)=>s+(l.amount||0),0);
  const gL=vLogs.filter(l=>l.side==='신랑측'),bL=vLogs.filter(l=>l.side==='신부측');
  se('total-amount',fmt(total));
  se('total-cnt-sub','총 '+vLogs.length+'건');
  se('cash-cnt',vLogs.filter(l=>l.payment_type==='현금').length+'건');
  se('transfer-cnt',vLogs.filter(l=>l.payment_type==='계좌이체').length+'건');
  se('groom-total',fmt(gL.reduce((s,l)=>s+(l.amount||0),0)));
  se('bride-total',fmt(bL.reduce((s,l)=>s+(l.amount||0),0)));
  se('groom-cnt-sub',gL.length+'건');
  se('bride-cnt-sub',bL.length+'건');
  const gAdultTkt=vLogs.filter(l=>l.side==='신랑측').reduce((s,l)=>s+(l.adult_ticket||0),0);
  const gChildTkt=vLogs.filter(l=>l.side==='신랑측').reduce((s,l)=>s+(l.child_ticket||0),0);
  const bAdultTkt=vLogs.filter(l=>l.side==='신부측').reduce((s,l)=>s+(l.adult_ticket||0),0);
  const bChildTkt=vLogs.filter(l=>l.side==='신부측').reduce((s,l)=>s+(l.child_ticket||0),0);
  const gPreShare=vShares.filter(t=>t.side==='신랑측').reduce((s,t)=>s+(t.amount||0),0);
  const bPreShare=vShares.filter(t=>t.side==='신부측').reduce((s,t)=>s+(t.amount||0),0);
  const gUsedTotal=gAdultTkt+gChildTkt+gPreShare;
  const bUsedTotal=bAdultTkt+bChildTkt+bPreShare;
  const totalAdult=vLogs.reduce((s,l)=>s+(l.adult_ticket||0),0);
  const totalChild=vLogs.reduce((s,l)=>s+(l.child_ticket||0),0);
  se('total-adult',totalAdult+gPreShare+bPreShare);
  se('total-child',totalChild);
  se('groom-adult-tkt',gUsedTotal);
  se('groom-child-tkt',gChildTkt);
  se('bride-adult-tkt',bUsedTotal);
  se('bride-child-tkt',bChildTkt);
  const mode=schedule?schedule.wedding_mode||'양측':'양측';
  const ticketDetail=document.getElementById('ticket-detail-wrap');
  const ticketSingle=document.getElementById('ticket-single-wrap');
  const groomWrap=document.getElementById('ticket-groom-wrap');
  const brideWrap=document.getElementById('ticket-bride-wrap');
  if(ticketDetail&&ticketSingle){
    if(mode==='단측'){
      ticketDetail.style.display='none';ticketSingle.style.display='flex';
    } else {
      ticketDetail.style.display='grid';ticketSingle.style.display='none';
      const hasG=vLogs.some(l=>l.side==='신랑측');
      const hasB=vLogs.some(l=>l.side==='신부측');
      if(groomWrap) groomWrap.style.display=(hasG||(!hasG&&!hasB))?'':'none';
      if(brideWrap) brideWrap.style.display=hasB?'':'none';
    }
  }
}

var _groomSideSort='num_desc';
var _brideSideSort='num_desc';
function setSideSort(val,side){
  if(side==='groom') _groomSideSort=val;
  else if(side==='bride') _brideSideSort=val;
  renderList();
}
function applySideSort(arr,side){
  var sort=(side==='bride')?_brideSideSort:_groomSideSort;
  var sorted=arr.slice();
  sorted.sort(function(a,b){
    if(sort==='num_desc') return (b.seq||0)-(a.seq||0);
    if(sort==='num_asc')  return (a.seq||0)-(b.seq||0);
    if(sort==='amt_desc') return (b.amount||0)-(a.amount||0);
    if(sort==='amt_asc')  return (a.amount||0)-(b.amount||0);
    if(sort==='name_asc') return (a.guest_name||'').localeCompare(b.guest_name||'','ko');
    return 0;
  });
  return sorted;
}
function sortTbl(key){
  if(_sortKey===key){_sortDir=_sortDir==='asc'?'desc':'asc';}
  else{_sortKey=key;_sortDir=key==='num'?'desc':'asc';}
  ['num','name','amt','tkt','time'].forEach(k=>{
    const el=document.getElementById('th-'+k);
    if(!el)return;
    el.className=el.className.replace(/ asc| desc/g,'');
    if(_sortKey===k)el.className+=' '+_sortDir;
  });
  renderList();
}
function applySort(arr){
  return arr.slice().sort((a,b)=>{
    let va,vb;
    if(_sortKey==='num'){va=a.seq||0;vb=b.seq||0;}
    else if(_sortKey==='name'){va=a.guest_name||'';vb=b.guest_name||'';}
    else if(_sortKey==='amt'){va=a.amount||0;vb=b.amount||0;}
    else if(_sortKey==='tkt'){va=(a.adult_ticket||0)+(a.child_ticket||0);vb=(b.adult_ticket||0)+(b.child_ticket||0);}
    else if(_sortKey==='time'){va=a.created_at||'';vb=b.created_at||'';}
    else{va=0;vb=0;}
    if(va<vb)return _sortDir==='asc'?-1:1;
    if(va>vb)return _sortDir==='asc'?1:-1;
    return 0;
  });
}
function setListTab(tab){
  _activeTab=tab;
  ['all','groom','bride'].forEach(k=>{
    const el=document.getElementById('tab-'+k);
    if(el){el.className=el.className.replace(' on','');if(k===tab)el.className+=' on';}
  });
  renderList();
}
function getFiltered(side){
  const pay=(document.getElementById('f-pay')||{}).value||'';
  const q=((document.getElementById('f-search')||{}).value||'').trim().toLowerCase();
  return getVisibleLogs().filter(l=>{
    if(side&&l.side!==side)return false;
    if(pay&&l.payment_type!==pay)return false;
    if(q&&!(l.guest_name||'').toLowerCase().includes(q)&&!(l.relation||'').toLowerCase().includes(q))return false;
    return true;
  });
}
function buildRow(l,showSide,sideIndex,sideTotal,overrideNum){
  const num=overrideNum!==undefined?overrideNum:(l.seq||(sideIndex!==undefined?sideTotal-sideIndex:getVisibleLogs().length-getVisibleLogs().indexOf(l)));
  const isNew=newIds.has(l.id);
  const adultT=l.adult_ticket||0,childT=l.child_ticket||0;
  const tktHtml=(adultT>0?`<span class="badge-adult">대${adultT}</span>`:'')+
                (childT>0?`<span class="badge-child">소${childT}</span>`:'');
  const payBadge=l.payment_type==='계좌이체'?'<span class="badge-trans">계좌</span>':'<span class="badge-cash">현금</span>';
  const sideBadge=l.side==='신랑측'?'<span class="badge-side-g">신랑</span>':'<span class="badge-side-b">신부</span>';
  const name=esc(l.guest_name||'—');
  const rel=l.relation?`<span style="color:var(--text3);font-weight:400;font-size:10px"> ${esc(l.relation)}</span>`:'';
  const memo=l.memo?`<div class="tc-name-sub">${esc(l.memo)}</div>`:'';
  const time=l.created_at?fmtTime(l.created_at):'';
  return `<div class="tbl-row${isNew?' new-item':''}">
    <div class="tc-num">#${num}</div>
    ${showSide?`<div class="tc-side">${sideBadge}</div>`:''}
    <div class="tc-name"><div class="tc-name-main">${name}${rel}</div>${memo}</div>
    <div class="tc-amt">${l.amount?fmt(l.amount):'<span style="color:#D1D5DB">—</span>'}</div>
    <div class="tc-tkt">${tktHtml||'<span style="color:#D1D5DB">—</span>'}</div>
    <div class="tc-pay">${payBadge}</div>
    <div class="tc-time">${time}</div>
  </div>`;
}
function renderList(){
  const vLogs=getVisibleLogs();
  const gLogs=vLogs.filter(l=>l.side==='신랑측');
  const bLogs=vLogs.filter(l=>l.side==='신부측');
  const hasG=gLogs.length>0,hasB=bLogs.length>0;
  const both=hasG&&hasB&&currentViewSide==='both';
  const singleHdr=document.getElementById('single-tbl-hdr');
  const singleBody=document.getElementById('single-tbl-body');
  const splitWrap=document.getElementById('split-wrap');
  const tabBar=document.getElementById('tab-bar');
  if(tabBar) tabBar.style.display=both?'flex':'none';
  if(both&&_activeTab==='all'){
    if(singleHdr)singleHdr.style.display='none';
    if(singleBody)singleBody.style.display='none';
    if(splitWrap)splitWrap.style.display='grid';
    const gF=applySort(getFiltered('신랑측'));
    const bF=applySort(getFiltered('신부측'));
    se('groom-sum',gF.length+'건 · '+fmtFull(gF.reduce((s,l)=>s+(l.amount||0),0)));
    se('bride-sum',bF.length+'건 · '+fmtFull(bF.reduce((s,l)=>s+(l.amount||0),0)));
    const gEl=document.getElementById('groom-list');
    const bEl=document.getElementById('bride-list');
    const gFS=applySideSort(gF,'groom');
    if(gEl)gEl.innerHTML=gFS.length?gFS.map((l,i)=>buildRow(l,false,i,gFS.length,l.seq||gFS.length-i)).join(''):`<div style="text-align:center;padding:20px;font-size:12px;color:var(--text3)">접수 내역 없음</div>`;
    const bFS=applySideSort(bF,'bride');
    if(bEl)bEl.innerHTML=bFS.length?bFS.map((l,i)=>buildRow(l,false,i,bFS.length,l.seq||bFS.length-i)).join(''):`<div style="text-align:center;padding:20px;font-size:12px;color:var(--text3)">접수 내역 없음</div>`;
  } else {
    if(splitWrap)splitWrap.style.display='none';
    if(singleHdr)singleHdr.style.display='flex';
    if(singleBody)singleBody.style.display='block';
    const side=_activeTab==='groom'?'신랑측':_activeTab==='bride'?'신부측':'';
    const filt=applySort(getFiltered(side));
    se('tbl-cnt',filt.length+'건');
    const showSide=!side&&both;
    const thSide=document.getElementById('th-side');
    if(thSide)thSide.style.display=showSide?'':'none';
    if(singleBody){
      const grpCount={};
      filt.forEach(l=>{grpCount[l.side]=(grpCount[l.side]||0)+1;});
      const grpIdx={};
      const isAscSort=(_sortKey==='num'&&_sortDir==='asc');
      singleBody.innerHTML=filt.length?filt.map(l=>{
        grpIdx[l.side]=(grpIdx[l.side]||0);
        const si=grpIdx[l.side];
        const st=grpCount[l.side];
        grpIdx[l.side]++;
        const num=l.seq||(isAscSort?si+1:st-si);
        return buildRow(l,showSide,si,st,num);
      }).join(''):`<div style="text-align:center;padding:30px;font-size:12px;color:var(--text3)">접수 내역 없음</div>`;
    }
  }
  setTimeout(()=>newIds.clear(),2500);
}
function renderOpsList(){
  const el=document.getElementById('ops-list');

    el.innerHTML='<div style="text-align:center;padding:10px;font-size:11px;color:var(--text3)">메모 없음</div>';

  }
  const gLogs=vOps.filter(l=>l.side==='신랑측');
  const bLogs=vOps.filter(l=>l.side==='신부측');
  function buildRows(list){
    if(!list.length) return '<div style="font-size:11px;color:var(--text3);padding:3px 0 5px">없음</div>';

    const filteredLogs=vOps.filter(l=>l.side===currentSide);
    const sideColor=currentSide==='신랑측'?'#2563EB':'#DB2777';
    const sideIcon=currentSide==='신랑측'?'🤵':'👰';
    el.innerHTML='<div style="font-size:11px;font-weight:700;color:'+sideColor+';padding:4px 0 3px">'+sideIcon+' '+currentSide+'</div>'+buildRows(filteredLogs);
  } else {
    // 개별 토큰이면 해당 측만 표시
    if(currentViewSide==='groom'){
      el.innerHTML='<div style="font-size:11px;font-weight:700;color:#2563EB;padding:4px 0 3px">🤵 신랑측</div>'+buildRows(gLogs);
    } else if(currentViewSide==='bride'){
      el.innerHTML='<div style="font-size:11px;font-weight:700;color:#DB2777;padding:4px 0 3px">👰 신부측</div>'+buildRows(bLogs);
    } else {
      el.innerHTML=
        '<div style="font-size:11px;font-weight:700;color:#2563EB;padding:4px 0 3px">🤵 신랑측</div>'+buildRows(gLogs)+
        '<div style="font-size:11px;font-weight:700;color:#DB2777;padding:7px 0 3px;border-top:1px solid #F0EDE8;margin-top:2px">👰 신부측</div>'+buildRows(bLogs);
    }
  }
}

function applyWeddingMode(){
  if(!schedule)return;
  const mode=schedule.wedding_mode||'양측';
  const modeEl=document.getElementById('mode-badge');
  if(modeEl){
    const ml={'단측':'단측 진행','양측':'양측 진행','양측통합':'양측통합 진행'}[mode]||mode;
    const mc={'단측':'#D97706','양측':'#2563EB','양측통합':'#059669'}[mode]||'#9CA3AF';
    modeEl.textContent=ml;modeEl.style.color=mc;modeEl.style.background=mc+'15';modeEl.style.borderColor=mc+'40';
  }
  const vL=getVisibleLogs();
  const hasG=vL.some(l=>l.side==='신랑측'),hasB=vL.some(l=>l.side==='신부측');
  const isMobile=window.innerWidth<=900;
  const summary=document.getElementById('hdr-summary');
  const gCard=document.getElementById('groom-sum-card'),bCard=document.getElementById('bride-sum-card');
  const ticketCard=document.getElementById('ticket-sum-card');
  const totalCard=summary?summary.querySelector('.sum-card.total'):null;
  const groomWrap=document.getElementById('ticket-groom-wrap'),brideWrap=document.getElementById('ticket-bride-wrap');
  const ticketDetail=document.getElementById('ticket-detail-wrap');
  const ticketSingle=document.getElementById('ticket-single-wrap');
  if(mode==='단측'){
    if(summary) summary.classList.add('single-mode');
    if(gCard) gCard.style.display=(currentViewSide!=='bride'&&(hasG||(!hasG&&!hasB)))?'':'none';
    if(bCard) bCard.style.display=(currentViewSide!=='groom'&&hasB)?'':'none';
    if(!isMobile){
      if(totalCard){totalCard.style.gridRow='';totalCard.style.justifyContent='center';}
      if(ticketCard){ticketCard.style.gridColumn='';}
    }
    if(isMobile){
      if(totalCard) totalCard.style.gridRow='span 2';
      if(ticketCard) ticketCard.style.gridColumn='';
      if(groomWrap) groomWrap.style.display=(currentViewSide!=='bride'&&(hasG||(!hasG&&!hasB)))?'':'none';
      if(brideWrap) brideWrap.style.display=(currentViewSide!=='groom'&&hasB)?'':'none';
    }
    if(ticketDetail) ticketDetail.style.display='none';
    if(ticketSingle) ticketSingle.style.display='flex';
  } else {
    // ★ 개별 토큰 접속이면 single-mode 적용 (1줄 3칸 레이아웃)
    const isSingleView = currentViewSide==='groom' || currentViewSide==='bride';
    if(summary){
      if(isSingleView) summary.classList.add('single-mode');
      else summary.classList.remove('single-mode');
    }
    // ★ 개별 토큰이면 반대측 요약 카드 숨김
    if(gCard) gCard.style.display=currentViewSide==='bride'?'none':'';
    if(bCard) bCard.style.display=currentViewSide==='groom'?'none':'';
    if(groomWrap) groomWrap.style.display=currentViewSide==='bride'?'none':'';
    if(brideWrap) brideWrap.style.display=currentViewSide==='groom'?'none':'';
    if(isSingleView){
      // single-mode: 총축의금 span 제거, 식권 span 제거 → 1줄 3칸
      if(totalCard){totalCard.style.gridRow='';totalCard.style.justifyContent='center';}
      if(ticketCard){ticketCard.style.gridColumn='';}
    } else {
      if(totalCard){totalCard.style.gridRow='span 2';totalCard.style.justifyContent='space-between';}
      if(ticketCard) ticketCard.style.gridColumn='span 2';
    }
  }
}

function subscribeRealtime(){
  const ws=new WebSocket(`wss://fmvomfjmkbklhaaapkbk.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_ANON_KEY}&vsn=1.0.0`);
  ws.onopen=()=>{
    ws.send(JSON.stringify({topic:`realtime:public:contribution_logs:schedule_id=eq.${schedule.id}`,event:'phx_join',payload:{},ref:'1'}));
    ws.send(JSON.stringify({topic:`realtime:public:operation_logs:schedule_id=eq.${schedule.id}`,event:'phx_join',payload:{},ref:'2'}));
    // schedules 인계정보 변경 실시간 수신 (contribution.html saveHandover 반영)
    ws.send(JSON.stringify({topic:`realtime:public:schedules:id=eq.${schedule.id}`,event:'phx_join',payload:{},ref:'3'}));
  };
  ws.onmessage=async e=>{
    try{
      const msg=JSON.parse(e.data);
      const evtType=msg.event||(msg.payload&&msg.payload.type)||'';
      const isMutation=['INSERT','UPDATE','DELETE'].includes(evtType)||['INSERT','UPDATE','DELETE'].includes(msg.payload&&msg.payload.type);
      if(!isMutation)return;
      const topic=msg.topic||'';
      if(topic.includes('operation_logs')){
        const fresh=await sb.get('operation_logs',`?schedule_id=eq.${schedule.id}&order=created_at.desc`);
        opsLogs=fresh;renderOpsList();
      } else if(topic.includes('schedules')){
        // schedules 업데이트 → 인계정보 재fetch 후 화면 갱신
        const freshRows=await sb.get('schedules',`?id=eq.${schedule.id}`);
        if(freshRows&&freshRows.length){
          Object.assign(schedule,freshRows[0]);
          renderHandover();
        }
      } else {
        await loadLogs();
      }
    }catch(e){console.error('[DG] realtime error',e);}
  };
  ws.onclose=()=>setTimeout(subscribeRealtime,3000);
}
function downloadExcel(){
  if(!schedule)return;
  const g=(schedule.groom_name||'').trim(),b=(schedule.bride_name||'').trim();
  const nm=(g&&b)?g+' ♥ '+b:(g||b||schedule.hall||'예식');
  const dt=schedule.date||new Date().toISOString().slice(0,10);
  const wb=XLSX.utils.book_new();
  const vLogs=getVisibleLogs();
  const vOps=getVisibleOpsLogs();
  const gL=vLogs.filter(l=>l.side==='신랑측');
  const bL=vLogs.filter(l=>l.side==='신부측');
  const hasChild=vLogs.some(l=>(l.child_ticket||0)>0);
  const money=v=>({v:v||0,t:'n',z:'#,##0'});
  const gOps=vOps.filter(l=>l.side==='신랑측'||!l.side);
  const bOps=vOps.filter(l=>l.side==='신부측');
  const summaryHeader=['구분','건수','금액(원)','대인식권'];
  if(hasChild) summaryHeader.push('소인식권');
  const summaryRows=[['Dear Guard 축의 정산 요약'],[],summaryHeader];
  function makeSummaryRow(label,list){
    const row=[label,list.length,money(list.reduce((s,l)=>s+(l.amount||0),0)),list.reduce((s,l)=>s+(l.adult_ticket||0),0)];
    if(hasChild) row.push(list.reduce((s,l)=>s+(l.child_ticket||0),0));
    return row;
  }
  summaryRows.push(makeSummaryRow('전체',vLogs));
  if(currentViewSide!=='bride') summaryRows.push(makeSummaryRow('신랑측',gL));
  if(currentViewSide!=='groom') summaryRows.push(makeSummaryRow('신부측',bL));
  if(gOps.length){summaryRows.push([]);summaryRows.push(['[신랑측 운영메모]']);summaryRows.push(['시간','내용']);gOps.forEach(l=>summaryRows.push([l.time_str||'',l.content||'']));}
  if(bOps.length){summaryRows.push([]);summaryRows.push(['[신부측 운영메모]']);summaryRows.push(['시간','내용']);bOps.forEach(l=>summaryRows.push([l.time_str||'',l.content||'']));}
  summaryRows.push([]);
  summaryRows.push(['※ 안내사항']);
  summaryRows.push(['※ 관계는 디어가드가 직접 입력하는 값이 아니며, 필요한 경우 신랑·신부님이 별도로 확인·정리해 주세요.']);
  summaryRows.push(['   예: 친구, 직장동료, 친척, 부모님 지인']);
  const ws0=XLSX.utils.aoa_to_sheet(summaryRows);
  ws0['!cols']=[{wch:12},{wch:8},{wch:14},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws0,'전체 요약');
  function makeSideSheet(list){
    const header=['번호','결제방식','하객이름','금액(원)','대인식권'];
    if(hasChild) header.push('소인식권');
    header.push('메모','관계','접수시간');
    const rows=[header];
    const sorted=[...list].sort((a,b)=>(a.seq||999999)-(b.seq||999999));
    sorted.forEach((l,i)=>{
      const row=[l.seq||i+1,l.payment_type||'',l.guest_name||'',money(l.amount||0),l.adult_ticket||0];
      if(hasChild) row.push(l.child_ticket||0);
      row.push(l.memo||'',l.relation||'',l.created_at?fmtTime(l.created_at):'');
      rows.push(row);
    });
    rows.push([]);
    const sumRow=['합계','','',money(list.reduce((s,l)=>s+(l.amount||0),0)),list.reduce((s,l)=>s+(l.adult_ticket||0),0)];
    if(hasChild) sumRow.push(list.reduce((s,l)=>s+(l.child_ticket||0),0));
    sumRow.push('','','');
    rows.push(sumRow);
    const ws=XLSX.utils.aoa_to_sheet(rows);
    const cols=[{wch:6},{wch:10},{wch:12},{wch:12},{wch:8}];
    if(hasChild) cols.push({wch:8});
    cols.push({wch:20},{wch:10},{wch:8});
    ws['!cols']=cols;
    const lastCol=String.fromCharCode(64+header.length);
    ws['!autofilter']={ref:'A1:'+lastCol+'1'};
    return ws;
  }
  // ★ 개별 토큰이면 해당 측 시트만 생성
  if(currentViewSide!=='bride') XLSX.utils.book_append_sheet(wb,makeSideSheet(gL),'신랑측');
  if(currentViewSide!=='groom') XLSX.utils.book_append_sheet(wb,makeSideSheet(bL),'신부측');
  XLSX.writeFile(wb,'축의접수_'+nm+'_'+dt+'.xlsx');
}
