<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dear Guard · 실시간 현황</title>

<!-- Favicon / 앱 아이콘 -->
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dear Guard">
<meta name="theme-color" content="#F5F3F0">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F3F0;
  --bg2:#FFFFFF;
  --bg3:#F9F7F4;
  --border:rgba(0,0,0,.08);
  --gold:#B8933A;
  --gold2:#C7A96B;
  --text:#111827;
  --text2:#6B7280;
  --text3:#9CA3AF;
  --blue:#2563EB;
  --pink:#DB2777;
  --green:#059669;
  --red:#DC2626;
}
html,body{height:100%}
body{
  font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;
  min-height:100vh;
}

/* ── 로딩 ── */
#loading{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;gap:14px;
}
.spinner{
  width:36px;height:36px;
  border:2.5px solid rgba(199,169,107,.25);
  border-top-color:var(--gold);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-logo{font-family:Georgia,serif;font-size:20px;font-weight:700;color:var(--gold2);letter-spacing:2px}
.loading-sub{font-size:12px;color:var(--text3)}

/* ── 에러 ── */
#error-screen{
  display:none;position:fixed;inset:0;background:var(--bg);
  align-items:center;justify-content:center;flex-direction:column;
  gap:10px;text-align:center;padding:24px;
}
#error-screen h2{font-size:18px;font-weight:800;color:var(--text)}
#error-screen p{font-size:13px;color:var(--text3);line-height:1.6}

/* ── 메인 ── */
#dashboard{display:none;max-width:860px;margin:0 auto;padding:20px 16px 48px}

/* 헤더 */
.hdr{text-align:center;margin-bottom:24px;padding-top:4px;position:relative}
.hdr-brand{
  font-family:Georgia,serif;font-size:11px;font-weight:700;
  color:var(--gold2);letter-spacing:3px;margin-bottom:10px;opacity:.9;
}
.hdr-names{font-size:26px;font-weight:900;color:var(--text);letter-spacing:-.5px;margin-bottom:5px;line-height:1.2}
.hdr-info{font-size:12px;color:var(--text3);margin-bottom:10px}
.live-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(5,150,105,.08);border:1px solid rgba(5,150,105,.2);
  border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:#059669;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:#059669;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* 구분선 */
.divider{height:1px;background:#E5E7EB;margin:18px 0}

/* ── 총합 히어로 카드 ── */
.hero{
  background:linear-gradient(135deg,#FDF8F0,#FFF5E4);
  border:1.5px solid #E8D5B0;
  border-radius:18px;padding:22px 24px;text-align:center;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:160px;height:160px;
  background:radial-gradient(circle,rgba(199,169,107,.15),transparent 65%);
  border-radius:50%;pointer-events:none;
}
.hero-lbl{font-size:11px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.hero-val{font-size:40px;font-weight:900;color:var(--gold);letter-spacing:-1px;line-height:1}
.hero-sub{font-size:12px;color:var(--text3);margin-top:6px}

/* ── 그리드 ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:500px){
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(2,1fr)}
}

/* ── 카드 ── */
.card{
  background:#fff;border:1.5px solid #E5E7EB;
  border-radius:14px;padding:16px;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.card.blue-tint{border-color:rgba(37,99,235,.12);background:rgba(37,99,235,.03)}
.card.pink-tint{border-color:rgba(219,39,119,.12);background:rgba(219,39,119,.03)}
.card-lbl{font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.card-val{font-size:22px;font-weight:900;color:var(--text);line-height:1}
.card-val.gold{color:var(--gold)}
.card-val.blue{color:var(--blue)}
.card-val.pink{color:var(--pink)}
.card-val.green{color:var(--green)}
.card-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* ── 측별 섹션 ── */
.side-wrap{margin-bottom:14px}
.side-header{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
  padding-bottom:10px;border-bottom:1px solid #E5E7EB;
}
.side-emoji{font-size:20px}
.side-name{font-size:15px;font-weight:800;color:var(--text)}
.side-total{margin-left:auto;font-size:20px;font-weight:900}
.side-total.blue{color:var(--blue)}
.side-total.pink{color:var(--pink)}

.side-card{background:#fff;border:1.5px solid #E5E7EB;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.04)}

.sub-stat{text-align:center}
.sub-stat-lbl{font-size:10px;color:var(--text3);margin-bottom:4px}
.sub-stat-val{font-size:18px;font-weight:800;color:var(--text)}

/* ── 미니 통계 ── */
.mini-card{background:#fff;border:1.5px solid #E5E7EB;border-radius:12px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.mini-lbl{font-size:10px;color:var(--text3);letter-spacing:.4px;margin-bottom:4px}
.mini-val{font-size:18px;font-weight:800;color:var(--text)}

/* ── 접수 리스트 ── */
.list-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.list-title{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}
.list-cnt{font-size:11px;color:var(--text3)}

.log-item{
  display:flex;align-items:center;gap:11px;
  padding:11px 13px;
  background:#fff;border:1px solid #E5E7EB;
  border-radius:11px;margin-bottom:7px;
  transition:border-color .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.log-item.new-item{border-color:rgba(199,169,107,.35);animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

.log-side-icon{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.log-side-icon.groom{background:rgba(37,99,235,.08)}
.log-side-icon.bride{background:rgba(219,39,119,.08)}

.log-body{flex:1;min-width:0}
.log-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-meta{font-size:11px;color:var(--text3);margin-top:2px}

.log-right{text-align:right;flex-shrink:0}
.log-amount{font-size:13px;font-weight:800;color:var(--gold)}
.log-time{font-size:10px;color:var(--text3);margin-top:2px}

.empty-list{text-align:center;padding:32px;color:var(--text3);font-size:13px}

/* 양측 분리 리스트 */
.split-list-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:0}
@media(max-width:600px){.split-list-wrap{grid-template-columns:1fr;gap:12px}}

.split-col{display:flex;flex-direction:column;gap:8px}

.split-header{border-radius:12px;padding:13px 15px;margin-bottom:4px}
.groom-header{background:linear-gradient(135deg,rgba(37,99,235,.06),rgba(37,99,235,.02));border:1.5px solid rgba(37,99,235,.15)}
.bride-header{background:linear-gradient(135deg,rgba(219,39,119,.06),rgba(219,39,119,.02));border:1.5px solid rgba(219,39,119,.15)}

.split-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:5px}
.split-summary{font-size:12px;color:var(--text3);line-height:1.6}
.split-summary span{font-weight:700;color:var(--text)}

.split-log-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 11px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.split-log-body{flex:1;min-width:0}
.split-log-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.split-log-meta{font-size:10px;color:var(--text3);margin-top:2px}
.split-log-right{text-align:right;flex-shrink:0}
.split-log-amount{font-size:12px;font-weight:800;color:var(--gold2)}
.split-log-time{font-size:10px;color:var(--text3);margin-top:1px}

.ops-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 13px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;margin-bottom:6px;
}
.ops-time{font-size:11px;font-weight:700;color:var(--gold2);white-space:nowrap;margin-top:1px;flex-shrink:0}
.ops-text{font-size:13px;color:var(--text);line-height:1.5;flex:1}
.ops-by{font-size:10px;color:var(--text3);white-space:nowrap;margin-top:2px;flex-shrink:0}

/* ── 갱신 표시 ── */
#upd-badge{
  position:fixed;top:14px;right:14px;
  background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.25);
  border-radius:20px;padding:5px 11px;
  font-size:11px;font-weight:700;color:#059669;
  display:none;z-index:50;
}
#last-upd{text-align:center;font-size:11px;color:var(--text3);margin-top:20px;opacity:.6}

/* 섹션 간격 */
.sec{margin-bottom:14px}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">Dear Guard</div>
  <div class="spinner"></div>
  <div class="loading-sub">실시간 현황을 불러오는 중...</div>
</div>

<div id="error-screen">
  <h2>⚠️ 링크를 확인해주세요</h2>
  <p>유효하지 않은 대시보드 링크입니다.<br>담당 매니저에게 올바른 링크를 요청해주세요.</p>
</div>

<div id="dashboard">

  <!-- 헤더 -->
  <div class="hdr">
    <div class="hdr-brand">DEAR GUARD</div>
    <div class="hdr-names" id="hdr-names">—</div>
    <div class="hdr-info" id="hdr-info">—</div>
    <div><span class="live-pill"><span class="live-dot"></span>실시간 업데이트</span></div>
  </div>

  <!-- 총 축의금 히어로 -->
  <div class="hero sec">
    <div class="hero-lbl">총 축의금</div>
    <div class="hero-val" id="total-amount">0원</div>
    <div class="hero-sub" id="total-count">총 0건 접수</div>
  </div>

  <!-- 전체 통계 4개 -->
  <div class="g4 sec">
    <div class="mini-card">
      <div class="mini-lbl">총 인원</div>
      <div class="mini-val" id="total-cnt">0<span style="font-size:12px;font-weight:400;color:var(--text3)">건</span></div>
    </div>
    <div class="mini-card">
      <div class="mini-lbl">대인 식권</div>
      <div class="mini-val" id="total-adult">0<span style="font-size:12px;font-weight:400;color:var(--text3)">매</span></div>
    </div>
    <div class="mini-card">
      <div class="mini-lbl">소인 식권</div>
      <div class="mini-val" id="total-child">0<span style="font-size:12px;font-weight:400;color:var(--text3)">매</span></div>
    </div>
    <div class="mini-card">
      <div class="mini-lbl">계좌이체</div>
      <div class="mini-val" id="transfer-cnt">0<span style="font-size:12px;font-weight:400;color:var(--text3)">건</span></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 신랑측 -->
  <div class="sec">
    <div class="side-card">
      <div class="side-header">
        <span class="side-emoji">🤵</span>
        <span class="side-name">신랑측</span>
        <span class="side-total blue" id="groom-total">0원</span>
      </div>
      <div class="g3">
        <div class="sub-stat">
          <div class="sub-stat-lbl">접수 인원</div>
          <div class="sub-stat-val" id="groom-cnt">0</div>
        </div>
        <div class="sub-stat">
          <div class="sub-stat-lbl">대인 식권</div>
          <div class="sub-stat-val" id="groom-adult">0</div>
        </div>
        <div class="sub-stat">
          <div class="sub-stat-lbl">소인 식권</div>
          <div class="sub-stat-val" id="groom-child">0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 신부측 -->
  <div class="sec">
    <div class="side-card" style="border-color:rgba(244,114,182,.12)">
      <div class="side-header">
        <span class="side-emoji">👰</span>
        <span class="side-name">신부측</span>
        <span class="side-total pink" id="bride-total">0원</span>
      </div>
      <div class="g3">
        <div class="sub-stat">
          <div class="sub-stat-lbl">접수 인원</div>
          <div class="sub-stat-val" id="bride-cnt">0</div>
        </div>
        <div class="sub-stat">
          <div class="sub-stat-lbl">대인 식권</div>
          <div class="sub-stat-val" id="bride-adult">0</div>
        </div>
        <div class="sub-stat">
          <div class="sub-stat-lbl">소인 식권</div>
          <div class="sub-stat-val" id="bride-child">0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 양측 분리 리스트 (양측 데이터 있을 때) -->
  <div class="split-list-wrap" id="split-list-wrap" style="display:none">

    <!-- 신랑측 -->
    <div class="split-col">
      <div class="split-header groom-header">
        <div class="split-title">🤵 신랑측</div>
        <div class="split-summary" id="groom-summary">0명 · 0원</div>
      </div>
      <div id="groom-log-list"></div>
    </div>

    <!-- 신부측 -->
    <div class="split-col">
      <div class="split-header bride-header">
        <div class="split-title">👰 신부측</div>
        <div class="split-summary" id="bride-summary">0명 · 0원</div>
      </div>
      <div id="bride-log-list"></div>
    </div>

  </div>

  <!-- 단측 / 통합 리스트 (한쪽만 있을 때) -->
  <div id="single-list-wrap" style="display:none">
    <div class="list-hdr" style="margin-bottom:10px">
      <div class="list-title" id="single-list-label">최근 접수 내역</div>
    </div>
    <div id="single-log-list"></div>
  </div>

  <div class="divider"></div>

  <!-- 현장 운영 메모 -->
  <div class="list-hdr">
    <div class="list-title">📋 현장 운영 메모</div>
    <div class="list-cnt" id="ops-cnt">0건</div>
  </div>
  <div id="ops-list"></div>

  <div id="last-upd"></div>
</div>

<div id="upd-badge">✓ 업데이트</div>

<script>
const SUPABASE_URL      = 'https://fmvomfjmkbklhaaapkbk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_3GWkLSDzMFw6FfA_839Ydw_C5F1paf2';

const sb = {
  h:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`},
  url:(t,q='')=>`${SUPABASE_URL}/rest/v1/${t}${q}`,
  async get(t,q=''){ const r=await fetch(sb.url(t,q),{headers:sb.h}); if(!r.ok) throw new Error(await r.text()); return r.json(); }
};

let schedule=null, logs=[], opsLogs=[], newIds=new Set();

// ── 헬퍼 ──
function fmt(n){ return n>=10000 ? Math.round(n/10000)+'만원' : n.toLocaleString()+'원'; }
function fmtFull(n){ return n.toLocaleString()+'원'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(iso){
  const d=new Date(iso);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function getToken(){ return new URLSearchParams(location.search).get('t')||''; }

// ── 초기화 ──
async function init(){
  const token=getToken();
  if(!token){ showError(); return; }
  try {
    const rows=await sb.get('schedules',`?dashboard_token=eq.${encodeURIComponent(token)}`);
    if(!rows.length) throw new Error('not found');
    schedule=rows[0];

    // 헤더
    const g=(schedule.groom_name||'').trim(), b=(schedule.bride_name||'').trim();
    const names=(g&&b)?`${g} ♥ ${b}`:g?`${g} 신랑측`:b?`${b} 신부측`:schedule.hall||'—';
    document.getElementById('hdr-names').textContent=names;
    const time=(schedule.time||'').slice(0,5);
    document.getElementById('hdr-info').textContent=`${schedule.date||''} · ${time} · ${schedule.hall||''}`;
    document.title=`${names} · 실시간 현황`;

    await loadLogs();
    document.getElementById('loading').style.display='none';
    document.getElementById('dashboard').style.display='block';

    subscribeRealtime();
    setInterval(loadLogs, 30000);
  } catch(e){
    console.error(e);
    showError();
  }
}

function showError(){
  document.getElementById('loading').style.display='none';
  document.getElementById('error-screen').style.display='flex';
}

// ── 데이터 로드 ──
async function loadLogs(){
  if(!schedule) return;
  try {
    const [newLogs, newOps] = await Promise.all([
      sb.get('contribution_logs',`?schedule_id=eq.${schedule.id}&order=created_at.desc`),
      sb.get('operation_logs',`?schedule_id=eq.${schedule.id}&order=created_at.desc`)
    ]);
    const oldIds=new Set(logs.map(l=>l.id));
    newLogs.forEach(l=>{ if(!oldIds.has(l.id)) newIds.add(l.id); });
    logs=newLogs;
    opsLogs=newOps;
    renderStats();
    renderList();
    renderOpsList();
    showUpdBadge();
    document.getElementById('last-upd').textContent='마지막 갱신: '+fmtTime(new Date().toISOString());
  } catch(e){ console.error('로드 실패:',e); }
}

// ── 통계 렌더 ──
function renderStats(){
  const total    = logs.reduce((s,l)=>s+(l.amount||0),0);
  const gL       = logs.filter(l=>l.side==='신랑측');
  const bL       = logs.filter(l=>l.side==='신부측');
  const gAmt     = gL.reduce((s,l)=>s+(l.amount||0),0);
  const bAmt     = bL.reduce((s,l)=>s+(l.amount||0),0);
  const adultTot = logs.reduce((s,l)=>s+(l.adult_ticket||0),0);
  const childTot = logs.reduce((s,l)=>s+(l.child_ticket||0),0);
  const transCnt = logs.filter(l=>l.payment_type==='계좌이체').length;
  const gAdult   = gL.reduce((s,l)=>s+(l.adult_ticket||0),0);
  const gChild   = gL.reduce((s,l)=>s+(l.child_ticket||0),0);
  const bAdult   = bL.reduce((s,l)=>s+(l.adult_ticket||0),0);
  const bChild   = bL.reduce((s,l)=>s+(l.child_ticket||0),0);

  document.getElementById('total-amount').textContent = fmtFull(total);
  document.getElementById('total-count').textContent  = `총 ${logs.length}건 접수`;
  document.getElementById('total-cnt').innerHTML      = `${logs.length}<span style="font-size:12px;font-weight:400;color:var(--text3)">건</span>`;
  document.getElementById('total-adult').innerHTML    = `${adultTot}<span style="font-size:12px;font-weight:400;color:var(--text3)">매</span>`;
  document.getElementById('total-child').innerHTML    = `${childTot}<span style="font-size:12px;font-weight:400;color:var(--text3)">매</span>`;
  document.getElementById('transfer-cnt').innerHTML   = `${transCnt}<span style="font-size:12px;font-weight:400;color:var(--text3)">건</span>`;

  document.getElementById('groom-total').textContent = fmt(gAmt);
  document.getElementById('groom-cnt').textContent   = gL.length;
  document.getElementById('groom-adult').textContent = gAdult;
  document.getElementById('groom-child').textContent = gChild;

  document.getElementById('bride-total').textContent = fmt(bAmt);
  document.getElementById('bride-cnt').textContent   = bL.length;
  document.getElementById('bride-adult').textContent = bAdult;
  document.getElementById('bride-child').textContent = bChild;

  // list-cnt → split-summary로 대체됨
}

// ── 리스트 렌더 (자동 모드 감지) ──
// 모드: 'both' = 양측분리, 'single' = 단측/통합 하나로
function detectMode(){
  const hasGroom = logs.some(l=>l.side==='신랑측');
  const hasBride = logs.some(l=>l.side==='신부측');
  if(hasGroom && hasBride) return 'both';   // 양측 데이터 있음 → 분리
  return 'single';                           // 한쪽만 or 없음 → 통합
}

function renderList(){
  const mode  = detectMode();
  const wrap  = document.getElementById('split-list-wrap');
  const single = document.getElementById('single-list-wrap');

  if(mode === 'both'){
    // 양측 분리 모드
    if(wrap)   wrap.style.display   = 'grid';
    if(single) single.style.display = 'none';

    const gLogs = logs.filter(l=>l.side==='신랑측');
    const bLogs = logs.filter(l=>l.side==='신부측');
    const gAmt  = gLogs.reduce((s,l)=>s+(l.amount||0),0);
    const gTkt  = gLogs.reduce((s,l)=>s+(l.adult_ticket||0)+(l.child_ticket||0),0);
    const bAmt  = bLogs.reduce((s,l)=>s+(l.amount||0),0);
    const bTkt  = bLogs.reduce((s,l)=>s+(l.adult_ticket||0)+(l.child_ticket||0),0);

    const gSumEl = document.getElementById('groom-summary');
    const bSumEl = document.getElementById('bride-summary');
    if(gSumEl) gSumEl.innerHTML = `<span>${gLogs.length}명</span> · <span>${fmtFull(gAmt)}</span> · <span>식권 ${gTkt}장</span>`;
    if(bSumEl) bSumEl.innerHTML = `<span>${bLogs.length}명</span> · <span>${fmtFull(bAmt)}</span> · <span>식권 ${bTkt}장</span>`;

    renderSideList('groom-log-list', gLogs);
    renderSideList('bride-log-list', bLogs);

  } else {
    // 단측 / 통합 모드
    if(wrap)   wrap.style.display   = 'none';
    if(single) single.style.display = 'block';

    const singleEl = document.getElementById('single-log-list');
    if(!singleEl) return;

    // 헤더 라벨 자동 설정
    const hasGroom = logs.some(l=>l.side==='신랑측');
    const label = hasGroom ? '🤵 신랑측' : logs.length ? '👰 신부측' : '';
    const labelEl = document.getElementById('single-list-label');
    if(labelEl && label) labelEl.textContent = label;

    if(!logs.length){
      singleEl.innerHTML='<div class="empty-list">아직 접수 내역이 없습니다</div>';
    } else {
      singleEl.innerHTML = logs.map(l => logItemHTML(l)).join('');
    }
  }

  setTimeout(()=>{ newIds.clear(); }, 2500);
}

function renderSideList(elId, sideLogs){
  const el = document.getElementById(elId);
  if(!el) return;
  if(!sideLogs.length){
    el.innerHTML='<div class="empty-list" style="padding:20px 10px;font-size:12px">아직 접수 내역이 없습니다</div>';
    return;
  }
  el.innerHTML = sideLogs.map(l => logItemHTML(l)).join('');
}

function logItemHTML(l){
  const isNew  = newIds.has(l.id);
  const name   = l.guest_name||'—';
  const rel    = l.relation ? ` · ${l.relation}` : '';
  const pay    = l.payment_type==='계좌이체' ? '📱' : '💵';
  const tktA   = l.adult_ticket||0;
  const tktC   = l.child_ticket||0;
  const tktStr = (tktA+tktC)>0 ? ` · 식권${tktA+tktC}` : '';
  const sideTag = `<span style="font-size:10px;color:${l.side==='신랑측'?'var(--blue)':'var(--pink)'};font-weight:700;margin-left:4px">${l.side}</span>`;
  return `<div class="split-log-item${isNew?' new-item':''}">
    <div class="split-log-body">
      <div class="split-log-name">${esc(name)}${rel?`<span style="color:var(--text3);font-weight:400">${esc(rel)}</span>`:''}${sideTag}</div>
      <div class="split-log-meta">${pay} ${l.payment_type}${tktStr}</div>
    </div>
    <div class="split-log-right">
      <div class="split-log-amount">${l.amount?fmt(l.amount):'—'}</div>
      <div class="split-log-time">${fmtTime(l.created_at)}</div>
    </div>
  </div>`;
}

// ── 운영 메모 렌더 ──
function renderOpsList(){
  const el=document.getElementById('ops-list');
  const cntEl=document.getElementById('ops-cnt');
  if(!el) return;
  if(cntEl) cntEl.textContent=opsLogs.length+'건';
  if(!opsLogs.length){
    el.innerHTML='<div class="empty-list" style="padding:16px">아직 운영 메모가 없습니다</div>';
    return;
  }
  el.innerHTML=opsLogs.map(function(l){
    return '<div class="ops-item">' +
      '<span class="ops-time">' + esc(l.time_str||'') + '</span>' +
      '<span class="ops-text">'  + esc(l.content||'')  + '</span>' +
      '<span class="ops-by">'   + esc(l.created_by||'') + '</span>' +
    '</div>';
  }).join('');
}

// ── 업데이트 뱃지 ──
function showUpdBadge(){
  const el=document.getElementById('upd-badge');
  el.style.display='block';
  setTimeout(()=>{ el.style.display='none'; },1800);
}

// ── 실시간 구독 ──
function subscribeRealtime(){
  const ws=new WebSocket(
    `wss://fmvomfjmkbklhaaapkbk.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_ANON_KEY}&vsn=1.0.0`
  );
  ws.onopen=()=>{
    ws.send(JSON.stringify({
      topic:`realtime:public:contribution_logs:schedule_id=eq.${schedule.id}`,
      event:'phx_join',payload:{},ref:'1'
    }));
    ws.send(JSON.stringify({
      topic:`realtime:public:operation_logs:schedule_id=eq.${schedule.id}`,
      event:'phx_join',payload:{},ref:'2'
    }));
  };
  ws.onmessage=async(e)=>{
    const msg=JSON.parse(e.data);
    if(['INSERT','UPDATE','DELETE'].includes(msg.event)) await loadLogs();
  };
  ws.onclose=()=>setTimeout(subscribeRealtime,3000);
}

init();
</script>
