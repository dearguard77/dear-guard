<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dear Guard · 축의 접수</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:#F8F7F5;color:#111827;font-size:14px;min-height:100vh}
  button{cursor:pointer;font-family:inherit;border:none;outline:none}
  input,select,textarea{font-family:inherit;outline:none}

  /* ── 로그인 ── */
  #login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#F8F5F0,#FDF8F3);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-box{background:#fff;border-radius:24px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.12)}
  .login-logo{font-family:Georgia,serif;font-size:26px;font-weight:700;color:#C7A96B;letter-spacing:2px;text-align:center;margin-bottom:4px}
  .login-sub{font-size:12px;color:#9CA3AF;text-align:center;margin-bottom:28px}
  .login-field{margin-bottom:12px}
  .login-label{font-size:11px;font-weight:700;color:#6B7280;margin-bottom:6px;display:block}
  .login-input{width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:11px 14px;font-size:14px;color:#111827;transition:border-color .15s}
  .login-input:focus{border-color:#C7A96B}
  .login-btn{width:100%;background:#C7A96B;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:background .15s}
  .login-btn:hover{background:#B8976A}
  .login-err{font-size:12px;color:#EF4444;text-align:center;margin-top:8px;min-height:18px;font-weight:600}

  /* ── 예식 선택 ── */
  #schedule-select-screen{display:none;padding:20px;max-width:600px;margin:0 auto}
  .screen-title{font-size:20px;font-weight:800;color:#111827;margin-bottom:4px}
  .screen-sub{font-size:13px;color:#9CA3AF;margin-bottom:20px}
  .schedule-card{background:#fff;border:1.5px solid #E5E7EB;border-radius:14px;padding:16px 18px;cursor:pointer;margin-bottom:10px;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
  .schedule-card:hover{border-color:#C7A96B;background:#FDF8F3;transform:translateX(2px)}
  .schedule-card-name{font-size:15px;font-weight:700;color:#111827}
  .schedule-card-info{font-size:12px;color:#9CA3AF;margin-top:3px}
  .schedule-card-arrow{font-size:18px;color:#C7A96B}
  .empty-state{text-align:center;padding:48px 20px;color:#9CA3AF;font-size:14px}

  /* ── 메인 입력기 ── */
  #main-screen{display:none}

  /* 상단 헤더 */
  #top-bar{background:#fff;border-bottom:1px solid #E8DFD0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .top-bar-left{display:flex;align-items:center;gap:10px}
  .top-bar-logo{font-family:Georgia,serif;font-size:14px;font-weight:700;color:#C7A96B}
  .top-bar-schedule{font-size:13px;font-weight:700;color:#111827}
  .top-bar-right{display:flex;gap:8px;align-items:center}
  .btn-change{background:#F3F4F6;border:1px solid #E5E7EB;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600;color:#6B7280}
  .btn-dashboard{background:#C7A96B;color:#fff;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700}

  /* 메인 레이아웃 */
  #main-content{display:grid;grid-template-columns:1fr 320px;gap:0;height:calc(100vh - 53px)}
  @media(max-width:768px){
    #main-content{grid-template-columns:1fr;height:auto}
  }

  /* 좌측: 입력 폼 */
  #input-panel{padding:16px;overflow-y:auto;height:100%}
  @media(max-width:768px){#input-panel{height:auto}}

  /* 섹션 */
  .input-section{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;border:1px solid #E5E7EB}
  .section-label{font-size:11px;font-weight:700;color:#9CA3AF;letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase}

  /* 토글 버튼 그룹 */
  .toggle-group{display:grid;gap:8px}
  .toggle-group.cols-2{grid-template-columns:1fr 1fr}
  .toggle-group.cols-3{grid-template-columns:1fr 1fr 1fr}
  .toggle-group.cols-5{grid-template-columns:repeat(5,1fr)}
  .toggle-btn{border-radius:10px;padding:10px 4px;font-size:13px;font-weight:600;border:1.5px solid #E5E7EB;background:#F9FAFB;color:#6B7280;transition:all .15s;text-align:center;line-height:1.3}
  .toggle-btn.active{background:#C7A96B;color:#fff;border-color:#C7A96B}
  .toggle-btn.active-blue{background:#3B82F6;color:#fff;border-color:#3B82F6}
  .toggle-btn.active-pink{background:#EC4899;color:#fff;border-color:#EC4899}

  /* 금액 버튼 */
  .amount-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
  @media(max-width:480px){.amount-grid{grid-template-columns:repeat(3,1fr)}}
  .amount-btn{border-radius:10px;padding:12px 4px;font-size:13px;font-weight:700;border:1.5px solid #E5E7EB;background:#F9FAFB;color:#374151;transition:all .15s;text-align:center}
  .amount-btn:active{transform:scale(.96)}
  .amount-btn.active{background:#111827;color:#fff;border-color:#111827}
  .amount-btn.custom{background:#FDF8F3;border-color:#E8DFD0;color:#C7A96B}

  /* 직접 입력 */
  .form-input{border:1.5px solid #E5E7EB;border-radius:10px;padding:10px 12px;font-size:15px;color:#111827;background:#fff;width:100%;transition:border-color .15s}
  .form-input:focus{border-color:#C7A96B}
  .form-input-wrap{position:relative}
  .form-input-unit{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:#9CA3AF;font-weight:600;pointer-events:none}

  /* 관계 버튼 */
  .relation-grid{display:flex;flex-wrap:wrap;gap:8px}
  .relation-btn{border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;border:1.5px solid #E5E7EB;background:#F9FAFB;color:#6B7280;transition:all .15s}
  .relation-btn.active{background:#374151;color:#fff;border-color:#374151}

  /* 식권 카운터 */
  .ticket-counter{display:flex;align-items:center;gap:12px}
  .ticket-label{font-size:13px;font-weight:600;color:#374151;min-width:60px}
  .counter-wrap{display:flex;align-items:center;gap:8px;background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:10px;padding:4px 8px}
  .counter-btn{width:32px;height:32px;border-radius:8px;background:#fff;border:1px solid #E5E7EB;font-size:18px;font-weight:700;color:#374151;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .counter-btn:active{background:#E5E7EB}
  .counter-val{font-size:18px;font-weight:800;color:#111827;min-width:36px;text-align:center}

  /* 접수 버튼 */
  .submit-btn{width:100%;background:linear-gradient(135deg,#C7A96B,#E8C98A);color:#fff;border-radius:14px;padding:16px;font-size:17px;font-weight:800;letter-spacing:.5px;box-shadow:0 4px 20px rgba(199,169,107,.4);transition:all .2s;margin-top:4px}
  .submit-btn:active{transform:scale(.98);box-shadow:0 2px 10px rgba(199,169,107,.3)}

  /* 우측: 현황 패널 */
  #stats-panel{background:#111827;color:#fff;padding:16px;overflow-y:auto;height:100%}
  @media(max-width:768px){#stats-panel{height:auto;border-radius:0}}

  .stats-title{font-size:11px;font-weight:700;color:#9CA3AF;letter-spacing:1px;margin-bottom:14px;text-transform:uppercase}
  .stat-card{background:rgba(255,255,255,.06);border-radius:12px;padding:14px;margin-bottom:8px}
  .stat-card-label{font-size:10px;color:#9CA3AF;margin-bottom:4px}
  .stat-card-value{font-size:22px;font-weight:800;color:#fff;line-height:1}
  .stat-card-sub{font-size:10px;color:#6B7280;margin-top:3px}
  .stat-card.gold .stat-card-value{color:#C7A96B}

  .side-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .side-card{background:rgba(255,255,255,.06);border-radius:12px;padding:12px}
  .side-card-emoji{font-size:16px;margin-bottom:6px}
  .side-card-label{font-size:10px;color:#9CA3AF;margin-bottom:2px}
  .side-card-value{font-size:16px;font-weight:800;color:#fff}

  /* 최근 접수 리스트 */
  .recent-title{font-size:11px;font-weight:700;color:#9CA3AF;letter-spacing:1px;margin:14px 0 10px;text-transform:uppercase}
  .recent-item{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
  .recent-item-left{flex:1;min-width:0}
  .recent-item-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .recent-item-info{font-size:11px;color:#6B7280;margin-top:2px}
  .recent-item-amount{font-size:13px;font-weight:800;color:#C7A96B;white-space:nowrap;margin-left:8px}

  /* 토스트 */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;z-index:9999;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:toastUp .2s ease}
  @keyframes toastUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

  /* 토큰 모달 */
  #token-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}
  .token-box{background:#fff;border-radius:20px;padding:28px 24px;max-width:380px;width:100%;text-align:center}
  .token-title{font-size:16px;font-weight:800;color:#111827;margin-bottom:8px}
  .token-sub{font-size:13px;color:#6B7280;margin-bottom:16px}
  .token-url{background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:10px;padding:12px;font-size:13px;color:#374151;word-break:break-all;margin-bottom:14px;font-weight:600}
  .token-copy-btn{background:#C7A96B;color:#fff;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;width:100%;margin-bottom:8px}
  .token-close-btn{background:#F3F4F6;color:#6B7280;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;width:100%}
</style>
</head>
<body>

<!-- ── 로그인 ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Dear Guard</div>
    <div class="login-sub">축의 접수 시스템</div>
    <div class="login-field">
      <label class="login-label">이름 선택</label>
      <select class="login-input" id="login-name">
        <option value="">— 이름을 선택하세요 —</option>
      </select>
    </div>
    <div class="login-field">
      <label class="login-label">비밀번호</label>
      <input class="login-input" id="login-pw" type="password" placeholder="비밀번호 입력"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ── 예식 선택 ── -->
<div id="schedule-select-screen">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding-top:8px">
    <div>
      <div class="screen-title">📋 예식 선택</div>
      <div class="screen-sub">오늘 또는 진행 중인 예식을 선택하세요</div>
    </div>
    <button onclick="doLogout()" style="background:#F3F4F6;border:1px solid #E5E7EB;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;color:#6B7280">로그아웃</button>
  </div>
  <div id="schedule-list-wrap"></div>
</div>

<!-- ── 메인 입력기 ── -->
<div id="main-screen">
  <!-- 상단 바 -->
  <div id="top-bar">
    <div class="top-bar-left">
      <span class="top-bar-logo">DG</span>
      <span class="top-bar-schedule" id="top-schedule-name">—</span>
    </div>
    <div class="top-bar-right">
      <button class="btn-change" onclick="goSelectSchedule()">예식 변경</button>
      <button class="btn-dashboard" onclick="showDashboardLink()">📱 대시보드 링크</button>
      <button onclick="doLogout()" style="background:#F3F4F6;border:1px solid #E5E7EB;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600;color:#6B7280">로그아웃</button>
    </div>
  </div>

  <!-- 메인 콘텐츠 -->
  <div id="main-content">

    <!-- 좌측: 입력 폼 -->
    <div id="input-panel">

      <!-- 신랑/신부측 -->
      <div class="input-section">
        <div class="section-label">접수 측</div>
        <div class="toggle-group cols-2">
          <button class="toggle-btn active-blue" id="side-groom" onclick="setSide('groom')">🤵 신랑측</button>
          <button class="toggle-btn" id="side-bride" onclick="setSide('bride')">👰 신부측</button>
        </div>
      </div>

      <!-- 결제 수단 -->
      <div class="input-section">
        <div class="section-label">결제 방식</div>
        <div class="toggle-group cols-2">
          <button class="toggle-btn active" id="pay-cash" onclick="setPayment('cash')">💵 현금</button>
          <button class="toggle-btn" id="pay-transfer" onclick="setPayment('transfer')">📱 계좌이체</button>
        </div>
      </div>

      <!-- 금액 -->
      <div class="input-section">
        <div class="section-label">금액</div>
        <div class="amount-grid">
          <button class="amount-btn" onclick="setAmount(50000)">5만</button>
          <button class="amount-btn" onclick="setAmount(100000)">10만</button>
          <button class="amount-btn" onclick="setAmount(150000)">15만</button>
          <button class="amount-btn" onclick="setAmount(200000)">20만</button>
          <button class="amount-btn" onclick="setAmount(300000)">30만</button>
          <button class="amount-btn" onclick="setAmount(500000)">50만</button>
          <button class="amount-btn" onclick="setAmount(70000)">7만</button>
          <button class="amount-btn custom" onclick="focusCustomAmount()">직접입력</button>
        </div>
        <div class="form-input-wrap">
          <input class="form-input" id="amount-input" type="number" placeholder="금액 직접 입력"
            oninput="onAmountInput()" style="padding-right:40px">
          <span class="form-input-unit">원</span>
        </div>
      </div>

      <!-- 하객 정보 -->
      <div class="input-section">
        <div class="section-label">하객 정보</div>
        <input class="form-input" id="guest-name" placeholder="이름 (선택)" style="margin-bottom:10px">
        <div class="relation-grid" id="relation-btns">
          <button class="relation-btn" onclick="setRelation('친구')">친구</button>
          <button class="relation-btn" onclick="setRelation('직장')">직장</button>
          <button class="relation-btn" onclick="setRelation('가족')">가족</button>
          <button class="relation-btn" onclick="setRelation('혼주')">혼주</button>
          <button class="relation-btn" onclick="setRelation('기타')">기타</button>
        </div>
      </div>

      <!-- 식권 -->
      <div class="input-section">
        <div class="section-label">식권</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div class="ticket-counter">
            <span class="ticket-label">대인</span>
            <div class="counter-wrap">
              <button class="counter-btn" onclick="changeTicket('adult',-1)">−</button>
              <span class="counter-val" id="adult-ticket-val">0</span>
              <button class="counter-btn" onclick="changeTicket('adult',1)">＋</button>
            </div>
            <span style="font-size:12px;color:#9CA3AF;margin-left:4px">매</span>
          </div>
          <div class="ticket-counter">
            <span class="ticket-label">소인</span>
            <div class="counter-wrap">
              <button class="counter-btn" onclick="changeTicket('child',-1)">−</button>
              <span class="counter-val" id="child-ticket-val">0</span>
              <button class="counter-btn" onclick="changeTicket('child',1)">＋</button>
            </div>
            <span style="font-size:12px;color:#9CA3AF;margin-left:4px">매</span>
          </div>
        </div>
      </div>

      <!-- 메모 -->
      <div class="input-section">
        <div class="section-label">메모 (선택)</div>
        <textarea class="form-input" id="memo-input" rows="2" placeholder="특이사항 메모" style="resize:none;line-height:1.6"></textarea>
      </div>

      <!-- 접수 버튼 -->
      <button class="submit-btn" onclick="submitEntry()">✅ 접수 완료</button>
      <div style="height:24px"></div>
    </div>

    <!-- 우측: 현황 패널 -->
    <div id="stats-panel">
      <div class="stats-title">실시간 현황</div>

      <div class="stat-card gold">
        <div class="stat-card-label">총 축의금</div>
        <div class="stat-card-value" id="stat-total-amount">0원</div>
        <div class="stat-card-sub" id="stat-total-count">총 0건</div>
      </div>

      <div class="side-stats">
        <div class="side-card">
          <div class="side-card-emoji">🤵</div>
          <div class="side-card-label">신랑측</div>
          <div class="side-card-value" id="stat-groom-amount">0원</div>
          <div style="font-size:10px;color:#6B7280;margin-top:2px" id="stat-groom-count">0건</div>
        </div>
        <div class="side-card">
          <div class="side-card-emoji">👰</div>
          <div class="side-card-label">신부측</div>
          <div class="side-card-value" id="stat-bride-amount">0원</div>
          <div style="font-size:10px;color:#6B7280;margin-top:2px" id="stat-bride-count">0건</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div class="stat-card" style="margin-bottom:0">
          <div class="stat-card-label">대인 식권</div>
          <div class="stat-card-value" id="stat-adult-ticket">0매</div>
        </div>
        <div class="stat-card" style="margin-bottom:0">
          <div class="stat-card-label">소인 식권</div>
          <div class="stat-card-value" id="stat-child-ticket">0매</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0">
        <div class="stat-card" style="margin-bottom:0">
          <div class="stat-card-label">💵 현금</div>
          <div class="stat-card-value" id="stat-cash-count">0건</div>
        </div>
        <div class="stat-card" style="margin-bottom:0">
          <div class="stat-card-label">📱 계좌이체</div>
          <div class="stat-card-value" id="stat-transfer-count">0건</div>
        </div>
      </div>

      <div class="recent-title">최근 접수</div>
      <div id="recent-list"></div>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<!-- 대시보드 링크 모달 -->
<div id="token-modal">
  <div class="token-box">
    <div class="token-title">📱 고객 대시보드 링크</div>
    <div class="token-sub">신랑·신부·혼주님께 이 링크를 공유하세요</div>
    <div class="token-url" id="token-url-display">—</div>
    <button class="token-copy-btn" onclick="copyDashboardLink()">🔗 링크 복사</button>
    <button class="token-close-btn" onclick="document.getElementById('token-modal').style.display='none'">닫기</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
//  SUPABASE 설정
// ════════════════════════════════════════════════════
const SUPABASE_URL     = 'https://fmvomfjmkbklhaaapkbk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_3GWkLSDzMFw6FfA_839Ydw_C5F1paf2';

const sb = {
  h: {'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`},
  url: (t,q='') => `${SUPABASE_URL}/rest/v1/${t}${q}`,
  async get(t,q=''){
    const r = await fetch(sb.url(t,q),{headers:sb.h});
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(t,body){
    const r = await fetch(sb.url(t),{method:'POST',headers:{...sb.h,'Prefer':'return=representation'},body:JSON.stringify(body)});
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async patch(t,id,body){
    const r = await fetch(sb.url(t,`?id=eq.${id}`),{method:'PATCH',headers:{...sb.h,'Prefer':'return=representation'},body:JSON.stringify(body)});
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  }
};

// ════════════════════════════════════════════════════
//  유저 / 상태
// ════════════════════════════════════════════════════
const USERS = [
  {id:1,name:'강성주',role:'대표',pw:'gg'},
  {id:2,name:'전수연',role:'실장',pw:'gg'},
  {id:3,name:'조윤성',role:'실장',pw:'ys'},
  {id:4,name:'정선화',role:'실장',pw:'sh'},
  {id:5,name:'김지현',role:'실장',pw:'jh'},
  {id:6,name:'목수빈',role:'실장',pw:'sb'},
  {id:7,name:'양윤수',role:'실장',pw:'ys'},
  {id:8,name:'김홍주',role:'실장',pw:'hj'},
];

let currentUser  = null;
let currentSchedule = null;
let logs = [];

// 입력 상태
let state = {
  side: 'groom',
  payment: 'cash',
  amount: 0,
  relation: '',
  adultTicket: 0,
  childTicket: 0,
};

function fmt(n){ return Math.round(n/10000) + '만원'; }
function fmtFull(n){ return n.toLocaleString() + '원'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ════════════════════════════════════════════════════
//  로그인
// ════════════════════════════════════════════════════
function initLogin(){
  const sel = document.getElementById('login-name');
  sel.innerHTML = '<option value="">— 이름을 선택하세요 —</option>'
    + USERS.map(u=>`<option value="${u.id}">${u.name} (${u.role})</option>`).join('');
}

function doLogin(){
  const nameVal = document.getElementById('login-name').value;
  const pwVal   = document.getElementById('login-pw').value;
  const errEl   = document.getElementById('login-err');
  errEl.textContent = '';

  if(!nameVal){ errEl.textContent = '이름을 선택해주세요.'; return; }
  if(!pwVal)  { errEl.textContent = '비밀번호를 입력해주세요.'; return; }

  const user = USERS.find(u => u.id === Number(nameVal));
  if(!user || user.pw !== pwVal){
    errEl.textContent = '비밀번호가 올바르지 않습니다.';
    document.getElementById('login-pw').value = '';
    return;
  }

  currentUser = user;
  localStorage.setItem('dg_contrib_user', user.id);
  document.getElementById('login-screen').style.display = 'none';
  goSelectSchedule();
}

function doLogout(){
  localStorage.removeItem('dg_contrib_user');
  location.reload();
}

// ════════════════════════════════════════════════════
//  예식 선택
// ════════════════════════════════════════════════════
async function goSelectSchedule(){
  currentSchedule = null;
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('schedule-select-screen').style.display = 'block';

  const wrap = document.getElementById('schedule-list-wrap');
  wrap.innerHTML = '<div class="empty-state">불러오는 중...</div>';

  try {
    const rows = await sb.get('schedules', '?order=date.asc,time.asc&status=neq.진행완료');
    if(!rows.length){
      wrap.innerHTML = '<div class="empty-state">예식 데이터가 없습니다</div>';
      return;
    }
    wrap.innerHTML = rows.map(s => {
      const g = (s.groom_name||'').trim();
      const b = (s.bride_name||'').trim();
      const name = (g && b) ? `${g} ♥ ${b}` : g ? `${g} 신랑측` : b ? `${b} 신부측` : s.hall || '미입력';
      const info = `${s.date||''} · ${(s.time||'').slice(0,5)} · ${s.hall||''}`;
      return `<div class="schedule-card" onclick="selectSchedule(${s.id})">
        <div>
          <div class="schedule-card-name">💍 ${esc(name)}</div>
          <div class="schedule-card-info">${esc(info)}</div>
        </div>
        <div class="schedule-card-arrow">›</div>
      </div>`;
    }).join('');
  } catch(e){
    wrap.innerHTML = `<div class="empty-state">로드 실패: ${e.message}</div>`;
  }
}

async function selectSchedule(id){
  try {
    const rows = await sb.get('schedules', `?id=eq.${id}`);
    if(!rows.length) return;
    currentSchedule = rows[0];

    // 대시보드 토큰 없으면 생성
    if(!currentSchedule.dashboard_token){
      const token = Math.random().toString(36).slice(2,12).toUpperCase();
      await sb.patch('schedules', id, { dashboard_token: token });
      currentSchedule.dashboard_token = token;
    }

    const g = (currentSchedule.groom_name||'').trim();
    const b = (currentSchedule.bride_name||'').trim();
    const name = (g && b) ? `${g} ♥ ${b}` : g ? `${g} 신랑측` : b ? `${b} 신부측` : currentSchedule.hall || '미입력';
    document.getElementById('top-schedule-name').textContent = name;

    document.getElementById('schedule-select-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';

    await loadLogs();
    subscribeRealtime();
  } catch(e){
    showToast('⚠️ 예식 로드 실패');
  }
}

// ════════════════════════════════════════════════════
//  데이터 로드
// ════════════════════════════════════════════════════
async function loadLogs(){
  if(!currentSchedule) return;
  try {
    logs = await sb.get('contribution_logs', `?schedule_id=eq.${currentSchedule.id}&order=created_at.desc`);
    renderStats();
    renderRecent();
  } catch(e){
    console.error('logs 로드 실패:', e);
  }
}

// ════════════════════════════════════════════════════
//  실시간 구독
// ════════════════════════════════════════════════════
function subscribeRealtime(){
  const ws = new WebSocket(
    `wss://fmvomfjmkbklhaaapkbk.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_ANON_KEY}&vsn=1.0.0`
  );
  ws.onopen = () => {
    ws.send(JSON.stringify({
      topic: `realtime:public:contribution_logs:schedule_id=eq.${currentSchedule.id}`,
      event: 'phx_join', payload: {}, ref: '1'
    }));
  };
  ws.onmessage = async (e) => {
    const msg = JSON.parse(e.data);
    if(msg.event === 'INSERT' || msg.event === 'UPDATE' || msg.event === 'DELETE'){
      await loadLogs();
    }
  };
}

// ════════════════════════════════════════════════════
//  통계 렌더
// ════════════════════════════════════════════════════
function renderStats(){
  const total      = logs.reduce((s,l) => s + (l.amount||0), 0);
  const groomLogs  = logs.filter(l => l.side === '신랑측');
  const brideLogs  = logs.filter(l => l.side === '신부측');
  const groomAmt   = groomLogs.reduce((s,l) => s + (l.amount||0), 0);
  const brideAmt   = brideLogs.reduce((s,l) => s + (l.amount||0), 0);
  const adultTkt   = logs.reduce((s,l) => s + (l.adult_ticket||0), 0);
  const childTkt   = logs.reduce((s,l) => s + (l.child_ticket||0), 0);
  const cashCnt    = logs.filter(l => l.payment_type === '현금').length;
  const transCnt   = logs.filter(l => l.payment_type === '계좌이체').length;

  document.getElementById('stat-total-amount').textContent  = fmtFull(total);
  document.getElementById('stat-total-count').textContent   = `총 ${logs.length}건`;
  document.getElementById('stat-groom-amount').textContent  = fmt(groomAmt);
  document.getElementById('stat-groom-count').textContent   = `${groomLogs.length}건`;
  document.getElementById('stat-bride-amount').textContent  = fmt(brideAmt);
  document.getElementById('stat-bride-count').textContent   = `${brideLogs.length}건`;
  document.getElementById('stat-adult-ticket').textContent  = adultTkt + '매';
  document.getElementById('stat-child-ticket').textContent  = childTkt + '매';
  document.getElementById('stat-cash-count').textContent    = cashCnt + '건';
  document.getElementById('stat-transfer-count').textContent = transCnt + '건';
}

function renderRecent(){
  const el = document.getElementById('recent-list');
  const recent = logs.slice(0, 20);
  if(!recent.length){
    el.innerHTML = '<div style="font-size:12px;color:#6B7280;text-align:center;padding:20px">아직 접수 내역이 없습니다</div>';
    return;
  }
  el.innerHTML = recent.map(l => {
    const name = l.guest_name || '익명';
    const rel  = l.relation ? ` · ${l.relation}` : '';
    const pay  = l.payment_type === '계좌이체' ? '📱' : '💵';
    const tkt  = (l.adult_ticket||0) + (l.child_ticket||0) > 0
      ? ` · 식권${(l.adult_ticket||0)+(l.child_ticket||0)}` : '';
    const side = l.side === '신랑측' ? '🤵' : '👰';
    return `<div class="recent-item">
      <div class="recent-item-left">
        <div class="recent-item-name">${side} ${esc(name)}${rel}</div>
        <div class="recent-item-info">${pay} ${l.payment_type}${tkt}</div>
      </div>
      <div class="recent-item-amount">${l.amount ? fmt(l.amount) : '-'}</div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════
//  입력 상태 관리
// ════════════════════════════════════════════════════
function setSide(side){
  state.side = side;
  document.getElementById('side-groom').className = 'toggle-btn' + (side==='groom' ? ' active-blue' : '');
  document.getElementById('side-bride').className = 'toggle-btn' + (side==='bride' ? ' active-pink' : '');
}

function setPayment(pay){
  state.payment = pay;
  document.getElementById('pay-cash').className     = 'toggle-btn' + (pay==='cash'     ? ' active' : '');
  document.getElementById('pay-transfer').className = 'toggle-btn' + (pay==='transfer' ? ' active' : '');
}

function setAmount(amt){
  state.amount = amt;
  document.getElementById('amount-input').value = amt;
  document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
  // 해당 버튼 active
  const map = {50000:'5만',100000:'10만',150000:'15만',200000:'20만',300000:'30만',500000:'50만',70000:'7만'};
  document.querySelectorAll('.amount-btn').forEach(b => {
    if(b.textContent === map[amt]) b.classList.add('active');
  });
}

function focusCustomAmount(){
  const inp = document.getElementById('amount-input');
  inp.focus();
  inp.select();
  document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
}

function onAmountInput(){
  state.amount = Number(document.getElementById('amount-input').value) || 0;
  document.querySelectorAll('.amount-btn:not(.custom)').forEach(b => b.classList.remove('active'));
}

function setRelation(rel){
  state.relation = rel;
  document.querySelectorAll('.relation-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === rel);
  });
}

function changeTicket(type, delta){
  if(type === 'adult'){
    state.adultTicket = Math.max(0, state.adultTicket + delta);
    document.getElementById('adult-ticket-val').textContent = state.adultTicket;
  } else {
    state.childTicket = Math.max(0, state.childTicket + delta);
    document.getElementById('child-ticket-val').textContent = state.childTicket;
  }
}

function resetForm(){
  // 측/결제는 유지, 나머지 초기화
  state.amount = 0;
  state.relation = '';
  state.adultTicket = 0;
  state.childTicket = 0;
  document.getElementById('amount-input').value = '';
  document.getElementById('guest-name').value = '';
  document.getElementById('memo-input').value = '';
  document.getElementById('adult-ticket-val').textContent = '0';
  document.getElementById('child-ticket-val').textContent = '0';
  document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.relation-btn').forEach(b => b.classList.remove('active'));
}

// ════════════════════════════════════════════════════
//  접수 저장
// ════════════════════════════════════════════════════
async function submitEntry(){
  if(!currentSchedule){ showToast('⚠️ 예식을 먼저 선택하세요'); return; }

  const guestName = document.getElementById('guest-name').value.trim();
  const memo      = document.getElementById('memo-input').value.trim();
  const amount    = Number(document.getElementById('amount-input').value) || state.amount;

  const row = {
    schedule_id:   currentSchedule.id,
    side:          state.side === 'groom' ? '신랑측' : '신부측',
    payment_type:  state.payment === 'cash' ? '현금' : '계좌이체',
    guest_name:    guestName || null,
    relation:      state.relation || null,
    amount:        amount || null,
    adult_ticket:  state.adultTicket || 0,
    child_ticket:  state.childTicket || 0,
    memo:          memo || null,
    created_by:    currentUser.name,
  };

  try {
    const created = await sb.post('contribution_logs', row);
    const newLog = Array.isArray(created) ? created[0] : created;
    logs.unshift(newLog);
    renderStats();
    renderRecent();
    resetForm();
    showToast('✅ 접수 완료되었습니다');
  } catch(e){
    showToast('⚠️ 저장 실패: ' + e.message);
    console.error(e);
  }
}

// ════════════════════════════════════════════════════
//  대시보드 링크
// ════════════════════════════════════════════════════
function showDashboardLink(){
  if(!currentSchedule){ showToast('⚠️ 예식을 먼저 선택하세요'); return; }
  const token = currentSchedule.dashboard_token;
  const url = `${location.origin}/live.html?t=${token}`;
  document.getElementById('token-url-display').textContent = url;
  document.getElementById('token-modal').style.display = 'flex';
}

function copyDashboardLink(){
  const url = document.getElementById('token-url-display').textContent;
  navigator.clipboard.writeText(url).then(() => showToast('🔗 링크가 복사되었습니다'));
}

// ════════════════════════════════════════════════════
//  토스트
// ════════════════════════════════════════════════════
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2200);
}

// ════════════════════════════════════════════════════
//  초기화
// ════════════════════════════════════════════════════
(function init(){
  initLogin();
  const savedId = localStorage.getItem('dg_contrib_user');
  if(savedId){
    const user = USERS.find(u => u.id === Number(savedId));
    if(user){
      currentUser = user;
      document.getElementById('login-screen').style.display = 'none';
      goSelectSchedule();
    }
  }
})();
</script>
