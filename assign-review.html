<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 배정 리뷰 · 디어가드</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F3F4F6;color:#1F2937;min-height:100vh}
.page-wrap{max-width:760px;margin:0 auto}

/* 헤더 */
.hdr{background:#fff;border-bottom:1px solid #E5E7EB;padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200}
.hdr-back{background:none;border:none;font-size:22px;cursor:pointer;color:#C7A96B;line-height:1;padding:0 4px}
.hdr-title{font-size:17px;font-weight:800;color:#1F2937;letter-spacing:-.3px}
.hdr-badge{margin-left:auto;background:#FEF3C7;color:#92400E;font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px}

/* 문의 검토 */
.inq-section{margin:12px 16px;background:#fff;border-radius:14px;border:2px solid #C7A96B;overflow:hidden}
.inq-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.inq-header-title{font-size:15px;font-weight:800;color:#1F2937}
.inq-header-sub{font-size:11px;color:#9CA3AF;margin-top:1px}
.inq-toggle{font-size:18px;color:#C7A96B;transition:transform .25s}
.inq-toggle.open{transform:rotate(180deg)}
.inq-body{display:none;padding:0 16px 16px;border-top:1px solid #F3F4F6}
.inq-body.open{display:block}
.inq-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.inq-row-bottom{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
@media(max-width:360px){.inq-row-bottom{grid-template-columns:1fr}}
.inq-field label{font-size:11px;font-weight:700;color:#6B7280;display:block;margin-bottom:5px}
.inq-input{width:100%;border:1.5px solid #E5E7EB;border-radius:8px;padding:8px 10px;font-size:14px;font-weight:600;color:#1F2937;background:#F9FAFB}
.inq-input:focus{outline:none;border-color:#C7A96B}
.inq-time-wrap{display:flex;align-items:center;gap:4px}
.inq-time-wrap .inq-input{text-align:center}
.inq-colon{font-size:16px;font-weight:800;color:#374151}
.inq-btn{width:100%;margin-top:12px;background:linear-gradient(135deg,#C7A96B,#B8945A);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;transition:opacity .15s}
.inq-btn:hover{opacity:.88}
.inq-result{margin-top:14px}

/* 문의 결과 */
.inq-res-hdr{border-radius:12px 12px 0 0;padding:13px 16px}
.inq-res-hdr.ok{background:#059669;color:#fff}
.inq-res-hdr.warn{background:#D97706;color:#fff}
.inq-res-hdr.fail{background:#DC2626;color:#fff}
.inq-res-hdr-title{font-size:14px;font-weight:800}
.inq-res-hdr-sub{font-size:11px;opacity:.85;margin-top:3px}
.inq-res-body{border:2px solid transparent;border-top:none;border-radius:0 0 12px 12px;padding:14px}
.inq-res-body.ok{background:#F0FDF4;border-color:#86EFAC}
.inq-res-body.warn{background:#FFFBEB;border-color:#FCD34D}
.inq-res-body.fail{background:#FEF2F2;border-color:#FCA5A5}

/* 현재 배정 현황 박스 */
.cur-assign-box{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:14px;border:1px solid #E5E7EB}
.cur-assign-title{font-size:11px;font-weight:700;color:#6B7280;letter-spacing:.4px;margin-bottom:8px}
.cur-assign-row{display:flex;align-items:baseline;gap:8px;padding:4px 0;border-bottom:1px solid #F3F4F6;font-size:12px}
.cur-assign-row:last-child{border-bottom:none}
.cur-assign-time{font-weight:800;color:#1F2937;min-width:36px}
.cur-assign-hall{color:#374151;flex:1}
.cur-assign-mgr{color:#C7A96B;font-weight:700;text-align:right;font-size:11px}

/* 추천안 카드 */
.rec-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid #E5E7EB}
.rec-card:last-child{margin-bottom:0}
.rec-card.ok{border-left-color:#059669}
.rec-card.warn{border-left-color:#D97706}
.rec-card.fail{border-left-color:#DC2626}
.rec-card-rank{font-size:10px;font-weight:700;color:#9CA3AF;margin-bottom:6px;letter-spacing:.4px}
.rec-card-team{font-size:15px;font-weight:800;color:#1F2937;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.rec-status-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;white-space:nowrap}
.badge-ok{background:#D1FAE5;color:#065F46}
.badge-warn{background:#FEF3C7;color:#92400E}
.badge-fail{background:#FEE2E2;color:#991B1B}

.rec-assignments{background:#F9FAFB;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px}
.rec-assign-row{display:flex;align-items:flex-start;gap:6px;padding:3px 0;line-height:1.5}
.rec-assign-icon{flex-shrink:0;font-size:13px}
.rec-assign-text{flex:1;color:#374151}
.rec-assign-text b{color:#1F2937}
.rec-assign-tag{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:4px;vertical-align:middle}
.tag-keep{background:#D1FAE5;color:#065F46}
.tag-swap{background:#FEE2E2;color:#991B1B}
.tag-new{background:#DBEAFE;color:#1D4ED8}

.rec-prose{font-size:13px;color:#374151;line-height:1.8;margin-bottom:12px;padding:10px 12px;background:#F9FAFB;border-radius:8px;border-left:3px solid #E5E7EB}
.rec-prose.ok{border-left-color:#059669}
.rec-prose.warn{border-left-color:#D97706}
.rec-prose.fail{border-left-color:#DC2626}

.rec-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.rec-btn{border:none;border-radius:8px;padding:9px 6px;font-size:11px;font-weight:700;cursor:pointer;transition:opacity .15s;text-align:center}
.rec-btn:hover{opacity:.8}
.btn-keep{background:#F3F4F6;color:#6B7280}
.btn-apply{background:#059669;color:#fff}
.btn-manual{background:#1F2937;color:#C7A96B}

.inq-sec-label{font-size:11px;font-weight:700;color:#6B7280;letter-spacing:.4px;margin:10px 0 6px}

/* 날짜 바 */
.date-bar{background:#fff;padding:13px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #E5E7EB}
.date-lbl{font-size:13px;color:#6B7280;font-weight:600;white-space:nowrap}
.date-inp{border:1.5px solid #E5E7EB;border-radius:8px;padding:7px 12px;font-size:14px;font-weight:700;color:#1F2937;cursor:pointer;background:#F9FAFB;flex:1;max-width:180px}
.date-day{font-size:13px;color:#C7A96B;font-weight:700;white-space:nowrap}
.date-count{margin-left:auto;font-size:12px;color:#6B7280}

/* 예식 목록 */
.section{padding:12px 16px 0}
.section-title{font-size:12px;font-weight:700;color:#9CA3AF;letter-spacing:.5px;margin-bottom:8px}
.sched-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.sched-card{background:#fff;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.sched-time{font-size:15px;font-weight:900;color:#1F2937;min-width:42px}
.sched-info{flex:1;min-width:0}
.sched-couple{font-size:13px;font-weight:700;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sched-hall{font-size:11px;color:#6B7280;margin-top:1px}
.sched-mgrs{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.sched-mgr{background:#FDF4E3;border:1px solid #F0D9A0;border-radius:5px;padding:2px 6px;font-size:10px;font-weight:700;color:#92400E;white-space:nowrap}
.sched-mgr.back{background:#F0F9FF;border-color:#BAE6FD;color:#0369A1}
.empty-box{background:#fff;border-radius:12px;padding:32px;text-align:center;margin:8px 0}
.empty-box p{font-size:14px;color:#6B7280}

/* AI 리뷰 버튼 */
.ai-btn-wrap{padding:8px 16px 16px}
.ai-btn{width:100%;background:linear-gradient(135deg,#1F2937 0%,#374151 100%);color:#C7A96B;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.ai-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-btn:not(:disabled):hover{opacity:.9}
.pulse{display:inline-block;width:8px;height:8px;background:#C7A96B;border-radius:50%;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* 분석 중 */
.analyzing{display:none;padding:28px 16px;text-align:center}
.analyzing .spinner{width:36px;height:36px;border:3px solid #E5E7EB;border-top-color:#C7A96B;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.analyzing-msg{font-size:13px;color:#6B7280;font-weight:600}

/* AI 리뷰 결과 */
.result-wrap{display:none;padding:0 16px}
.result-summary{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:12px}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.result-header h3{font-size:15px;font-weight:800}
.result-header span{font-size:12px;color:#6B7280}
.result-counts{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.cnt-card{border-radius:10px;padding:10px 4px;text-align:center}
.cnt-card .num{font-size:22px;font-weight:900;line-height:1}
.cnt-card .lbl{font-size:10px;font-weight:700;margin-top:3px}
.cnt-total{background:#F3F4F6}.cnt-total .num{color:#374151}.cnt-total .lbl{color:#6B7280}
.cnt-pairs{background:#F0F4FF}.cnt-pairs .num{color:#3B4FC8}.cnt-pairs .lbl{color:#3B4FC8}
.cnt-safe{background:#ECFDF5}.cnt-safe .num{color:#059669}.cnt-safe .lbl{color:#065F46}
.cnt-warn{background:#FFFBEB}.cnt-warn .num{color:#D97706}.cnt-warn .lbl{color:#92400E}
.cnt-danger{background:#FEF2F2}.cnt-danger .num{color:#DC2626}.cnt-danger .lbl{color:#991B1B}

/* 위험/주의 카드 */
.detail-section{margin-bottom:12px}
.detail-title{font-size:12px;font-weight:700;color:#9CA3AF;letter-spacing:.5px;margin-bottom:8px}
.risk-card{border-radius:14px;padding:14px;margin-bottom:8px;border:2px solid transparent}
.risk-card.danger{background:#FFF5F5;border-color:#FECACA}
.risk-card.warning{background:#FFFDF0;border-color:#FDE68A}
.risk-card.safe{background:#F0FDF4;border-color:#BBF7D0}
.risk-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.risk-mgr{font-size:14px;font-weight:800;color:#1F2937}
.risk-role{font-size:10px;color:#6B7280;margin-top:2px}
.risk-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}
.badge-danger{background:#FEE2E2;color:#991B1B}
.badge-warning{background:#FEF3C7;color:#92400E}
.badge-safe{background:#D1FAE5;color:#065F46}
.risk-flow{display:flex;align-items:stretch;gap:6px;margin-bottom:10px}
.risk-venue{flex:1;min-width:0}
.risk-venue-time{font-size:17px;font-weight:900;color:#1F2937}
.risk-venue-name{font-size:12px;font-weight:700;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.risk-venue-sub{font-size:10px;color:#6B7280;margin-top:2px}
.risk-arrow{font-size:20px;color:#9CA3AF;align-self:center;flex-shrink:0}
.risk-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:rgba(0,0,0,.04);border-radius:8px;padding:10px}
.metric{text-align:center}
.metric-lbl{font-size:10px;color:#6B7280;font-weight:600;margin-bottom:2px}
.metric-val{font-size:14px;font-weight:900;color:#1F2937}
.metric-val.danger{color:#DC2626}
.metric-val.warning{color:#D97706}
.metric-val.safe{color:#059669}
.metric-src{font-size:9px;color:#9CA3AF;margin-top:1px}
.alt-btn{width:100%;margin-top:10px;background:#1F2937;color:#C7A96B;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer}
.alt-btn:hover{opacity:.85}
.alt-panel{display:none;margin-top:10px;background:#fff;border-radius:12px;padding:14px;border:2px solid #C7A96B}
.alt-panel-title{font-size:13px;font-weight:800;color:#C7A96B;margin-bottom:12px}
.alt-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.alt-side{border-radius:10px;padding:10px}
.alt-side.current{background:#FEF2F2;border:1px solid #FECACA}
.alt-side.suggest{background:#F0FDF4;border:1px solid #BBF7D0}
.alt-side-lbl{font-size:10px;font-weight:700;margin-bottom:5px}
.alt-side.current .alt-side-lbl{color:#991B1B}
.alt-side.suggest .alt-side-lbl{color:#065F46}
.alt-side-mgr{font-size:12px;font-weight:800;color:#1F2937;margin-bottom:3px}
.alt-side-buf{font-size:14px;font-weight:900}
.alt-side.current .alt-side-buf{color:#DC2626}
.alt-side.suggest .alt-side-buf{color:#059669}
.alt-reasons{margin-bottom:12px}
.alt-reasons-lbl{font-size:10px;font-weight:700;color:#6B7280;margin-bottom:6px}
.alt-reason{font-size:12px;color:#374151;padding:4px 0;border-bottom:1px solid #F3F4F6}
.alt-reason:last-child{border-bottom:none}
.alt-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-alt-keep{background:#F3F4F6;color:#6B7280;border:none;border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer}
.btn-alt-apply{background:#059669;color:#fff;border:none;border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer}

.safe-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.safe-item{background:#fff;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.safe-dot{width:8px;height:8px;border-radius:50%;background:#059669;flex-shrink:0}
.safe-info{flex:1;min-width:0}
.safe-mgr{font-size:12px;font-weight:700;color:#374151}
.safe-route{font-size:11px;color:#6B7280;margin-top:1px}
.safe-buf{font-size:13px;font-weight:800;color:#059669;white-space:nowrap}
.notice{margin:0 0 24px;background:#EFF6FF;border-radius:10px;padding:12px 14px;border:1px solid #BFDBFE}
.notice p{font-size:12px;color:#1E40AF;line-height:1.7}

/* 토스트 */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1F2937;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){
  .result-counts{grid-template-columns:repeat(3,1fr)}
  .rec-actions{grid-template-columns:1fr}
  .alt-compare{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="page-wrap">

<div class="hdr">
  <button class="hdr-back" onclick="history.back()">←</button>
  <div class="hdr-title">🤖 AI 배정 리뷰</div>
  <div class="hdr-badge">Beta</div>
</div>

<!-- 신규 문의 검토 -->
<div class="inq-section">
  <div class="inq-header" onclick="toggleInq()">
    <div>
      <div class="inq-header-title">📋 신규 문의 배정 검토</div>
      <div class="inq-header-sub">날짜·시간·지역 입력 → 교체안 즉시 분석</div>
    </div>
    <div class="inq-toggle" id="inqToggle">▼</div>
  </div>
  <div class="inq-body" id="inqBody">
    <div class="inq-row">
      <div class="inq-field">
        <label>예식 날짜</label>
        <input class="inq-input" type="date" id="inq-date">
      </div>
      <div class="inq-field">
        <label>예식 시간</label>
        <div class="inq-time-wrap">
          <select class="inq-input" id="inq-hour" style="flex:1">
            <option>09</option><option>10</option><option>11</option>
            <option selected>12</option><option>13</option><option>14</option>
            <option>15</option><option>16</option><option>17</option><option>18</option>
          </select>
          <span class="inq-colon">:</span>
          <select class="inq-input" id="inq-min" style="flex:1">
            <option value="0">00</option><option value="10">10</option>
            <option value="20">20</option><option value="30">30</option>
            <option value="40">40</option><option value="50">50</option>
          </select>
        </div>
      </div>
    </div>
    <div class="inq-row-bottom">
      <div class="inq-field">
        <label>예식장</label>
        <select class="inq-input" id="inq-venue" onchange="onInqVenueChange()">
          <option value="">로딩 중…</option>
        </select>
      </div>
      <div class="inq-field">
        <label>운영 구분</label>
        <select class="inq-input" id="inq-optype">
          <option value="단측">단측</option>
          <option value="양측">양측</option>
        </select>
      </div>
    </div>
    <!-- 기타 선택 시 지역 직접 입력 -->
    <div id="inq-region-row" style="display:none;margin-top:8px">
      <div class="inq-field">
        <label>지역 (기타 선택 시)</label>
        <select class="inq-input" id="inq-region">
          <option>대전</option><option>천안</option><option>청주</option>
          <option>세종</option><option>아산</option>
        </select>
      </div>
    </div>
    <button class="inq-btn" onclick="checkInquiry()">🔍 배정 가능 여부 확인</button>
    <div class="inq-result" id="inqResult"></div>
  </div>
</div>

<!-- 날짜 선택 -->
<div class="date-bar">
  <span class="date-lbl">날짜</span>
  <input class="date-inp" type="date" id="dateInp" onchange="onDateChange()">
  <span class="date-day" id="dateDayLbl"></span>
  <span class="date-count" id="dateCountLbl"></span>
</div>

<!-- 예식 목록 -->
<div class="section">
  <div class="section-title">당일 배정 현황</div>
  <div id="schedList"></div>
</div>

<!-- AI 리뷰 버튼 -->
<div class="ai-btn-wrap">
  <button class="ai-btn" id="aiBtnMain" onclick="startReview()" disabled>
    <span class="pulse"></span>🤖 AI 일정 리뷰 시작
  </button>
</div>

<div class="analyzing" id="analyzingBox">
  <div class="spinner"></div>
  <div class="analyzing-msg" id="analyzingMsg">이동시간 계산 중…</div>
</div>

<div class="result-wrap" id="resultWrap">
  <div class="result-summary">
    <div class="result-header">
      <h3>전체 분석 결과</h3>
      <span id="resultDateLbl"></span>
    </div>
    <div class="result-counts">
      <div class="cnt-card cnt-total"><div class="num" id="cntTotal">-</div><div class="lbl">예식</div></div>
      <div class="cnt-card cnt-pairs"><div class="num" id="cntPairs">-</div><div class="lbl">이동구간</div></div>
      <div class="cnt-card cnt-safe"><div class="num" id="cntSafe">-</div><div class="lbl">🟢 가능</div></div>
      <div class="cnt-card cnt-warn"><div class="num" id="cntWarn">-</div><div class="lbl">🟡 주의</div></div>
      <div class="cnt-card cnt-danger"><div class="num" id="cntDanger">-</div><div class="lbl">🔴 불가</div></div>
    </div>
  </div>
  <div id="riskSection"></div>
  <div id="safeSection"></div>
  <div class="notice" id="travelNotice"></div>
</div>

</div><!-- page-wrap -->
<div class="toast" id="toast"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONFIG

const SB_H=()=>({'Content-Type':'application/json','apikey':CONFIG.SUPABASE_KEY,'Authorization':`Bearer ${CONFIG.SUPABASE_KEY}`});
async function sbGet(t,q=''){const r=await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/${t}${q}`,{headers:SB_H()});if(!r.ok)throw new Error(r.status);return r.json();}
async function sbPost(t,b){const r=await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/${t}`,{method:'POST',headers:{...SB_H(),'Prefer':'return=representation'},body:JSON.stringify(b)});const d=await r.json();return Array.isArray(d)?d[0]:d;}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let venuesByName={};
async function loadVenues(){try{const r=await sbGet('venues');r.forEach(v=>{venuesByName[v.name]=v;});}catch(e){}}
async function ensureVenue(hall,address){
  if(venuesByName[hall])return venuesByName[hall];
  if(!CONFIG.KAKAO_KEY)return null;
  try{
    const url=`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(address||hall)}`;
    const r=await fetch(url,{headers:{Authorization:`KakaoAK ${CONFIG.KAKAO_KEY}`}});
    const d=await r.json();
    if(d.documents?.[0]){
      const doc=d.documents[0];
      const geo={lat:parseFloat(doc.y),lng:parseFloat(doc.x)};
      const reg=extractRegion(address||hall);
      const v=await sbPost('venues',{name:hall,address:address||null,lat:geo.lat,lng:geo.lng,region:reg||null});
      if(v?.id)venuesByName[hall]=v;
      return v;
    }
  }catch(e){}
  return null;
}
async function kakaoDir(fromV,toV,dateStr,deptMins){
  const dt=new Date(dateStr+'T00:00:00');dt.setMinutes(dt.getMinutes()+deptMins);
  const p=n=>String(n).padStart(2,'0');
  const ts=`${dt.getFullYear()}${p(dt.getMonth()+1)}${p(dt.getDate())}${p(dt.getHours())}${p(dt.getMinutes())}`;
  const url=`https://apis-navi.kakaomobility.com/v1/directions?origin=${fromV.lng},${fromV.lat}&destination=${toV.lng},${toV.lat}&departure_time=${ts}&priority=RECOMMEND`;
  const r=await fetch(url,{headers:{Authorization:`KakaoAK ${CONFIG.KAKAO_KEY}`}});
  if(!r.ok)throw new Error(r.status);
  const d=await r.json();
  const secs=d.routes?.[0]?.summary?.duration;
  if(!secs)throw new Error('no route');
  return Math.ceil(secs/60);
}
async function getTravelMins(fromV,toV,dateStr,deptMins){
  if(fromV?.id===toV?.id)return 8;
  const wday=new Date(dateStr+'T00:00:00').getDay();
  const hour=Math.floor(deptMins/60);
  // 캐시 확인
  if(fromV?.id&&toV?.id){
    try{
      const rows=await sbGet('travel_time_cache',`?from_venue_id=eq.${fromV.id}&to_venue_id=eq.${toV.id}&weekday=eq.${wday}&departure_hour=eq.${hour}&select=travel_minutes`);
      if(rows?.[0]?.travel_minutes!=null)return rows[0].travel_minutes;
    }catch(e){}
    // Kakao API
    try{
      const mins=await kakaoDir(fromV,toV,dateStr,deptMins);
      try{await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/travel_time_cache`,{method:'POST',headers:{...SB_H(),'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({from_venue_id:fromV.id,to_venue_id:toV.id,weekday:wday,departure_hour:hour,travel_minutes:mins})});}catch(e){}
      return mins;
    }catch(e){}
  }
  // 폴백
  const r1=fromV?.region||'',r2=toV?.region||'';
  return TRAVEL_FALLBACK[`${r1}-${r2}`]||TRAVEL_FALLBACK[`${r2}-${r1}`]||35;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function toMins(t){const[h,m]=(t||'00:00').split(':').map(Number);return h*60+m;}
function fromMins(m){return`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;}
function extractRegion(addr=''){
  const C=['서울','인천','대전','대구','부산','광주','울산','수원','성남','고양','천안','청주','전주','창원','세종','아산','평택','용인'];
  for(const c of C)if(addr.includes(c))return c;
  return '';
}
// 여유시간 기준: 🔴 10분 미만 / 🟡 10~19분 / 🟢 20분 이상
function getStatus(buf){return buf>=20?'safe':buf>=10?'warning':'danger';}
function statusLabel(status){
  return{
    safe:'🟢 가능', warning:'🟡 주의', danger:'🔴 불가',
    ok:'🟢 배정 가능', warn:'🟡 교체 필요', fail:'🔴 배정 불가', unavail:'🔴 불가 등록'
  }[status]||'';
}
function travelEst(r1,r2){if(!r1||!r2||r1===r2)return 10;return TRAVEL_FALLBACK[`${r1}-${r2}`]||TRAVEL_FALLBACK[`${r2}-${r1}`]||35;}
function regionFromHall(hall=''){return extractRegion(hall);}

let schedules=[];
let unavailableMgrs=new Set();

async function fetchSchedules(dateStr){
  try{
    const rows=await sbGet('schedules',`?date=eq.${dateStr}&select=id,groom_name,bride_name,hall,address,time,front_manager,back_manager&order=time.asc`);
    schedules=rows.map(r=>({
      id:r.id,couple:`${r.groom_name||''} ♥ ${r.bride_name||''}`,
      hall:r.hall||'',address:r.address||'',time:(r.time||'').slice(0,5),
      frontManager:r.front_manager||'',backManager:r.back_manager||'',venue:null,
    }));
    return true;
  }catch(e){return false;}
}
async function fetchUnavailables(dateStr){
  try{const r=await sbGet('unavailable_schedules',`?date=eq.${dateStr}&select=manager_name`);unavailableMgrs=new Set(r.map(x=>x.manager_name).filter(Boolean));}
  catch(e){unavailableMgrs=new Set();}

// AI 리뷰 (기존 배정 이동시간 분석)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function analyzeSchedules(dateStr){
  const halls=[...new Set(schedules.map(s=>s.hall).filter(Boolean))];
  for(const hall of halls){
    const s=schedules.find(x=>x.hall===hall);
    const v=await ensureVenue(hall,s?.address||'');
    schedules.forEach(x=>{if(x.hall===hall)x.venue=v;});
  }
  const byMgr={};
  const add=(f,sched,role)=>{if(!f)return;f.split(',').map(m=>m.trim()).filter(Boolean).forEach(m=>{if(!byMgr[m])byMgr[m]=[];byMgr[m].push({...sched,role});});};
  schedules.forEach(s=>{add(s.frontManager,s,'앞');if(s.backManager&&s.backManager!==s.frontManager)add(s.backManager,s,'뒤');});
  const pairs=[];
  for(const[mgr,list]of Object.entries(byMgr)){
    list.sort((a,b)=>toMins(a.time)-toMins(b.time));
    for(let i=0;i<list.length-1;i++){
      const prev=list[i],next=list[i+1];
      const departure=toMins(prev.time)+50,arrTarget=toMins(next.time)-80;
      const available=arrTarget-departure;
      const travel=await getTravelMins(prev.venue,next.venue,dateStr,departure);
      const buffer=available-travel,status=getStatus(buffer);
      const usedKakao=!!(prev.venue?.lat&&next.venue?.lat);
      pairs.push({mgr,role:`${prev.role}→${next.role}`,prev,next,departure,arrTarget,available,travel,buffer,status,usedKakao});
    }
  }
  return pairs;
}

function toggleAlt(id){const el=document.getElementById(id);if(el)el.style.display=el.style.display==='block'?'none':'block';}

function findAltManager(p){
  const assignedMgrs=new Set();
  schedules.forEach(s=>{s.frontManager&&s.frontManager.split(',').forEach(m=>assignedMgrs.add(m.trim()));s.backManager&&s.backManager.split(',').forEach(m=>assignedMgrs.add(m.trim()));});
  const candidates=[...assignedMgrs].filter(m=>m!==p.mgr&&!unavailableMgrs.has(m));
  if(!candidates.length)return null;
  const targetRegion=p.prev.venue?.region||'';
  const sorted=candidates.sort((a,b)=>{
    const aReg=schedules.find(s=>(s.frontManager||'').includes(a)||(s.backManager||'').includes(a))?.venue?.region||'';
    const bReg=schedules.find(s=>(s.frontManager||'').includes(b)||(s.backManager||'').includes(b))?.venue?.region||'';
    return((bReg===targetRegion?1:0)+(COUPLE_PAIRS[b]?1:0))-((aReg===targetRegion?1:0)+(COUPLE_PAIRS[a]?1:0));
  });
  const alt=sorted[0];
  const altReg=schedules.find(s=>(s.frontManager||'').includes(alt)||(s.backManager||'').includes(alt))?.venue?.region||'';
  const estBuf=p.available-(travelEst(altReg,p.next.venue?.region||'')||20);
  if(estBuf<=p.buffer)return null;
  const reasons=['✅ 여유시간 개선'];
  if(altReg===targetRegion)reasons.push('✅ 같은 지역 배정');
  const partner=COUPLE_PAIRS[alt];
  if(partner&&assignedMgrs.has(partner))reasons.push('✅ 부부세트 유지');
  return{name:alt,buffer:estBuf,reasons};
}

function toggleInq(){const b=document.getElementById('inqBody'),t=document.getElementById('inqToggle');const o=b.classList.toggle('open');t.classList.toggle('open',o);}

// 기존 스케줄 목록에서 팀이 담당하는 예식들을 가져옴
function getTeamExisting(mgrList,mgrMap){
  const seen=new Set();const result=[];
  mgrList.forEach(mgr=>{(mgrMap[mgr]||[]).forEach(s=>{const key=`${s.time}-${s.hall}`;if(!seen.has(key)){seen.add(key);result.push(s);}});});
  return result.sort((a,b)=>toMins(a.time)-toMins(b.time));
}

// 팀이 기존 예식들 + 신규 문의를 모두 소화할 수 있는지 확인
// 반환: {ok, buffer, fitType, detail} or null
// travelFn(hall, region) → 이동시간(분). 없으면 지역 추정값 사용
function tryFitWithExisting(existing,inqTime,inqRegion,travelFn){
  const mustArr=inqTime-80,canLeave=inqTime+50;
  if(!existing.length)return{ok:true,buffer:999,fitType:'free'};
  const getTrv=(hall,region)=>travelFn?travelFn(hall,region):travelEst(inqRegion,region||regionFromHall(hall));
  let best=null;
  // 문의 먼저 → 기존 첫번째
  if(inqTime<toMins(existing[0].time)){
    const f=existing[0];
    const t=getTrv(f.hall,f.region);
    const buf=(toMins(f.time)-80)-canLeave-t;
    if(!best||buf>best.buffer)best={ok:buf>=10,buffer:buf,fitType:'before',travel:t,next:f,
      fromVenue:'신규 예식장',toVenue:f.hall||f.time};
  }
  // 기존 마지막 → 문의
  const last=existing[existing.length-1];
  if(inqTime>toMins(last.time)){
    const t=getTrv(last.hall,last.region);
    const buf=mustArr-(toMins(last.time)+50)-t;
    if(!best||buf>best.buffer)best={ok:buf>=10,buffer:buf,fitType:'after',travel:t,prev:last,
      fromVenue:last.hall||last.time,toVenue:'신규 예식장'};
  }
  // 사이에 끼우기
  for(let i=0;i<existing.length-1;i++){
    const prev=existing[i],next=existing[i+1];
    if(inqTime>toMins(prev.time)&&inqTime<toMins(next.time)){
      const tA=getTrv(prev.hall,prev.region);
      const tB=getTrv(next.hall,next.region);
      const bA=mustArr-(toMins(prev.time)+50)-tA;
      const bB=(toMins(next.time)-80)-canLeave-tB;
      const buf=Math.min(bA,bB);
      if(bA>=0&&bB>=0&&(!best||buf>best.buffer))best={ok:buf>=10,buffer:buf,fitType:'between',
        prev,next,tA,tB,bA,bB,fromVenue:prev.hall,toVenue:next.hall};
    }
  }
  return best;
}

async function checkInquiry(){
  const dateStr=document.getElementById('inq-date').value;
  const hour=parseInt(document.getElementById('inq-hour').value);
  const min=parseInt(document.getElementById('inq-min').value);
  const venueName=document.getElementById('inq-venue').value;
  const opType=document.getElementById('inq-optype').value;
  const el=document.getElementById('inqResult');
  if(!dateStr){showToast('날짜를 입력해주세요');return;}
  if(!venueName){showToast('예식장을 선택해주세요');return;}

  el.innerHTML=`<div style="text-align:center;padding:20px;color:#6B7280;font-size:13px">⏳ 확인 중…</div>`;
  const inqTime=hour*60+min,canLeave=inqTime+50,timeStr=fromMins(inqTime);

  // ── 예식장 객체 조회 / 생성 ──
  let inqVenueObj=venuesByName[venueName]||null;
  let inqRegion='';
  if(venueName==='__other__'){
    inqRegion=document.getElementById('inq-region').value||'기타';
  } else {
    if(!inqVenueObj){
      // 해당 날짜 스케줄에서 주소 찾기
      const tempRows=await sbGet('schedules',`?hall=eq.${encodeURIComponent(venueName)}&select=address&limit=1`).catch(()=>[]);
      if(tempRows[0]?.address) inqVenueObj=await ensureVenue(venueName,tempRows[0].address);
    }
    inqRegion=inqVenueObj?.region||regionFromHall(venueName)||'';
  }

  const[unavRows,schedRows]=await Promise.all([
    sbGet('unavailable_schedules',`?date=eq.${dateStr}&select=manager_name`).catch(()=>[]),
    sbGet('schedules',`?date=eq.${dateStr}&select=id,hall,address,time,front_manager,back_manager,groom_name,bride_name&order=time.asc`).catch(()=>[]),
  ]);
  const unavSet=new Set(unavRows.map(r=>r.manager_name).filter(Boolean));

  // ── Kakao API로 이동시간 사전 계산 ──
  // 신규 예식장 ↔ 기존 예식장들 이동시간 (canLeave 시간 기준)
  const travelCache=new Map(); // hall → minutes
  const uniqueHalls=[...new Set(schedRows.map(r=>r.hall).filter(Boolean))];
  for(const hall of uniqueHalls){
    if(hall===venueName){travelCache.set(hall,5);continue;}
    let existObj=venuesByName[hall]||null;
    if(!existObj){
      const sr=schedRows.find(r=>r.hall===hall);
      if(sr?.address) existObj=await ensureVenue(hall,sr.address);
    }
    let mins;
    if(inqVenueObj?.lat&&existObj?.lat){
      try{
        el.innerHTML=`<div style="text-align:center;padding:20px;color:#6B7280;font-size:13px">⏳ 이동시간 계산 중: ${venueName||'신규'} ↔ ${hall}…</div>`;
        mins=await getTravelMins(inqVenueObj,existObj,dateStr,canLeave);
      }catch(e){
        mins=travelEst(inqRegion,existObj?.region||regionFromHall(hall));
      }
    } else {
      mins=travelEst(inqRegion,existObj?.region||regionFromHall(hall));
    }
    travelCache.set(hall,mins);
  }
  // travelFn: 예식장 이름 → 이동시간
  const travelFn=(hall,region)=>travelCache.has(hall)?travelCache.get(hall):travelEst(inqRegion,region||regionFromHall(hall));

  el.innerHTML=`<div style="text-align:center;padding:20px;color:#6B7280;font-size:13px">⏳ 배정 분석 중…</div>`;

  // ── 매니저별 예식 맵 ──
  const mgrMap={};
  schedRows.forEach(r=>{
    const hall=r.hall||'',rg=regionFromHall(hall);
    const add=(f)=>{if(!f)return;f.split(',').map(m=>m.trim()).filter(Boolean).forEach(m=>{if(!mgrMap[m])mgrMap[m]=[];mgrMap[m].push({time:(r.time||'').slice(0,5),hall,region:rg,id:r.id});});};
    add(r.front_manager);add(r.back_manager);
  });

  // 현재 배정 현황 포맷
  const curAssignHtml=schedRows.length?schedRows.map(r=>{
    const mgrs=[r.front_manager,r.back_manager].filter(Boolean).join(' / ');
    return`<div class="cur-assign-row"><span class="cur-assign-time">${(r.time||'').slice(0,5)}</span><span class="cur-assign-hall">${r.hall||'미정'}</span><span class="cur-assign-mgr">${mgrs||'-'}</span></div>`;
  }).join(''):`<div style="font-size:12px;color:#9CA3AF;text-align:center;padding:8px">당일 배정된 예식 없음</div>`;

  const scenarios=[];

  for(const[mA,mB]of COUPLE_LIST){
    if(unavSet.has(mA)||unavSet.has(mB)){
      scenarios.push({team:`${mA} ♥ ${mB}`,teamList:[mA,mB],status:'unavail'});
      continue;
    }
    const existing=getTeamExisting([mA,mB],mgrMap);
    const directFit=tryFitWithExisting(existing,inqTime,inqRegion,travelFn);
    if(directFit&&directFit.buffer>=10){
      scenarios.push({team:`${mA} ♥ ${mB}`,teamList:[mA,mB],isCouple:true,
        status:directFit.buffer>=20?'ok':'warn',buffer:directFit.buffer,
        swapNeeded:false,existing,directFit,inqVenueName:venueName,
        existingChanges:existing.map(s=>({...s,action:'유지'}))});
      continue;
    }
    let bestSwap=null;
    for(let i=0;i<existing.length;i++){
      const dropSched=existing[i];
      const remaining=existing.filter((_,j)=>j!==i);
      const swapFit=tryFitWithExisting(remaining,inqTime,inqRegion,travelFn);
      if(!swapFit||swapFit.buffer<10)continue;
      let replacer=null;
      for(const[rA,rB]of COUPLE_LIST){
        if(rA===mA||rB===mB)continue;
        if(unavSet.has(rA)||unavSet.has(rB))continue;
        const rExisting=getTeamExisting([rA,rB],mgrMap);
        const rFit=tryFitWithExisting(rExisting,toMins(dropSched.time),dropSched.region||regionFromHall(dropSched.hall));
        if(rFit&&rFit.buffer>=10){replacer={team:`${rA} ♥ ${rB}`,fit:rFit};break;}
      }
      if(replacer&&(!bestSwap||swapFit.buffer>bestSwap.swapFit.buffer))bestSwap={dropSched,replacer,swapFit};
    }
    if(bestSwap){
      const ec=existing.map(s=>s===bestSwap.dropSched?{...s,action:'교체',by:bestSwap.replacer.team}:{...s,action:'유지'});
      scenarios.push({team:`${mA} ♥ ${mB}`,teamList:[mA,mB],isCouple:true,
        status:bestSwap.swapFit.buffer>=20?'ok':'warn',buffer:bestSwap.swapFit.buffer,
        swapNeeded:true,swapSched:bestSwap.dropSched,swapReplacer:bestSwap.replacer,
        existing,directFit:bestSwap.swapFit,inqVenueName:venueName,existingChanges:ec});
    } else {
      scenarios.push({team:`${mA} ♥ ${mB}`,teamList:[mA,mB],isCouple:true,
        status:'fail',existing,inqVenueName:venueName,existingChanges:existing.map(s=>({...s,action:'충돌'}))});
    }
  }

  const order={ok:0,warn:1,fail:2,unavail:3};
  scenarios.sort((a,b)=>{
    if(order[a.status]!==order[b.status])return order[a.status]-order[b.status];
    if(!a.swapNeeded&&b.swapNeeded)return-1;
    if(a.swapNeeded&&!b.swapNeeded)return 1;
    return(b.buffer||0)-(a.buffer||0);
  });

  renderInqResult(scenarios,curAssignHtml,dateStr,inqTime,timeStr,inqRegion,opType,el);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 문의 예식장 드롭다운 로드
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function loadInqVenues(){
  try{
    const rows=await sbGet('schedules','?select=hall&not.hall.is.null&order=hall.asc&limit=500');
    const halls=[...new Set(rows.map(r=>r.hall).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ko'));
    const sel=document.getElementById('inq-venue');
    if(!sel)return;
    sel.innerHTML='<option value="">예식장 선택…</option>';
    halls.forEach(h=>{
      const o=document.createElement('option');
      o.value=h; o.textContent=h;
      sel.appendChild(o);
    });
    const other=document.createElement('option');
    other.value='__other__'; other.textContent='기타 (지역 직접 선택)';
    sel.appendChild(other);
  }catch(e){
    const sel=document.getElementById('inq-venue');
    if(sel) sel.innerHTML='<option value="__other__">직접 입력</option>';
    document.getElementById('inq-region-row').style.display='block';
  }
}

function onInqVenueChange(){
  const val=document.getElementById('inq-venue').value;
  document.getElementById('inq-region-row').style.display=(val==='__other__')?'block':'none';
}

// 시나리오별 배지 텍스트
function inqStatusLabel(sc){
  if(sc.status==='unavail') return '⛔ 불가 등록';
  if(sc.status==='fail')    return '🔴 신규 문의 수용 불가';
  if(sc.swapNeeded)         return '🟡 기존 예식 교체 필요';
  if(!(sc.existing?.length))return '🟢 당일 여유 — 바로 투입 가능';
  return '🟢 신규+기존 모두 가능';
}
// 배지 CSS 클래스
function inqBadgeCls(sc){
  if(sc.status==='fail'||sc.status==='unavail') return 'fail';
  if(sc.swapNeeded) return 'warn';
  return 'ok';
}

function buildProse(sc,inqTime,region){
  const timeStr=fromMins(inqTime);
  const team=sc.team;

  if(sc.status==='unavail') return `${team}는 해당 날짜에 불가 일정이 등록되어 있어 배정할 수 없습니다.`;

  const existing=sc.existing||[];
  const existList=existing.map(s=>`${s.time} ${s.hall||''}`).join(', ');

  if(sc.status==='fail'){
    if(!existing.length) return `${team}는 현재 가용 팀이 없어 신규 문의 수용이 불가합니다.`;
    return `${team}는 현재 <b>${existList}</b> 예식이 배정되어 있습니다. 신규 ${timeStr} ${region} 예식과 시간 조율을 검토했으나, 이동 여유시간 부족 또는 구조적 충돌로 수용이 어렵습니다. 기존 배정을 유지하면서 신규 문의를 받기 위한 방법이 없습니다.`;
  }

  const buf=sc.buffer||0;
  const bufStr=buf>=999?'충분':buf+'분';

  // 기존 예식 없음 → 자유 투입
  if(!existing.length){
    return `${team}는 해당 날짜에 배정된 예식이 없습니다. 신규 ${timeStr} ${region} 예식에 제약 없이 투입할 수 있으며, 기존 예식 교체가 필요하지 않아 가장 단순한 배정안입니다.`;
  }

  // 기존 예식 있음 + 교체 불필요
  if(!sc.swapNeeded){
    const fitType=sc.directFit?.fitType||'';
    const travelMins=sc.directFit?.travel;
    const firstExist=existing[0];
    const lastExist=existing[existing.length-1];
    const inqVName=sc.inqVenueName||'신규 예식장';
    let timing='';
    if(fitType==='before'&&firstExist){
      const dep=fromMins(inqTime+50);
      const arr=fromMins(toMins(firstExist.time)-80);
      const bufLabel=buf>=20?'🟢 가능':buf>=10?'🟡 주의':'🔴 불가';
      timing=`<br><b>${inqVName} → ${firstExist.hall||firstExist.time}</b><br>철수 ${dep} 출발, 도착 목표 ${arr}${travelMins!=null?`, 예상 이동시간 ${travelMins}분`:''}, 여유시간 ${bufStr} ${bufLabel}`;
    } else if(fitType==='after'&&lastExist){
      const dep=fromMins(toMins(lastExist.time)+50);
      const arr=fromMins(inqTime-80);
      const bufLabel=buf>=20?'🟢 가능':buf>=10?'🟡 주의':'🔴 불가';
      timing=`<br><b>${lastExist.hall||lastExist.time} → ${inqVName}</b><br>철수 ${dep} 출발, 도착 목표 ${arr}${travelMins!=null?`, 예상 이동시간 ${travelMins}분`:''}, 여유시간 ${bufStr} ${bufLabel}`;
    } else if(fitType==='between'){
      const bA=sc.directFit?.bA,bB=sc.directFit?.bB;
      timing=`<br>기존 예식 사이 편성 — 전 구간 여유시간 최소 ${bufStr}`;
      if(bA!=null&&bB!=null) timing+=` (앞 ${bA}분 / 뒤 ${bB}분)`;
    }
    return `${team}는 현재 <b>${existList}</b> 예식이 배정되어 있습니다.${timing}<br>기존 예식 일정을 교체하지 않고 신규 예식을 함께 수행할 수 있습니다.`;
  }

  // 기존 예식 있음 + 교체 필요
  const dropH=sc.swapSched?.hall||sc.swapSched?.time||'';
  const dropT=sc.swapSched?.time||'';
  const repl=sc.swapReplacer?.team||'';
  const keepList=existing.filter(s=>s!==sc.swapSched).map(s=>`${s.time} ${s.hall||''}`).join(', ');
  let prose=`${team}는 현재 <b>${existList}</b> 예식이 배정되어 있습니다. 신규 ${timeStr} ${region} 예식 투입 시 기존 <b>${dropH}(${dropT})</b> 예식과 이동 시간이 겹쳐 함께 수행하기 어렵습니다.`;
  if(repl) prose+=` <b>${dropH}(${dropT})</b> 담당을 <b>${repl}</b>로 교체하면 신규 문의를 수용할 수 있습니다.`;
  if(keepList) prose+=` 나머지 기존 예식(${keepList})은 ${team}가 그대로 담당합니다.`;
  return prose;
}

function renderInqResult(scenarios,curAssignHtml,dateStr,inqTime,timeStr,region,opType,el){
  const d=new Date(dateStr+'T00:00:00');
  const dayKr=DAY_KR[d.getDay()];
  const isBothSide=(opType==='양측');
  const okList=scenarios.filter(s=>s.status==='ok');
  const warnList=scenarios.filter(s=>s.status==='warn');
  const failList=scenarios.filter(s=>s.status==='fail'||s.status==='unavail');

  // 전체 상태 판정 (단측: 1팀, 양측: 2팀 필요)
  let overallSt;
  if(isBothSide){ const tot=okList.length+warnList.length; overallSt=okList.length>=2?'ok':tot>=2?'warn':'fail'; }
  else { overallSt=okList.length>0?'ok':warnList.length>0?'warn':'fail'; }
  const overallEmoji={ok:'✅',warn:'⚠️',fail:'❌'}[overallSt];
  const overallTxt={ok:'배정 가능',warn:'타이트 (주의 필요)',fail:'배정 불가'}[overallSt];
  const opLabel=isBothSide?'양측 (4인)':'단측 (2인)';

  const changesFor=(sc)=>sc.existingChanges?.length?sc.existingChanges.map(c=>{
    if(c.action==='유지')return`<div class="rec-assign-row"><span class="rec-assign-icon">📌</span><div class="rec-assign-text"><b>${c.hall||c.time}(${c.time})</b> <span class="rec-assign-tag tag-keep">유지</span></div></div>`;
    if(c.action==='교체')return`<div class="rec-assign-row"><span class="rec-assign-icon">🔄</span><div class="rec-assign-text"><b>${c.hall||c.time}(${c.time})</b> <span class="rec-assign-tag tag-swap">교체 필요</span> → ${c.by||'대체팀'}</div></div>`;
    return`<div class="rec-assign-row"><span class="rec-assign-icon">⚠️</span><div class="rec-assign-text"><b>${c.hall||c.time}</b> <span class="rec-assign-tag tag-swap">시간 충돌</span></div></div>`;
  }).join(''):'<div class="rec-assign-row"><span class="rec-assign-icon">✨</span><div class="rec-assign-text">기존 예식 없음 — 신규 단독 투입</div></div>';

  // ── 단측 카드 ──
  const singleCards=[...okList,...warnList].slice(0,3).map((sc,i)=>{
    const st=sc.status;
    const badge=inqStatusLabel(sc);
    const badgeCls=inqBadgeCls(sc);
    const cardCls=sc.swapNeeded?'warn':st;
    return`<div class="rec-card ${cardCls}">
      <div class="rec-card-rank">추천안 ${i+1}</div>
      <div class="rec-card-team">${sc.team}<span class="rec-status-badge badge-${badgeCls}">${badge}</span></div>
      <div class="rec-assignments">
        <div class="rec-assign-row"><span class="rec-assign-icon">🆕</span><div class="rec-assign-text"><b>신규 ${timeStr} ${region}</b> <span class="rec-assign-tag tag-new">신규 배정</span></div></div>
        ${changesFor(sc)}
      </div>
      <div class="rec-prose ${cardCls}">${buildProse(sc,inqTime,region)}</div>
      <div class="rec-actions">
        <button class="rec-btn btn-keep" onclick="showToast('현재 배정 유지')">현재 유지</button>
        <button class="rec-btn btn-apply" onclick="showToast('✅ ${sc.team} 배정 완료 (관리자 확인 필요)')">추천안 적용</button>
        <button class="rec-btn btn-manual" onclick="showToast('수동 조정 모드')">수동 조정</button>
      </div>
    </div>`;
  }).join('');

  // ── 양측 카드 (2팀 조합) ──
  const pool=[...okList,...warnList];
  const bothCards=(()=>{
    if(pool.length<2) return`<div class="rec-card fail"><div class="rec-card-rank">추천안</div><div class="rec-card-team" style="color:#DC2626">양측 배정 불가<span class="rec-status-badge badge-fail">🔴 배정 불가</span></div><div class="rec-prose fail">현재 가용 팀이 ${pool.length}팀으로, 양측 운영에 필요한 2팀이 부족합니다.</div></div>`;
    const combos=[];
    for(let i=0;i<pool.length-1&&combos.length<3;i++){
      for(let j=i+1;j<pool.length&&combos.length<3;j++){
        const t1=pool[i],t2=pool[j];
        const st=(t1.status==='ok'&&t2.status==='ok')?'ok':'warn';
        combos.push({t1,t2,st});
      }
    }
    return combos.map((c,i)=>{
      const {t1,t2,st}=c;
      const swapNeeded=t1.swapNeeded||t2.swapNeeded;
      const cardSt=swapNeeded?'warn':st;
      const badge=swapNeeded?'🟡 기존 예식 교체 필요':st==='ok'?'🟢 신규+기존 모두 가능':'🟡 주의 필요';
      const badgeCls=swapNeeded?'warn':st==='ok'?'ok':'warn';
      return`<div class="rec-card ${cardSt}">
        <div class="rec-card-rank">추천안 ${i+1} [양측 2팀]</div>
        <div class="rec-card-team" style="flex-direction:column;align-items:flex-start;gap:4px">
          <div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:#6B7280;min-width:22px">1팀</span><b>${t1.team}</b></div>
          <div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:#6B7280;min-width:22px">2팀</span><b>${t2.team}</b></div>
          <span class="rec-status-badge badge-${badgeCls}">${badge}</span>
        </div>
        <div class="rec-assignments">
          <div class="rec-assign-row"><span class="rec-assign-icon">🆕</span><div class="rec-assign-text"><b>신규 ${timeStr} ${region}</b> <span class="rec-assign-tag tag-new">양측 배정</span></div></div>
          ${swapNeeded?'<div class="rec-assign-row"><span class="rec-assign-icon">🔄</span><div class="rec-assign-text">기존 예식 일부 교체 필요 — 아래 설명 참조</div></div>':'<div class="rec-assign-row"><span class="rec-assign-icon">📌</span><div class="rec-assign-text">기존 예식 교체 없이 양측 배정 가능</div></div>'}
        </div>
        <div class="rec-prose ${cardSt}"><b>[1팀 ${t1.team}]</b> ${buildProse(t1,inqTime,region)}<br><br><b>[2팀 ${t2.team}]</b> ${buildProse(t2,inqTime,region)}<br><br>두 부부세트 모두 투입 가능하므로 양측 운영에 필요한 4인 배정이 가능합니다.</div>
        <div class="rec-actions">
          <button class="rec-btn btn-keep" onclick="showToast('현재 배정 유지')">현재 유지</button>
          <button class="rec-btn btn-apply" onclick="showToast('✅ 양측 배정 완료 (관리자 확인 필요)')">추천안 적용</button>
          <button class="rec-btn btn-manual" onclick="showToast('수동 조정 모드')">수동 조정</button>
        </div>
      </div>`;
    }).join('');
  })();

  const topCardsHtml=isBothSide?bothCards:singleCards;
  const failHtml=failList.length?`<div class="inq-sec-label" style="margin-top:${topCardsHtml?'14px':'0'}">배정 불가 — ${failList.length}팀</div>${failList.map(sc=>{
    const badge=statusLabel(sc.status)||'🔴 불가';
    return`<div class="rec-card fail"><div class="rec-card-team">${sc.team}<span class="rec-status-badge badge-fail">${badge}</span></div><div class="rec-prose fail">${buildProse(sc,inqTime,region)}</div></div>`;
  }).join('')}`:'';

  const okCnt=okList.length,warnCnt=warnList.length,failCnt=failList.filter(s=>s.status==='fail').length,unavCnt=failList.filter(s=>s.status==='unavail').length;
  el.innerHTML=`<div>
    <div class="inq-res-hdr ${overallSt}">
      <div class="inq-res-hdr-title">${overallEmoji} ${dateStr} (${dayKr}) ${timeStr} ${region} · ${opLabel} — ${overallTxt}</div>
      <div class="inq-res-hdr-sub">🟢 가능 ${okCnt}팀 &nbsp;|&nbsp; 🟡 주의 ${warnCnt}팀 &nbsp;|&nbsp; 🔴 불가 ${failCnt}팀 &nbsp;|&nbsp; ⛔ 등록불가 ${unavCnt}팀</div>
    </div>
    <div class="inq-res-body ${overallSt}">
      <div class="cur-assign-box">
        <div class="cur-assign-title">현재 당일 배정 현황</div>
        ${curAssignHtml}
      </div>
      ${topCardsHtml?`<div class="inq-sec-label">AI 추천 배정안 ${isBothSide?'(양측 2팀 조합)':'(단측 1팀)'}</div>${topCardsHtml}`:''}
      ${failHtml}
    </div>
  </div>`;
}

// UI 공통
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

async function init(){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('dateInp').value=today;
  document.getElementById('inq-date').value=today;
  await loadVenues();
  await loadInqVenues();
  await onDateChange();
}

async function onDateChange(){
  const dateStr=document.getElementById('dateInp').value;
  if(!dateStr)return;
  const d=new Date(dateStr+'T00:00:00');
  document.getElementById('dateDayLbl').textContent=`(${DAY_KR[d.getDay()]})`;
  document.getElementById('resultWrap').style.display='none';
  document.getElementById('analyzingBox').style.display='none';
  document.getElementById('aiBtnMain').style.display='flex';
  document.getElementById('aiBtnMain').disabled=true;
  const ok=await fetchSchedules(dateStr);
  await fetchUnavailables(dateStr);
  renderSchedList();
  if(ok&&schedules.length>0)document.getElementById('aiBtnMain').disabled=false;
}

function renderSchedList(){
  const el=document.getElementById('schedList');
  const cnt=document.getElementById('dateCountLbl');
  if(!schedules.length){el.innerHTML=`<div class="empty-box"><p>해당 날짜에 배정된 예식이 없습니다</p></div>`;cnt.textContent='';return;}
  cnt.textContent=`${schedules.length}건`;
  el.innerHTML=`<div class="sched-list">${schedules.map(s=>`<div class="sched-card"><div class="sched-time">${s.time}</div><div class="sched-info"><div class="sched-couple">${s.couple}</div><div class="sched-hall">${s.hall}</div></div><div class="sched-mgrs">${s.frontManager?`<div class="sched-mgr">${s.frontManager}</div>`:''} ${s.backManager&&s.backManager!==s.frontManager?`<div class="sched-mgr back">${s.backManager}</div>`:''}</div></div>`).join('')}</div>`;
}

init();
</script>
