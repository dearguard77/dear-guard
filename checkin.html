<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dear Guard · 축의 접수</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #FAF7F2;
      --beige:    #F0E8D8;
      --beige2:   #E2D5C0;
      --gold:     #B8964A;
      --gold-lt:  #D4AE6A;
      --gold-dk:  #8A6E34;
      --brown:    #5C4A30;
      --charcoal: #2C2418;
      --white:    #FFFFFF;
      --groom:    #3B6EBB;
      --groom-lt: #EEF4FF;
      --bride:    #BB3B6E;
      --bride-lt: #FFF0F5;
      --green:    #2E7D52;
      --shadow:   0 4px 20px rgba(44,36,24,.12);
      --radius:   14px;
      --font-serif: 'Noto Serif KR', serif;
      --font-sans:  'Noto Sans KR', sans-serif;
    }

    html, body {
      height: 100%;
      background: #EDEAE4;
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    /* ── 전체 레이아웃 ── */
    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    .header {
      background: var(--charcoal);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 700;
      color: var(--gold-lt);
      letter-spacing: .04em;
    }

    .logo-sub {
      font-size: 11px;
      color: rgba(250,247,242,.4);
      letter-spacing: .08em;
    }

    .header-stats {
      display: flex;
      gap: 8px;
    }

    .hstat {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(184,150,74,.25);
      border-radius: 20px;
      padding: 4px 14px;
      text-align: center;
    }

    .hstat-label { font-size: 9px; color: rgba(250,247,242,.4); display: block; letter-spacing:.06em; }
    .hstat-value { font-size: 13px; font-weight: 700; color: var(--gold-lt); display: block; }

    /* ── 메인 바디 ── */
    .body {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      height: calc(100vh - 56px);
      overflow: hidden;
    }

    /* ── 왼쪽 패널: 모드 선택 + 설정 ── */
    .left-panel {
      background: var(--charcoal);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,.06);
    }

    .panel-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .12em;
      color: rgba(250,247,242,.35);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    /* ── 모드 카드 4개 ── */
    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mode-card {
      background: rgba(255,255,255,.06);
      border: 2px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: all .18s ease;
      position: relative;
    }

    .mode-card:hover {
      background: rgba(255,255,255,.10);
      border-color: rgba(184,150,74,.4);
    }

    .mode-card.active.groom {
      background: rgba(59,110,187,.2);
      border-color: var(--groom);
      box-shadow: 0 0 0 3px rgba(59,110,187,.2);
    }

    .mode-card.active.bride {
      background: rgba(187,59,110,.2);
      border-color: var(--bride);
      box-shadow: 0 0 0 3px rgba(187,59,110,.2);
    }

    .mode-card .mc-icon { font-size: 28px; display: block; margin-bottom: 8px; }

    .mode-card .mc-pay {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      color: var(--gold-lt);
      display: block;
      margin-bottom: 2px;
    }

    .mode-card .mc-side {
      font-size: 14px;
      font-weight: 700;
      color: var(--cream);
      display: block;
    }

    .mode-card.active .mc-side { color: var(--white); }

    .mode-card .active-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold-lt);
      display: none;
    }

    .mode-card.active .active-dot { display: block; }

    /* ── 현황 요약 ── */
    .summary-box {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      padding: 16px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .summary-row:last-child { border-bottom: none; }

    .summary-row .sr-label { font-size: 11px; color: rgba(250,247,242,.4); }
    .summary-row .sr-value { font-size: 13px; font-weight: 700; color: var(--cream); }
    .summary-row .sr-value.gold { color: var(--gold-lt); }

    /* ── 설정 박스 ── */
    .settings-box {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(184,150,74,.2);
      border-radius: var(--radius);
      padding: 14px;
    }

    .settings-box.connected {
      border-color: rgba(46,125,82,.5);
    }

    .settings-field {
      margin-bottom: 8px;
    }

    .settings-field:last-of-type { margin-bottom: 10px; }

    .settings-field label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .08em;
      color: rgba(250,247,242,.35);
      display: block;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .settings-field input {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--cream);
      font-family: monospace;
      outline: none;
      transition: border-color .15s;
    }

    .settings-field input:focus { border-color: var(--gold); }
    .settings-field input::placeholder { color: rgba(250,247,242,.2); }

    .settings-save-btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: var(--gold);
      color: var(--white);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }

    .settings-save-btn:hover { background: var(--gold-dk); }

    .connected-badge {
      display: none;
      font-size: 10px;
      color: #6BCB8B;
      text-align: center;
      margin-top: 6px;
    }

    .settings-box.connected .connected-badge { display: block; }

    /* ── 오른쪽: 입력 폼 ── */
    .right-panel {
      background: var(--cream);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* ── 현재 모드 배너 ── */
    .mode-banner {
      padding: 16px 32px;
      border-bottom: 1px solid var(--beige);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--white);
    }

    .mode-badge {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .02em;
    }

    .mode-badge.groom { background: var(--groom-lt); color: var(--groom); }
    .mode-badge.bride { background: var(--bride-lt); color: var(--bride); }

    .mode-banner-text {
      font-size: 13px;
      color: var(--brown);
    }

    /* ── 폼 그리드 ── */
    .form-area {
      flex: 1;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-row {
      display: grid;
      gap: 16px;
    }

    .form-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

    /* ── 필드 ── */
    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold-dk);
    }

    .field input,
    .field textarea {
      border: 2px solid var(--beige2);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      font-family: var(--font-sans);
      color: var(--charcoal);
      background: var(--white);
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--gold);
      background: #FFFDF8;
    }

    .field textarea { resize: none; height: 72px; font-size: 14px; }

    /* ── 금액 버튼 ── */
    .amount-section { display: flex; flex-direction: column; gap: 8px; }

    .amount-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .amt-btn {
      border: 2px solid var(--beige2);
      background: var(--white);
      border-radius: 10px;
      padding: 14px 4px;
      font-size: 15px;
      font-weight: 700;
      color: var(--brown);
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }

    .amt-btn:hover { border-color: var(--gold); background: #FFF8EC; }

    .amt-btn.active {
      border-color: var(--gold);
      background: linear-gradient(135deg, #FFF8EC, #FFF0CC);
      color: var(--gold-dk);
      box-shadow: 0 0 0 3px rgba(184,150,74,.15);
    }

    .amt-btn.custom {
      font-size: 12px;
      border-style: dashed;
      color: var(--charcoal);
    }

    .custom-input-wrap { display: none; }
    .custom-input-wrap.show { display: block; }

    .custom-input {
      border: 2px solid var(--gold);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold-dk);
      background: #FFF8EC;
      width: 100%;
      outline: none;
      text-align: right;
      font-family: var(--font-sans);
    }

    /* ── 식권 카운터 ── */
    .meal-row {
      display: flex;
      gap: 16px;
    }

    .meal-item {
      flex: 1;
      background: var(--white);
      border: 2px solid var(--beige2);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .meal-item label {
      font-size: 13px;
      font-weight: 600;
      color: var(--brown);
    }

    .counter {
      display: flex;
      align-items: center;
      gap: 0;
      border: 2px solid var(--beige2);
      border-radius: 8px;
      overflow: hidden;
    }

    .cnt-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: var(--cream);
      font-size: 18px;
      color: var(--brown);
      cursor: pointer;
      transition: background .12s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cnt-btn:hover { background: var(--beige2); }

    .cnt-val {
      min-width: 36px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--charcoal);
      background: var(--white);
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid var(--beige2);
      border-right: 1px solid var(--beige2);
    }

    /* ── 접수 버튼 ── */
    .submit-area {
      padding: 0 32px 28px;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--charcoal), #3D3020);
      color: var(--gold-lt);
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .04em;
      transition: all .18s;
      box-shadow: var(--shadow);
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, var(--gold-dk), var(--gold));
      color: var(--white);
      transform: translateY(-1px);
    }

    .submit-btn:active { transform: translateY(0); }

    /* ── 최근 접수 ── */
    .recent-area {
      padding: 0 32px 20px;
    }

    .recent-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--gold-dk);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .recent-list { display: flex; flex-direction: column; gap: 6px; }

    .recent-item {
      background: var(--white);
      border-radius: 8px;
      padding: 10px 14px;
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--beige);
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ri-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .ri-badge.groom { background: var(--groom-lt); color: var(--groom); }
    .ri-badge.bride { background: var(--bride-lt); color: var(--bride); }

    .ri-pay {
      font-size: 10px;
      color: rgba(44,36,24,.4);
      white-space: nowrap;
    }

    .ri-name { font-size: 13px; font-weight: 600; color: var(--charcoal); }
    .ri-amount { font-size: 14px; font-weight: 700; color: var(--gold-dk); white-space: nowrap; }

    /* ── 토스트 ── */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--charcoal);
      color: var(--cream);
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: var(--shadow);
      border: 1px solid rgba(184,150,74,.3);
      opacity: 0;
      transform: translateY(12px);
      transition: all .25s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast .t-icon { margin-right: 8px; }
  </style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <header class="header">
    <div class="header-left">
      <span class="logo">Dear Guard</span>
      <span class="logo-sub">축의 접수 · FIELD POS</span>
    </div>
    <div class="header-stats">
      <div class="hstat">
        <span class="hstat-label">신랑측</span>
        <span class="hstat-value" id="st-groom">0명</span>
      </div>
      <div class="hstat">
        <span class="hstat-label">신부측</span>
        <span class="hstat-value" id="st-bride">0명</span>
      </div>
      <div class="hstat">
        <span class="hstat-label">총 금액</span>
        <span class="hstat-value" id="st-amount">₩0</span>
      </div>
      <div class="hstat">
        <span class="hstat-label">식권</span>
        <span class="hstat-value" id="st-meal">0장</span>
      </div>
    </div>
  </header>

  <div class="body">

    <!-- 왼쪽 패널 -->
    <div class="left-panel">

      <!-- 접수 모드 선택 -->
      <div>
        <div class="panel-title">접수 모드 선택</div>
        <div class="mode-grid">
          <div class="mode-card groom active" id="mc-cash-groom" onclick="selectMode('cash','groom')">
            <div class="active-dot"></div>
            <span class="mc-icon">💰</span>
            <span class="mc-pay">현금</span>
            <span class="mc-side">신랑측</span>
          </div>
          <div class="mode-card bride" id="mc-cash-bride" onclick="selectMode('cash','bride')">
            <div class="active-dot"></div>
            <span class="mc-icon">💰</span>
            <span class="mc-pay">현금</span>
            <span class="mc-side">신부측</span>
          </div>
          <div class="mode-card groom" id="mc-transfer-groom" onclick="selectMode('transfer','groom')">
            <div class="active-dot"></div>
            <span class="mc-icon">🏦</span>
            <span class="mc-pay">이체·기타</span>
            <span class="mc-side">신랑측</span>
          </div>
          <div class="mode-card bride" id="mc-transfer-bride" onclick="selectMode('transfer','bride')">
            <div class="active-dot"></div>
            <span class="mc-icon">🏦</span>
            <span class="mc-pay">이체·기타</span>
            <span class="mc-side">신부측</span>
          </div>
        </div>
      </div>

      <!-- 현황 요약 -->
      <div>
        <div class="panel-title">실시간 현황</div>
        <div class="summary-box">
          <div class="summary-row">
            <span class="sr-label">신랑측 인원</span>
            <span class="sr-value" id="sum-groom-count">0명</span>
          </div>
          <div class="summary-row">
            <span class="sr-label">신부측 인원</span>
            <span class="sr-value" id="sum-bride-count">0명</span>
          </div>
          <div class="summary-row">
            <span class="sr-label">신랑측 금액</span>
            <span class="sr-value gold" id="sum-groom-amount">₩0</span>
          </div>
          <div class="summary-row">
            <span class="sr-label">신부측 금액</span>
            <span class="sr-value gold" id="sum-bride-amount">₩0</span>
          </div>
          <div class="summary-row">
            <span class="sr-label">총 접수 금액</span>
            <span class="sr-value gold" id="sum-total">₩0</span>
          </div>
          <div class="summary-row">
            <span class="sr-label">총 식권</span>
            <span class="sr-value" id="sum-meal">0장</span>
          </div>
        </div>
      </div>

      <!-- 설정 -->
      <div>
        <div class="panel-title">연동 설정</div>
        <div class="settings-box" id="settings-box">
          <div class="settings-field">
            <label>GAS 배포 URL</label>
            <input type="url" id="gas-url" placeholder="https://script.google.com/macros/s/..." />
          </div>
          <div class="settings-field">
            <label>구글 시트 ID (행사마다 교체)</label>
            <input type="text" id="sheet-id" placeholder="스프레드시트 URL의 /d/ 뒤 ID" />
          </div>
          <button class="settings-save-btn" onclick="saveSettings()">저장</button>
          <div class="connected-badge">✅ 구글시트 연동 완료</div>
        </div>
      </div>

    </div><!-- /left-panel -->

    <!-- 오른쪽 폼 -->
    <div class="right-panel">

      <!-- 현재 모드 배너 -->
      <div class="mode-banner">
        <span class="mode-badge groom" id="banner-badge">신랑측</span>
        <span class="mode-banner-text" id="banner-text">현금 접수 중</span>
      </div>

      <div class="form-area">

        <!-- 이름 + 관계 -->
        <div class="form-row cols-2">
          <div class="field">
            <label>하객 이름</label>
            <input type="text" id="guest-name" placeholder="홍길동" />
          </div>
          <div class="field">
            <label>관계</label>
            <input type="text" id="guest-rel" placeholder="친구, 직장동료, 친척..." />
          </div>
        </div>

        <!-- 금액 -->
        <div class="amount-section">
          <div class="field">
            <label>축의금</label>
          </div>
          <div class="amount-grid">
            <button class="amt-btn" onclick="selectAmt(50000, this)">5만</button>
            <button class="amt-btn" onclick="selectAmt(100000, this)">10만</button>
            <button class="amt-btn" onclick="selectAmt(150000, this)">15만</button>
            <button class="amt-btn" onclick="selectAmt(200000, this)">20만</button>
            <button class="amt-btn" onclick="selectAmt(300000, this)">30만</button>
            <button class="amt-btn" onclick="selectAmt(500000, this)">50만</button>
          </div>
          <div class="amount-grid" style="grid-template-columns:1fr 1fr;">
            <button class="amt-btn" onclick="selectAmt(700000, this)">70만</button>
            <button class="amt-btn custom" onclick="toggleCustom(this)">✏️ 직접 입력</button>
          </div>
          <div class="custom-input-wrap" id="custom-wrap">
            <input type="number" inputmode="numeric" id="custom-amount" class="custom-input" placeholder="금액 입력 (원)" oninput="onCustomInput()" />
          </div>
        </div>

        <!-- 식권 -->
        <div class="field">
          <label>식권 수량</label>
          <div class="meal-row">
            <div class="meal-item">
              <label>대인</label>
              <div class="counter">
                <button class="cnt-btn" onclick="changeMeal('adult',-1)">−</button>
                <div class="cnt-val" id="adult-cnt">1</div>
                <button class="cnt-btn" onclick="changeMeal('adult',1)">+</button>
              </div>
            </div>
            <div class="meal-item">
              <label>소인</label>
              <div class="counter">
                <button class="cnt-btn" onclick="changeMeal('child',-1)">−</button>
                <div class="cnt-val" id="child-cnt">0</div>
                <button class="cnt-btn" onclick="changeMeal('child',1)">+</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 메모 -->
        <div class="field">
          <label>메모 (선택)</label>
          <textarea id="memo" placeholder="봉투 메모, 특이사항 등"></textarea>
        </div>

      </div><!-- /form-area -->

      <!-- 접수 버튼 -->
      <div class="submit-area">
        <button class="submit-btn" onclick="submitEntry()">✅ 접수 완료</button>
      </div>

      <!-- 최근 접수 내역 -->
      <div class="recent-area" id="recent-area" style="display:none;">
        <div class="recent-title">최근 접수 내역</div>
        <div class="recent-list" id="recent-list"></div>
      </div>

    </div><!-- /right-panel -->
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
/* ── State ── */
const S = {
  side: 'groom',
  payment: 'cash',
  amount: 0,
  customOn: false,
  adult: 1,
  child: 0,
  entries: [],
};

let GAS_URL  = localStorage.getItem('dg_gas_url')  || '';
let SHEET_ID = localStorage.getItem('dg_sheet_id') || '';

/* ── Init ── */
window.addEventListener('DOMContentLoaded', () => {
  if (GAS_URL)  document.getElementById('gas-url').value  = GAS_URL;
  if (SHEET_ID) document.getElementById('sheet-id').value = SHEET_ID;
  if (GAS_URL && SHEET_ID) document.getElementById('settings-box').classList.add('connected');
  updateStats();
});

/* ── 설정 저장 ── */
function saveSettings() {
  const url = document.getElementById('gas-url').value.trim();
  const sid = document.getElementById('sheet-id').value.trim();
  if (!url || !sid) { showToast('⚠️ GAS URL과 시트 ID를 모두 입력해주세요'); return; }
  GAS_URL = url; SHEET_ID = sid;
  localStorage.setItem('dg_gas_url',  GAS_URL);
  localStorage.setItem('dg_sheet_id', SHEET_ID);
  document.getElementById('settings-box').classList.add('connected');
  showToast('✅ 설정 저장 완료!');
}

/* ── 모드 선택 ── */
function selectMode(payment, side) {
  S.payment = payment;
  S.side    = side;

  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
  document.getElementById(`mc-${payment}-${side}`).classList.add('active');

  const badge = document.getElementById('banner-badge');
  badge.className = `mode-badge ${side}`;
  badge.textContent = side === 'groom' ? '신랑측' : '신부측';

  const payLabel = payment === 'cash' ? '현금' : '이체·기타';
  document.getElementById('banner-text').textContent = `${payLabel} 접수 중`;
}

/* ── 금액 선택 ── */
function selectAmt(val, btn) {
  S.amount   = val;
  S.customOn = false;
  document.getElementById('custom-wrap').classList.remove('show');
  document.getElementById('custom-amount').value = '';
  document.querySelectorAll('.amt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleCustom(btn) {
  S.customOn = !S.customOn;
  document.getElementById('custom-wrap').classList.toggle('show', S.customOn);
  document.querySelectorAll('.amt-btn').forEach(b => b.classList.remove('active'));
  if (S.customOn) {
    btn.classList.add('active');
    S.amount = 0;
    setTimeout(() => document.getElementById('custom-amount').focus(), 80);
  }
}

function onCustomInput() {
  S.amount = parseInt(document.getElementById('custom-amount').value) || 0;
}

/* ── 식권 카운터 ── */
function changeMeal(type, delta) {
  if (type === 'adult') {
    S.adult = Math.max(0, S.adult + delta);
    document.getElementById('adult-cnt').textContent = S.adult;
  } else {
    S.child = Math.max(0, S.child + delta);
    document.getElementById('child-cnt').textContent = S.child;
  }
}

/* ── 통계 업데이트 ── */
function updateStats() {
  const groom = S.entries.filter(e => e.side === 'groom');
  const bride  = S.entries.filter(e => e.side === 'bride');
  const total  = S.entries;
  const groomAmt = groom.reduce((s,e) => s+e.amount, 0);
  const brideAmt = bride.reduce((s,e) => s+e.amount, 0);
  const totalAmt = groomAmt + brideAmt;
  const totalMeal = total.reduce((s,e) => s+e.adult+e.child, 0);

  document.getElementById('st-groom').textContent       = groom.length + '명';
  document.getElementById('st-bride').textContent       = bride.length + '명';
  document.getElementById('st-amount').textContent      = '₩' + totalAmt.toLocaleString();
  document.getElementById('st-meal').textContent        = totalMeal + '장';
  document.getElementById('sum-groom-count').textContent = groom.length + '명';
  document.getElementById('sum-bride-count').textContent = bride.length + '명';
  document.getElementById('sum-groom-amount').textContent = '₩' + groomAmt.toLocaleString();
  document.getElementById('sum-bride-amount').textContent = '₩' + brideAmt.toLocaleString();
  document.getElementById('sum-total').textContent      = '₩' + totalAmt.toLocaleString();
  document.getElementById('sum-meal').textContent       = totalMeal + '장';
}

/* ── 최근 내역 ── */
function addRecent(entry) {
  const area = document.getElementById('recent-area');
  const list = document.getElementById('recent-list');
  area.style.display = 'block';

  const el = document.createElement('div');
  el.className = 'recent-item';
  el.innerHTML = `
    <span class="ri-badge ${entry.side}">${entry.side==='groom'?'신랑':'신부'}측</span>
    <span class="ri-pay">${entry.payment==='cash'?'현금':'이체'}</span>
    <span class="ri-name">${entry.name||'(이름없음)'} <span style="font-weight:400;color:#888;font-size:11px;">${entry.relation||''}</span></span>
    <span class="ri-amount">₩${entry.amount.toLocaleString()}</span>
  `;
  list.insertBefore(el, list.firstChild);
  while (list.children.length > 7) list.removeChild(list.lastChild);
}

/* ── 토스트 ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── 폼 리셋 ── */
function resetForm() {
  S.amount = 0; S.customOn = false; S.adult = 1; S.child = 0;
  document.getElementById('guest-name').value = '';
  document.getElementById('guest-rel').value  = '';
  document.getElementById('memo').value       = '';
  document.getElementById('adult-cnt').textContent = '1';
  document.getElementById('child-cnt').textContent = '0';
  document.getElementById('custom-wrap').classList.remove('show');
  document.getElementById('custom-amount').value = '';
  document.querySelectorAll('.amt-btn').forEach(b => b.classList.remove('active'));
}

/* ── 접수 ── */
function submitEntry() {
  const name     = document.getElementById('guest-name').value.trim();
  const relation = document.getElementById('guest-rel').value.trim();
  const memo     = document.getElementById('memo').value.trim();
  const amount   = S.customOn
    ? (parseInt(document.getElementById('custom-amount').value) || 0)
    : S.amount;

  if (!name)   { showToast('⚠️ 이름을 입력해주세요'); return; }
  if (!amount) { showToast('⚠️ 금액을 선택해주세요'); return; }

  const entry = {
    time:     new Date().toLocaleString('ko-KR'),
    side:     S.side,
    name,
    relation,
    payment:  S.payment,
    amount,
    adult:    S.adult,
    child:    S.child,
    meal:     S.adult + S.child,
    memo,
  };

  // 즉시 UI 업데이트
  S.entries.unshift(entry);
  updateStats();
  addRecent(entry);
  showToast(`✅ ${entry.name} · ₩${amount.toLocaleString()} 접수 완료`);
  resetForm();
  document.getElementById('guest-name').focus();

  // GAS 백그라운드 전송
  if (GAS_URL && SHEET_ID) {
    const params = new URLSearchParams({
      sheetId:  SHEET_ID,
      time:     entry.time,
      side:     entry.side,
      name:     entry.name,
      relation: entry.relation,
      payment:  entry.payment,
      amount:   String(entry.amount),
      meal:     String(entry.meal),
      memo:     entry.memo,
    });
    const img = new Image();
    img.src = GAS_URL + '?' + params.toString();
  }
}
</script>
</body>
</html>
