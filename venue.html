<!DOCTYPE html>
<html lang="ko"><head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<link rel="apple-touch-icon" href="https://dear-guard.vercel.app/icon.png">
<link rel="icon" type="image/png" href="https://dear-guard.vercel.app/icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예식장 리뷰 - 디어가드</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:#F8F7F5;color:#111827;font-size:14px}
  button{cursor:pointer;font-family:inherit}
  input,select,textarea{font-family:inherit}
  a{color:inherit;text-decoration:none}

  /* NAV */
  #nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid #E8DFD0;padding:0 16px;display:flex;align-items:center;height:56px;gap:10px}
  #nav .brand{font-family:Georgia,serif;font-size:16px;font-weight:700;color:#C7A96B;letter-spacing:.5px;display:flex;align-items:center;gap:8px;flex-shrink:0}
  #nav .brand img{height:26px;width:auto}
  #nav .sub-title{font-size:12px;color:#9CA3AF;font-weight:600;border-left:1px solid #E5E7EB;padding-left:10px}
  #nav .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
  #user-chip{display:flex;align-items:center;gap:6px;background:#FDF8F3;border:1px solid #E8DFD0;border-radius:20px;padding:5px 12px 5px 5px;font-size:12px;font-weight:700;color:#374151}
  .avatar{width:24px;height:24px;border-radius:50%;background:#C7A96B;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  #logout-btn{background:none;border:1px solid #E5E7EB;border-radius:8px;padding:6px 10px;font-size:11px;color:#6B7280;font-weight:600}
  #logout-btn:hover{background:#F3F4F6}

  /* TABS */
  #tabbar{max-width:900px;margin:16px auto 0;padding:0 16px;display:flex;gap:8px}
  .main-tab-btn{flex:1;background:#fff;border:1.5px solid #E5E7EB;border-radius:12px;padding:12px;font-size:14px;font-weight:700;color:#6B7280;text-align:center;transition:all .15s}
  .main-tab-btn.active{background:#C7A96B;border-color:#C7A96B;color:#fff}
  .tab-panel{display:none}
  .tab-panel.active{display:block}

  #main{max-width:900px;margin:0 auto;padding:16px 16px 100px}

  /* SEARCH */
  .search-bar{display:flex;gap:8px;margin-bottom:12px}
  .search-input{flex:1;border:1.5px solid #E5E7EB;border-radius:10px;padding:11px 14px;font-size:14px;color:#111827;outline:none;background:#fff}
  .search-input:focus{border-color:#C7A96B}
  .sort-select{border:1.5px solid #E5E7EB;border-radius:10px;padding:0 10px;font-size:12px;color:#374151;background:#fff}

  /* CARD */
  .venue-group{background:#fff;border:1px solid #E5E7EB;border-radius:14px;margin-bottom:10px;overflow:hidden}
  .venue-group-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .venue-group-head:hover{background:#FAFAF8}
  .venue-name{font-size:15px;font-weight:800;color:#111827}
  .venue-addr{font-size:11px;color:#9CA3AF;margin-top:2px}
  .venue-arrow{font-size:11px;color:#9CA3AF;transition:transform .2s}
  .venue-arrow.open{transform:rotate(90deg)}
  .hall-list{max-height:0;overflow:hidden;transition:max-height .25s ease}
  .hall-list.open{max-height:2000px}
  .hall-row{padding:12px 16px 12px 24px;border-top:1px solid #F3F4F6;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .hall-row:hover{background:#FDF8F3}
  .hall-name{font-size:13px;font-weight:700;color:#374151}
  .hall-meta{font-size:11px;color:#9CA3AF;margin-top:2px}
  .hall-chev{color:#C7A96B;font-size:13px}

  .empty-state{background:#F9FAFB;border:1px dashed #E5E7EB;border-radius:12px;padding:32px 20px;text-align:center;color:#9CA3AF;font-size:13px}

  /* DETAIL */
  .back-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:#6B7280;font-size:13px;font-weight:600;margin-bottom:12px}
  .back-btn:hover{color:#C7A96B}
  .detail-header{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:20px;margin-bottom:12px}
  .detail-venue{font-size:19px;font-weight:800;color:#111827}
  .detail-hall{font-size:14px;color:#6B7280;margin-top:2px}
  .detail-addr{font-size:12px;color:#9CA3AF;margin-top:6px}
  .detail-stats{display:flex;gap:16px;margin-top:14px;padding-top:14px;border-top:1px solid #F3F4F6}
  .detail-stat{font-size:12px;color:#6B7280}
  .detail-stat b{color:#111827;font-size:14px}
  .recent-change-banner{background:#FFF9F0;border:1px solid #F0E0C0;border-radius:10px;padding:10px 14px;font-size:12px;color:#8A6D3B;margin-top:12px;display:flex;gap:8px;align-items:flex-start}

  .sec-block{background:#fff;border:1px solid #E5E7EB;border-radius:14px;margin-bottom:10px;overflow:hidden}
  .sec-block-head{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
  .sec-block-head:hover{background:#FAFAF8}
  .sec-block-title{font-size:13px;font-weight:800;color:#111827}
  .sec-block-arrow{font-size:11px;color:#9CA3AF;transition:transform .2s}
  .sec-block-arrow.open{transform:rotate(90deg)}
  .sec-block-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .sec-block-body.open{max-height:3000px}
  .sec-block-inner{padding:4px 16px 16px}

  .info-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
  .info-item{font-size:12px}
  .info-item .lbl{color:#9CA3AF;margin-bottom:2px}
  .info-item .val{font-weight:700;color:#374151}
  @media(max-width:520px){.info-grid2{grid-template-columns:1fr}}

  /* REVIEW HISTORY CARD */
  .review-card{background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:16px;margin-bottom:10px}
  .review-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
  .review-date{font-size:14px;font-weight:800;color:#111827}
  .review-meta{font-size:11px;color:#9CA3AF;margin-top:2px}
  .review-actions{display:flex;gap:6px}
  .icon-btn{background:none;border:1px solid #E5E7EB;border-radius:6px;padding:4px 8px;font-size:11px;color:#6B7280}
  .icon-btn:hover{background:#F3F4F6}
  .icon-btn.danger{color:#EF4444;border-color:#FCA5A5}
  .icon-btn.danger:hover{background:#FEF2F2}
  .review-chips{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
  .mini-chip{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:14px;padding:3px 9px;font-size:10.5px;color:#6B7280;font-weight:600}
  .review-note{font-size:12.5px;color:#374151;line-height:1.6;white-space:pre-line;background:#FDF8F3;border-radius:8px;padding:10px 12px;margin-top:6px}
  .review-note-label{font-size:10px;font-weight:800;color:#C7A96B;margin-bottom:3px}

  /* FORM */
  .form-sec{background:#fff;border:1px solid #E5E7EB;border-radius:14px;margin-bottom:10px;overflow:hidden}
  .form-sec-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#FDFCFA}
  .form-sec-head:hover{background:#FAF6EF}
  .form-sec-title{font-size:13px;font-weight:800;color:#111827;display:flex;align-items:center;gap:6px}
  .form-sec-badge{font-size:10px;background:#C7A96B;color:#fff;border-radius:10px;padding:1px 7px;font-weight:700}
  .form-sec-arrow{font-size:11px;color:#9CA3AF;transition:transform .2s}
  .form-sec-arrow.open{transform:rotate(90deg)}
  .form-sec-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .form-sec-body.open{max-height:5000px}
  .form-sec-inner{padding:6px 16px 18px}

  .field{margin-bottom:16px}
  .field:last-child{margin-bottom:0}
  .field-label{font-size:12.5px;font-weight:700;color:#374151;margin-bottom:8px;display:flex;align-items:center;gap:4px}
  .field-label .req{color:#EF4444;font-size:12px}
  .field-input{width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:10px 12px;font-size:13px;color:#111827;outline:none;background:#fff}
  .field-input:focus{border-color:#C7A96B}
  textarea.field-input{resize:vertical;min-height:64px;line-height:1.5}
  .field-hint{font-size:11px;color:#9CA3AF;margin-top:5px}
  .field.missing .field-label{color:#EF4444}
  .field.missing .chip-group{outline:1.5px solid #FCA5A5;border-radius:12px}

  .chip-group{display:flex;flex-wrap:wrap;gap:7px}
  .chip{border:1.5px solid #E5E7EB;border-radius:20px;padding:8px 14px;font-size:12.5px;font-weight:600;background:#fff;color:#6B7280;transition:all .15s}
  .chip:hover{border-color:#C7A96B}
  .chip.active{background:#C7A96B;color:#fff;border-color:#C7A96B}
  .chip-sub-input{margin-top:8px}

  .autocomplete-wrap{position:relative}
  .ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #E5E7EB;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.10);max-height:220px;overflow-y:auto;z-index:50;display:none}
  .ac-list.open{display:block}
  .ac-item{padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid #F9FAFB}
  .ac-item:last-child{border-bottom:none}
  .ac-item:hover{background:#FDF8F3}
  .ac-item .ac-sub{font-size:10.5px;color:#9CA3AF;margin-top:1px}
  .ac-item.ac-new{color:#C7A96B;font-weight:700}

  .submit-bar{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(248,247,245,0),#F8F7F5 30%);padding:16px 0 0;margin-top:4px}
  .btn-submit{width:100%;background:#C7A96B;color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:800;box-shadow:0 4px 16px rgba(199,169,107,.35)}
  .btn-submit:hover{background:#B8976A}
  .btn-submit:disabled{background:#D1D5DB;box-shadow:none;cursor:not-allowed}

  .btn{border:none;border-radius:8px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
  .btn-primary{background:#C7A96B;color:#fff;padding:10px 20px;font-size:13px}
  .btn-primary:hover{background:#B8976A}
  .btn-secondary{background:#F3F4F6;color:#374151;padding:10px 20px;font-size:13px}
  .btn-ghost{background:none;color:#6B7280;border:1px solid #E5E7EB;padding:10px 20px;font-size:13px;border-radius:8px}

  /* MODAL (delete confirm) */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.hidden{display:none}
  .modal-box{background:#fff;border-radius:18px;width:100%;max-width:360px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal-title{font-size:15px;font-weight:800;color:#111827;margin-bottom:8px}
  .modal-msg{font-size:13px;color:#6B7280;line-height:1.6;margin-bottom:18px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end}

  /* TOAST */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;z-index:2000;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap;display:none}

  /* LOADING */
  #loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px}
  .spinner{width:36px;height:36px;border:3px solid #E8DFD0;border-top-color:#C7A96B;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* LOGIN */
  #login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#F8F5F0,#FDF8F3);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-box{background:#fff;border-radius:24px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.12)}
  .login-sub{font-size:12px;color:#9CA3AF;text-align:center;margin-bottom:32px}
  .login-field{margin-bottom:14px}
  .login-label{font-size:11px;font-weight:700;color:#6B7280;margin-bottom:6px;display:block}
  .login-input{width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:11px 14px;font-size:14px;color:#111827;outline:none;font-family:inherit}
  .login-input:focus{border-color:#C7A96B}
  .login-btn{width:100%;background:#C7A96B;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
  .login-btn:hover{background:#B8976A}
  .login-err{font-size:12px;color:#EF4444;text-align:center;margin-top:10px;min-height:18px;font-weight:600}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div style="font-family:Georgia,serif;font-size:22px;font-weight:700;color:#C7A96B;text-align:center;margin-bottom:4px">디어가드</div>
    <div class="login-sub">예식장 리뷰 데이터베이스</div>
    <div class="login-field">
      <label class="login-label">이름 입력</label>
      <input class="login-input" id="login-name" type="text" placeholder="이름을 입력하세요" autocomplete="off" list="login-name-list" onkeydown="if(event.key==='Enter') document.getElementById('login-pw').focus()">
      <datalist id="login-name-list"></datalist>
    </div>
    <div class="login-field">
      <label class="login-label">비밀번호</label>
      <input class="login-input" id="login-pw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div style="font-size:13px;color:#9CA3AF">데이터를 불러오는 중...</div>
</div>

<!-- NAV -->
<nav id="nav">
  <div class="brand">디어가드 <span style="color:#111827;font-family:inherit;font-weight:400">|</span></div>
  <div class="sub-title">🏛️ 예식장 리뷰</div>
  <div class="nav-right">
    <div id="user-chip"><div class="avatar" id="nav-avatar">매</div><span id="nav-username">-</span></div>
    <button id="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</nav>

<div id="tabbar">
  <button class="main-tab-btn active" id="maintab-view" onclick="switchMainTab('view')">🔍 예식장 조회</button>
  <button class="main-tab-btn" id="maintab-write" onclick="switchMainTab('write')">✏️ 리뷰 등록</button>
</div>

<div id="main">

  <!-- ============ VIEW TAB ============ -->
  <div class="tab-panel active" id="panel-view">

    <div id="view-list-wrap">
      <div class="search-bar">
        <input class="search-input" id="venue-search" placeholder="예식장명, 홀명, 지역으로 검색" oninput="renderVenueList()">
        <select class="sort-select" id="venue-sort" onchange="renderVenueList()">
          <option value="latest">최신순</option>
          <option value="reviews">리뷰 많은순</option>
          <option value="recent-visit">최근 방문순</option>
        </select>
      </div>
      <div id="venue-list"></div>
    </div>

    <div id="view-detail-wrap" style="display:none"></div>

  </div>

  <!-- ============ WRITE TAB ============ -->
  <div class="tab-panel" id="panel-write">
    <div id="write-form"></div>
  </div>

</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay hidden" id="delete-modal">
  <div class="modal-box">
    <div class="modal-title">리뷰를 삭제하시겠습니까?</div>
    <div class="modal-msg">삭제된 리뷰는 복구할 수 없습니다. 정말 삭제하시겠습니까?</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">취소</button>
      <button class="btn" style="background:#EF4444;color:#fff;padding:10px 20px;font-size:13px" onclick="confirmDeleteReview()">삭제</button>
    </div>
  </div>
</div>

<!-- LEAVE-WARNING CONFIRM MODAL -->
<div class="modal-overlay hidden" id="leave-modal">
  <div class="modal-box">
    <div class="modal-title">작성 중인 내용이 있습니다</div>
    <div class="modal-msg">저장하지 않고 나가면 입력한 내용이 사라집니다. 계속하시겠습니까?</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeLeaveModal()">계속 작성</button>
      <button class="btn" style="background:#EF4444;color:#fff;padding:10px 20px;font-size:13px" onclick="confirmLeave()">나가기</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════
//  디어가드 예식장 리뷰 데이터베이스 (venue.html)
// ════════════════════════════════════════════════════════════

// ─── SUPABASE 설정 (index.html과 동일 프로젝트 재사용) ───
const SUPABASE_URL      = 'https://fmvomfjmkbklhaaapkbk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_3GWkLSDzMFw6FfA_839Ydw_C5F1paf2';

const sb = {
  headers: { 'Content-Type':'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
  url: (table, query='') => `${SUPABASE_URL}/rest/v1/${table}${query}`,
  async get(table, query=''){
    const r = await fetch(sb.url(table, query), { headers: sb.headers });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(table, body){
    const r = await fetch(sb.url(table), { method:'POST', headers:{...sb.headers,'Prefer':'return=representation'}, body: JSON.stringify(body) });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async patch(table, id, body){
    const r = await fetch(sb.url(table, `?id=eq.${id}`), { method:'PATCH', headers:{...sb.headers,'Prefer':'return=representation'}, body: JSON.stringify(body) });
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async delete(table, id){
    const r = await fetch(sb.url(table, `?id=eq.${id}`), { method:'DELETE', headers: sb.headers });
    if(!r.ok) throw new Error(await r.text());
  }
};

// ─── USERS (index.html과 동일 — 로그인 체계 재사용) ───
const USERS = [
  { id:1, name:"강성주", role:"대표", avatar:"대", canEdit:true,  isAdmin:true,  pw:"gg" },

// ═══════════ LOGIN ═══════════
function initLoginScreen(){
  document.getElementById('login-name-list').innerHTML = USERS.map(u=>`<option value="${u.name} (${u.role})"></option>`).join('');
}
function doLogin(){
  const nameVal = (document.getElementById('login-name').value||'').trim();
  const pwVal = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent='';
  if(!nameVal){ errEl.textContent='이름을 입력해주세요.'; return; }
  if(!pwVal){ errEl.textContent='비밀번호를 입력해주세요.'; return; }
  const inputName = nameVal.replace(/\s*\(.*\)\s*$/,'').trim();
  const user = USERS.find(u=>u.name===inputName);
  if(!user || user.pw!==pwVal){
    errEl.textContent='이름 또는 비밀번호가 올바르지 않습니다.';
    document.getElementById('login-pw').value='';
    return;
  }
  localStorage.setItem('dg_user_id', user.id);
  currentUser = user;
  document.getElementById('login-screen').style.display='none';
  startApp();
}
function doLogout(){
  if(!confirm('로그아웃 하시겠습니까?')) return;
  localStorage.removeItem('dg_user_id');
  location.reload();
}

async function init(){
  initLoginScreen();
  const savedId = localStorage.getItem('dg_user_id');
  if(savedId){
    const user = USERS.find(u=>u.id===Number(savedId));
    if(user){
      currentUser = user;
      document.getElementById('login-screen').style.display='none';
      await startApp();
      return;
    }
  }
  document.getElementById('loading-overlay').style.display='none';
}

async function startApp(){
  document.getElementById('loading-overlay').style.display='flex';
  document.getElementById('nav-avatar').textContent = currentUser.avatar;
  document.getElementById('nav-username').textContent = currentUser.name;
  try{
    await loadAllData();
  }catch(e){
    console.error(e);
    showToast('데이터 로드 중 오류가 발생했습니다.');
  }
  document.getElementById('loading-overlay').style.display='none';
  handleUrlParams();
}

// ═══════════ DATA LOAD ═══════════
async function loadAllData(){
  const [venues, halls, reviews] = await Promise.all([
    sb.get('wedding_venues', '?select=*&order=venue_name.asc'),
    sb.get('wedding_venue_halls', '?select=*'),
    sb.get('wedding_venue_reviews', '?select=*&order=wedding_date.desc,created_at.desc'),
  ]);
  allReviews = reviews;
  venuesData = venues.map(v=>({
    ...v,
    halls: halls.filter(h=>h.venue_id===v.id).map(h=>({
      ...h,
      reviews: reviews.filter(r=>r.hall_id===h.id)
    }))
  }));
  renderVenueList();
}

// ═══════════ MAIN TAB SWITCH ═══════════
function switchMainTab(tab, force){
  if(!force && tab!=='write' && formDirty && document.getElementById('panel-write').classList.contains('active')){
    pendingLeaveAction = ()=> switchMainTab(tab, true);
    document.getElementById('leave-modal').classList.remove('hidden');
    return;
  }
  if(tab==='write'){
    document.getElementById('maintab-write').classList.add('active');
    document.getElementById('maintab-view').classList.remove('active');
    document.getElementById('panel-write').classList.add('active');
    document.getElementById('panel-view').classList.remove('active');
    if(!document.getElementById('write-form').innerHTML) renderWriteForm();
  }else{
    document.getElementById('maintab-view').classList.add('active');
    document.getElementById('maintab-write').classList.remove('active');
    document.getElementById('panel-view').classList.add('active');
    document.getElementById('panel-write').classList.remove('active');
  }
}

// ═══════════ VENUE LIST (조회) ═══════════
function renderVenueList(){
  const q = (document.getElementById('venue-search').value||'').trim().toLowerCase();
  const sort = document.getElementById('venue-sort').value;
  const wrap = document.getElementById('venue-list');

  let rows = venuesData.map(v=>{
    const matchedHalls = v.halls.filter(h=>{
      if(!q) return true;
      return v.venue_name.toLowerCase().includes(q) || h.hall_name.toLowerCase().includes(q) || (v.address||'').toLowerCase().includes(q);
    });
    return { ...v, matchedHalls };
  }).filter(v=>v.matchedHalls.length>0);

  if(sort==='reviews'){
    rows.sort((a,b)=> sumReviews(b) - sumReviews(a));
  }else if(sort==='recent-visit'){
    rows.sort((a,b)=> lastVisit(b) - lastVisit(a));
  }else{
    rows.sort((a,b)=> lastVisit(b) - lastVisit(a));
  }

  if(rows.length===0){
    wrap.innerHTML = `<div class="empty-state">검색 결과가 없습니다.<br>새 예식장은 [리뷰 등록] 탭에서 등록할 수 있습니다.</div>`;
    return;
  }

  wrap.innerHTML = rows.map(v=>{
    const isOpen = openVenueIds.has(v.id) || q.length>0;
    const halls = [...v.matchedHalls].sort((a,b)=> lastVisitHall(b) - lastVisitHall(a));
    return `
    <div class="venue-group">
      <div class="venue-group-head" onclick="toggleVenueGroup(${v.id})">
        <div>
          <div class="venue-name">${escapeHtml(v.venue_name)}</div>
          ${v.address?`<div class="venue-addr">${escapeHtml(v.address)}</div>`:''}
        </div>
        <div class="venue-arrow ${isOpen?'open':''}" id="varrow-${v.id}">▶</div>
      </div>
      <div class="hall-list ${isOpen?'open':''}" id="hlist-${v.id}">
        ${halls.map(h=>`
          <div class="hall-row" onclick="openDetail(${v.id},${h.id})">
            <div>
              <div class="hall-name">${escapeHtml(h.hall_name)}</div>
              <div class="hall-meta">리뷰 ${h.reviews.length}건${h.reviews.length? ' / 최근 방문 '+fmtDate(lastVisitHall(h)):''}</div>
            </div>
            <div class="hall-chev">›</div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}
function sumReviews(v){ return v.halls.reduce((s,h)=>s+h.reviews.length,0); }
function lastVisit(v){ let m=0; v.halls.forEach(h=>{ h.reviews.forEach(r=>{ const t=new Date(r.wedding_date).getTime(); if(t>m) m=t; }); }); return m; }
function lastVisitHall(h){ let m=0; h.reviews.forEach(r=>{ const t=new Date(r.wedding_date).getTime(); if(t>m) m=t; }); return m; }
function toggleVenueGroup(id){
  if(openVenueIds.has(id)) openVenueIds.delete(id); else openVenueIds.add(id);
  renderVenueList();
}

// ═══════════ DETAIL VIEW ═══════════
function openDetail(venueId, hallId){
  currentDetail = { venueId, hallId };
  visibleReviewCount = 5;
  document.getElementById('view-list-wrap').style.display='none';
  const dw = document.getElementById('view-detail-wrap');
  dw.style.display='block';
  renderDetail();
  window.scrollTo({top:0,behavior:'smooth'});
}
function backToList(){
  document.getElementById('view-list-wrap').style.display='block';
  document.getElementById('view-detail-wrap').style.display='none';
  history.replaceState(null,'','venue.html');
}
function renderDetail(){
  const v = venuesData.find(x=>x.id===currentDetail.venueId);
  const dw = document.getElementById('view-detail-wrap');
  if(!v){ dw.innerHTML = `<div class="empty-state">예식장 정보를 찾을 수 없습니다.</div>`; return; }
  const h = v.halls.find(x=>x.id===currentDetail.hallId);
  if(!h){ dw.innerHTML = `<div class="empty-state">홀 정보를 찾을 수 없습니다.</div>`; return; }

  const reviews = [...h.reviews].sort((a,b)=> new Date(b.wedding_date)-new Date(a.wedding_date) || new Date(b.created_at)-new Date(a.created_at));
  const latest = reviews[0];
  const recentVisit = reviews.length ? fmtDate(reviews[0].wedding_date) : '-';

  let html = `<button class="back-btn" onclick="backToList()">‹ 목록으로</button>`;
  html += `<div class="detail-header">
    <div class="detail-venue">${escapeHtml(v.venue_name)}</div>
    <div class="detail-hall">${escapeHtml(h.hall_name)}</div>
    ${v.address?`<div class="detail-addr">📍 ${escapeHtml(v.address)}</div>`:''}
    <div class="detail-stats">
      <div class="detail-stat">누적 리뷰 <b>${reviews.length}건</b></div>
      <div class="detail-stat">최근 방문 <b>${recentVisit}</b></div>
      <div class="detail-stat">최근 작성자 <b>${latest?escapeHtml(latest.reviewer_name):'-'}</b></div>
    </div>
    ${latest && latest.recent_change ? `<div class="recent-change-banner">🔄 <div><b>최근 변경됨</b><br>${escapeHtml(latest.recent_change)}</div></div>` : ''}
  </div>`;

  if(latest){
    SUMMARY_GROUPS.forEach((g,gi)=>{
      const items = g.ids.filter(id=> hasValue(latest[id]));
      if(items.length===0) return;
      html += `
      <div class="sec-block">
        <div class="sec-block-head" onclick="toggleSecBlock('sum-${gi}')">
          <div class="sec-block-title">${g.title}</div>
          <div class="sec-block-arrow open" id="sum-${gi}-arrow">▶</div>
        </div>
        <div class="sec-block-body open" id="sum-${gi}-body">
          <div class="sec-block-inner">
            <div class="info-grid2">
              ${items.map(id=>`<div class="info-item"><div class="lbl">${fieldLabel(id)}</div><div class="val">${formatFieldValue(id, latest[id])}</div></div>`).join('')}
            </div>
          </div>
        </div>
      </div>`;
    });
  }

  html += `<div class="sec-header" style="margin:18px 0 10px"><h2 style="font-size:15px;font-weight:800">리뷰 이력 (${reviews.length}건)</h2></div>`;

  if(reviews.length===0){
    html += `<div class="empty-state">아직 등록된 리뷰가 없습니다.</div>`;
  }else{
    const shown = reviews.slice(0, visibleReviewCount);
    html += shown.map(r=>renderReviewCard(r)).join('');
    if(reviews.length > visibleReviewCount){
      html += `<button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="visibleReviewCount+=10;renderDetail()">더보기 (${reviews.length-visibleReviewCount}건 더)</button>`;
    }
  }

  dw.innerHTML = html;
}
function toggleSecBlock(id){
  const body = document.getElementById(id+'-body');
  const arrow = document.getElementById(id+'-arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}
function renderReviewCard(r){
  const canEdit = currentUser.isAdmin || r.reviewer_name===currentUser.name;
  const chipIds = ['operation_difficulty','mobile_data_status','wifi_status','reception_table_count','outlet_status','ticket_stamp'];
  return `
  <div class="review-card">
    <div class="review-card-top">
      <div>
        <div class="review-date">${fmtDate(r.wedding_date)}</div>
        <div class="review-meta">작성자 ${escapeHtml(r.reviewer_name)} · 등록일 ${fmtDate(r.created_at)}</div>
      </div>
      ${canEdit?`<div class="review-actions">
        <button class="icon-btn" onclick="startEditReview(${r.id})">수정</button>
        <button class="icon-btn danger" onclick="openDeleteModal(${r.id})">삭제</button>
      </div>`:''}
    </div>
    <div class="review-chips">
      ${chipIds.filter(id=>hasValue(r[id])).map(id=>`<span class="mini-chip">${fieldLabel(id)}: ${formatFieldValue(id,r[id])}</span>`).join('')}
    </div>
    ${r.manager_tip?`<div class="review-note"><div class="review-note-label">💡 다음 담당자 참고사항</div>${escapeHtml(r.manager_tip)}</div>`:''}
    ${r.recent_change?`<div class="review-note"><div class="review-note-label">🔄 최근 변경사항</div>${escapeHtml(r.recent_change)}</div>`:''}
  </div>`;
}

// ═══════════ HELPERS ═══════════
function hasValue(v){ if(v===null||v===undefined) return false; if(Array.isArray(v)) return v.length>0; return String(v).trim().length>0; }
function formatFieldValue(id, val){
  if(Array.isArray(val)) return val.map(escapeHtml).join(', ');
  if(val===null || val===undefined) return '-';
  return escapeHtml(String(val));
}
function fmtDate(d){
  if(!d) return '-';
  const dt = new Date(d);
  if(isNaN(dt)) return String(d);
  return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
}
function escapeHtml(s){
  return String(s??'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display='block';
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=>{ t.style.display='none'; }, 2400);
}

// ═══════════ WRITE FORM ═══════════
function blankFormState(){
  const s = { wedding_date: todayStr(), schedule_id: null };
  FIELD_SCHEMA.forEach(f=>{
    if(f.type==='chip-multi') s[f.id]=[];
    else s[f.id]='';
  });
  return s;
}
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderWriteForm(prefill){
  formState = blankFormState();
  selectedVenueObj = null;
  selectedHallObj = null;
  editingReviewId = (prefill && prefill.editId) || null;

  if(prefill){
    if(prefill.venueName){
      const v = venuesData.find(x=>x.venue_name===prefill.venueName);
      selectedVenueObj = v ? {id:v.id, venue_name:v.venue_name, address:v.address} : {name:prefill.venueName};
    }
    if(prefill.hallName && selectedVenueObj && selectedVenueObj.id){
      const v = venuesData.find(x=>x.id===selectedVenueObj.id);
      const h = v && v.halls.find(x=>x.hall_name===prefill.hallName);
      selectedHallObj = h ? {id:h.id, hall_name:h.hall_name} : {name:prefill.hallName};
    }else if(prefill.hallName){
      selectedHallObj = {name:prefill.hallName};
    }
    if(prefill.date) formState.wedding_date = prefill.date;
    if(prefill.reviewerName) formState.reviewer_name = prefill.reviewerName;
    if(prefill.scheduleId) formState.schedule_id = prefill.scheduleId;
    if(prefill.reviewData) Object.assign(formState, prefill.reviewData);
  }

  const wrap = document.getElementById('write-form');
  wrap.innerHTML = buildFormHtml();
  bindFormEvents();
  formDirty = false;
}

function buildFieldHtml(f){
  const showIf = f.showIf ? f.showIf(formState) : true;
  const style = showIf ? '' : 'display:none';
  let inner = '';
  if(f.type==='chip'){
    const val = formState[f.id] || '';
    const isOtherSelected = f.other && val && !f.options.includes(val) ;
    const activeOption = f.other && isOtherSelected ? f.other : val;
    inner = `<div class="chip-group" id="chips-${f.id}">
      ${f.options.map(o=>`<button type="button" class="chip ${activeOption===o?'active':''}" data-field="${f.id}" data-val="${escapeHtml(o)}" onclick="selectChip('${f.id}','${escapeHtml(o).replace(/'/g,"\\'")}')">${escapeHtml(o)}</button>`).join('')}
    </div>`;
    if(f.other){
      const otherShown = activeOption===f.other;
      const otherVal = isOtherSelected ? val : '';
      inner += `<div class="chip-sub-input" id="chipsub-${f.id}" style="${otherShown?'':'display:none'}">
        <input type="text" class="field-input" id="chipother-${f.id}" placeholder="${f.otherPlaceholder||'상세 입력'}" value="${escapeHtml(otherVal)}">
      </div>`;
    }
  }else if(f.type==='chip-multi'){
    const arr = formState[f.id] || [];
    inner = `<div class="chip-group" id="chips-${f.id}">
      ${f.options.map(o=>`<button type="button" class="chip ${arr.includes(o)?'active':''}" data-field="${f.id}" data-val="${escapeHtml(o)}" onclick="toggleChipMulti('${f.id}','${escapeHtml(o).replace(/'/g,"\\'")}')">${escapeHtml(o)}</button>`).join('')}
    </div>`;
    if(f.other){
      const otherShown = arr.some(v=> v===f.other || (!f.options.includes(v)));
      inner += `<div class="chip-sub-input" id="chipsub-${f.id}" style="${otherShown?'':'display:none'}">
        <input type="text" class="field-input" id="chipother-${f.id}" placeholder="${f.otherPlaceholder||'상세 입력'}">
      </div>`;
    }
  }else if(f.type==='textarea'){
    inner = `<textarea class="field-input" id="f-${f.id}" placeholder="${f.placeholder||''}">${escapeHtml(formState[f.id]||'')}</textarea>`;
  }else{
    inner = `<input type="text" class="field-input" id="f-${f.id}" placeholder="${f.placeholder||''}" value="${escapeHtml(formState[f.id]||'')}">`;
  }
  return `<div class="field" id="f-wrap-${f.id}" style="${style}">
    <div class="field-label">${f.label} ${f.required?'<span class="req">*</span>':''}</div>
    ${inner}
    ${f.hint?`<div class="field-hint">${f.hint}</div>`:''}
  </div>`;
}

function toggleFormSec(sec){
  document.getElementById(`fsec-${sec}-body`).classList.toggle('open');
  document.getElementById(`fsec-${sec}-arrow`).classList.toggle('open');
}

function selectChip(fieldId, val){
  formState[fieldId] = val;
  formDirty = true;
  refreshDependentFields();
  rerenderField(fieldId);
}
function toggleChipMulti(fieldId, val){
  const arr = formState[fieldId] || [];
  const idx = arr.indexOf(val);
  if(idx>=0) arr.splice(idx,1); else arr.push(val);
  formState[fieldId] = arr;
  formDirty = true;
  rerenderField(fieldId);
}
function rerenderField(fieldId){
  const f = fieldById(fieldId);
  const wrap = document.getElementById(`f-wrap-${fieldId}`);
  if(!wrap) return;
  const showIf = f.showIf ? f.showIf(formState) : true;
  const tmp = document.createElement('div');
  tmp.innerHTML = buildFieldHtml(f);
  wrap.innerHTML = tmp.firstElementChild.innerHTML;
  wrap.style.display = showIf ? '' : 'none';
}
function refreshDependentFields(){
  FIELD_SCHEMA.filter(f=>f.showIf).forEach(f=>{
    const wrap = document.getElementById(`f-wrap-${f.id}`);
    if(!wrap) return;
    const show = f.showIf(formState);
    wrap.style.display = show ? '' : 'none';
  });
}

// 폼 내부의 텍스트/기타 입력은 위임(delegation) 방식으로 한 번만 바인딩 (재렌더링 시 중복 방지)
document.addEventListener('input', function(e){
  const id = e.target && e.target.id;
  if(!id) return;
  if(id.startsWith('chipother-')){
    const fieldId = id.slice('chipother-'.length);
    const f = fieldById(fieldId);
    if(!f) return;
    if(f.type==='chip-multi'){
      const arr = (formState[fieldId]||[]).filter(v=>v!==f.other && f.options.includes(v));
      if(e.target.value.trim()) arr.push(e.target.value.trim()); else arr.push(f.other);
      formState[fieldId] = [...new Set(arr)];
    }else{
      formState[fieldId] = e.target.value.trim() || f.other;
    }
    formDirty = true;
  }else if(id.startsWith('f-')){
    const fieldId = id.slice('f-'.length);
    const f = fieldById(fieldId);
    if(f && (f.type==='text' || f.type==='textarea')){
      formState[fieldId] = e.target.value;
      formDirty = true;
    }
  }
});

function bindFormEvents(){
  document.getElementById('f-wedding_date').addEventListener('input', e=>{ formState.wedding_date = e.target.value; formDirty=true; });
  document.getElementById('f-reviewer_name').addEventListener('change', e=>{ formState.reviewer_name = e.target.value; formDirty=true; });
  if(formState.reviewer_name===undefined) formState.reviewer_name = document.getElementById('f-reviewer_name').value;

  // 예식장 자동완성
  const venueInput = document.getElementById('f-venue_name');
  venueInput.addEventListener('input', ()=>{
    formDirty = true;
    selectedVenueObj = null;
    selectedHallObj = null;
    document.getElementById('f-hall_name').value = '';
    renderVenueAc(venueInput.value);
  });
  venueInput.addEventListener('focus', ()=> renderVenueAc(venueInput.value));

  const hallInput = document.getElementById('f-hall_name');
  hallInput.addEventListener('input', ()=>{ formDirty = true; selectedHallObj=null; renderHallAc(hallInput.value); });
  hallInput.addEventListener('focus', ()=> renderHallAc(hallInput.value));

  document.addEventListener('click', (e)=>{
    if(!e.target.closest('.autocomplete-wrap')){
      document.getElementById('ac-venue').classList.remove('open');
      document.getElementById('ac-hall').classList.remove('open');
    }
  });

  window.addEventListener('beforeunload', beforeUnloadHandler);
}

function beforeUnloadHandler(e){
  if(formDirty){ e.preventDefault(); e.returnValue=''; }
}

function renderVenueAc(q){
  q = (q||'').trim().toLowerCase();
  const list = document.getElementById('ac-venue');
  let matches = venuesData.filter(v=> !q || v.venue_name.toLowerCase().includes(q));
  let html = matches.slice(0,8).map(v=>`
    <div class="ac-item" onclick="pickVenue(${v.id})">${escapeHtml(v.venue_name)}${v.address?`<div class="ac-sub">${escapeHtml(v.address)}</div>`:''}</div>`).join('');
  if(q && !matches.some(v=>v.venue_name===q.trim())){
    html += `<div class="ac-item ac-new" onclick="pickNewVenue()">＋ '${escapeHtml(document.getElementById('f-venue_name').value)}' 신규 예식장으로 등록</div>`;
  }
  list.innerHTML = html;
  list.classList.toggle('open', html.length>0);
}
function pickVenue(id){
  const v = venuesData.find(x=>x.id===id);
  selectedVenueObj = {id:v.id, venue_name:v.venue_name, address:v.address};
  document.getElementById('f-venue_name').value = v.venue_name;
  document.getElementById('ac-venue').classList.remove('open');
  document.getElementById('f-hall_name').value='';
  selectedHallObj = null;
  formDirty = true;
}
function pickNewVenue(){
  const name = document.getElementById('f-venue_name').value.trim();
  selectedVenueObj = { name };
  document.getElementById('ac-venue').classList.remove('open');
  formDirty = true;
}
function renderHallAc(q){
  q = (q||'').trim().toLowerCase();
  const list = document.getElementById('ac-hall');
  let halls = [];
  if(selectedVenueObj && selectedVenueObj.id){
    const v = venuesData.find(x=>x.id===selectedVenueObj.id);
    halls = v ? v.halls : [];
  }
  let matches = halls.filter(h=> !q || h.hall_name.toLowerCase().includes(q));
  let html = matches.slice(0,8).map(h=>`<div class="ac-item" onclick="pickHall(${h.id})">${escapeHtml(h.hall_name)}<div class="ac-sub">리뷰 ${h.reviews.length}건</div></div>`).join('');
  if(q){
    html += `<div class="ac-item ac-new" onclick="pickNewHall()">＋ '${escapeHtml(document.getElementById('f-hall_name').value)}' 신규 홀로 등록</div>`;
  }
  list.innerHTML = html;
  list.classList.toggle('open', html.length>0);
}
function pickHall(id){
  const v = venuesData.find(x=>x.id===selectedVenueObj.id);
  const h = v.halls.find(x=>x.id===id);
  selectedHallObj = {id:h.id, hall_name:h.hall_name};
  document.getElementById('f-hall_name').value = h.hall_name;
  document.getElementById('ac-hall').classList.remove('open');
  formDirty = true;
}
function pickNewHall(){
  const name = document.getElementById('f-hall_name').value.trim();
  selectedHallObj = { name };
  document.getElementById('ac-hall').classList.remove('open');
  formDirty = true;
}

// ═══════════ 내 담당 예식 불러오기 (index.html의 schedules 테이블 재사용) ═══════════
// 확인된 실제 컬럼: id, date, hall(예식장 업체명 — 홀명은 별도 컬럼 없음), front_manager, back_manager, groom_name, bride_name
let mySchedulesCache = null;

async function loadMySchedules(){
  if(mySchedulesCache) return mySchedulesCache;
  const name = encodeURIComponent(currentUser.name);
  const rows = await sb.get('schedules',
    `?or=(front_manager.ilike.*${name}*,back_manager.ilike.*${name}*)&select=id,date,hall,groom_name,bride_name,front_manager,back_manager&order=date.asc`);
  mySchedulesCache = rows;
  return rows;
}

function scheduleCoupleLabel(s){
  if(s.bride_name) return `${s.bride_name} 신부님`;
  if(s.groom_name) return `${s.groom_name} 신랑님`;
  return '이름 미상';
}
function scheduleDateLabel(d){
  if(!d) return '-';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return `${dt.getMonth()+1}월 ${dt.getDate()}일`;
}

async function toggleSchedulePicker(){
  const box = document.getElementById('schedule-picker-list');
  if(box.style.display !== 'none'){ box.style.display = 'none'; return; }
  box.style.display = 'block';
  box.innerHTML = `<div class="field-hint">불러오는 중...</div>`;
  try{
    const rows = await loadMySchedules();
    const today = new Date(); today.setHours(0,0,0,0);
    const sevenDaysAgo = new Date(today); sevenDaysAgo.setDate(today.getDate()-7);
    const filtered = rows.filter(s=>{
      if(!s.date) return false;
      const d = new Date(s.date);
      return d >= sevenDaysAgo; // 지난 7일 + 이후 예정 전체
    });
    filtered.sort((a,b)=> Math.abs(new Date(a.date)-today) - Math.abs(new Date(b.date)-today));

    if(filtered.length===0){
      box.innerHTML = `<div class="field-hint">최근 7일 이내 또는 예정된 담당 예식이 없습니다.</div>`;
      return;
    }
    box.innerHTML = filtered.map(s=>{
      const reviewed = allReviews.some(r=> r.schedule_id===s.id);
      return `
      <div class="ac-item" style="border-radius:10px;border:1px solid #E5E7EB;margin-bottom:6px" onclick="pickSchedule(${s.id})">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700">${scheduleDateLabel(s.date)} ${escapeHtml(scheduleCoupleLabel(s))}</div>
            <div class="ac-sub">${escapeHtml(s.hall||'예식장 미입력')}</div>
          </div>
          ${reviewed?'<span class="mini-chip" style="background:#ECFDF5;color:#10B981;border-color:#A7F3D0">리뷰 작성 완료</span>':''}
        </div>
      </div>`;
    }).join('');
  }catch(e){
    console.error(e);
    box.innerHTML = `<div class="field-hint">담당 예식을 불러오지 못했습니다.</div>`;
  }
}

async function pickSchedule(scheduleId){
  const rows = await loadMySchedules();
  const s = rows.find(x=>x.id===scheduleId);
  if(!s) return;

  formState.reviewer_name = currentUser.name;
  formState.wedding_date = s.date;
  formState.schedule_id = s.id;

  document.getElementById('f-reviewer_name').value = currentUser.name;
  document.getElementById('f-wedding_date').value = s.date;

  if(s.hall){
    const v = venuesData.find(x=>x.venue_name===s.hall);
    selectedVenueObj = v ? {id:v.id, venue_name:v.venue_name, address:v.address} : {name:s.hall};
    document.getElementById('f-venue_name').value = s.hall;
  }
  // 홀명은 schedules 테이블에 별도 컬럼이 없어 자동 입력할 수 없습니다 — 직접 선택/입력해주세요.
  selectedHallObj = null;
  document.getElementById('f-hall_name').value = '';

  document.getElementById('schedule-picker-list').style.display = 'none';
  formDirty = true;
  showToast('담당 예식 정보를 불러왔습니다. 홀명은 직접 선택해주세요.');
}

// ═══════════ VALIDATION & SUBMIT ═══════════
const BASE_REQUIRED = [
  {id:'reviewer_name', label:'작성자'},
  {id:'wedding_date', label:'예식일'},
  {id:'venue_name', label:'예식장명'},
  {id:'hall_name', label:'홀명'},
];

function collectFormValues(){
  formState.reviewer_name = document.getElementById('f-reviewer_name').value;
  formState.wedding_date = document.getElementById('f-wedding_date').value;
  const venueName = document.getElementById('f-venue_name').value.trim();
  const hallName = document.getElementById('f-hall_name').value.trim();
  FIELD_SCHEMA.forEach(f=>{
    if(f.type==='text' || f.type==='textarea'){
      const el = document.getElementById(`f-${f.id}`);
      if(el) formState[f.id] = el.value;
    }
  });
  return { venueName, hallName };
}

function validateForm(){
  const missing = [];
  const {venueName, hallName} = collectFormValues();
  if(!formState.reviewer_name) missing.push('f-wrap-reviewer_name');
  if(!formState.wedding_date) missing.push('f-wrap-wedding_date');
  if(!venueName) missing.push('f-wrap-venue_name');
  if(!hallName) missing.push('f-wrap-hall_name');
  FIELD_SCHEMA.forEach(f=>{
    if(!f.required) return;
    const showIf = f.showIf ? f.showIf(formState) : true;
    if(!showIf) return;
    const val = formState[f.id];
    const empty = f.type==='chip-multi' ? (!val || val.length===0) : !hasValue(val);
    if(empty) missing.push(`f-wrap-${f.id}`);
  });
  document.querySelectorAll('.field.missing').forEach(el=>el.classList.remove('missing'));
  missing.forEach(id=> document.getElementById(id)?.classList.add('missing'));
  if(missing.length>0){
    document.getElementById(missing[0]).scrollIntoView({behavior:'smooth', block:'center'});
    showToast('필수 항목을 입력해주세요.');
    return false;
  }
  return true;
}

let isSubmitting = false;
async function submitReview(){
  if(isSubmitting) return;
  if(!validateForm()) return;
  isSubmitting = true;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  try{
    const {venueName, hallName} = collectFormValues();

    // 1) venue 확보 (기존 선택 or 신규 생성 or 이름 매칭)
    let venueId = selectedVenueObj && selectedVenueObj.id;
    if(!venueId){
      const existing = venuesData.find(v=> v.venue_name.trim()===venueName);
      if(existing){
        venueId = existing.id;
      }else{
        const created = await sb.post('wedding_venues', { venue_name: venueName });
        venueId = created[0].id;
      }
    }

    // 2) hall 확보
    let hallId = selectedHallObj && selectedHallObj.id;
    if(!hallId){
      const vObj = venuesData.find(v=>v.id===venueId);
      const existingHall = vObj && vObj.halls.find(h=>h.hall_name.trim()===hallName);
      if(existingHall){
        hallId = existingHall.id;
      }else{
        const createdHall = await sb.post('wedding_venue_halls', { venue_id: venueId, hall_name: hallName });
        hallId = createdHall[0].id;
      }
    }

    // 3) review payload
    const payload = { venue_id: venueId, hall_id: hallId, wedding_date: formState.wedding_date,
      reviewer_name: formState.reviewer_name, reviewer_code: currentUser.id,
      schedule_id: formState.schedule_id || null };
    FIELD_SCHEMA.forEach(f=>{
      payload[f.id] = formState[f.id]==='' ? null : formState[f.id];
    });

    if(editingReviewId){
      await sb.patch('wedding_venue_reviews', editingReviewId, payload);
      showToast('리뷰가 수정되었습니다.');
    }else{
      await sb.post('wedding_venue_reviews', payload);
      showToast('리뷰가 등록되었습니다.');
    }

    formDirty = false;
    window.removeEventListener('beforeunload', beforeUnloadHandler);
    await loadAllData();
    editingReviewId = null;
    currentDetail = { venueId, hallId };
    document.getElementById('write-form').innerHTML='';
    switchMainTab('view');
    openDetail(venueId, hallId);
  }catch(e){
    console.error(e);
    showToast('저장 중 오류가 발생했습니다.');
  }finally{
    isSubmitting = false;
    if(btn){ btn.disabled=false; btn.textContent = editingReviewId?'리뷰 수정 저장':'리뷰 등록'; }
  }
}

function startEditReview(reviewId){
  const r = allReviews.find(x=>x.id===reviewId) || venuesData.flatMap(v=>v.halls).flatMap(h=>h.reviews).find(x=>x.id===reviewId);
  if(!r) return;
  const v = venuesData.find(x=>x.id===r.venue_id);
  const h = v && v.halls.find(x=>x.id===r.hall_id);
  switchMainTab('write');
  renderWriteForm({
    editId: reviewId,
    venueName: v ? v.venue_name : '',
    hallName: h ? h.hall_name : '',
    date: r.wedding_date,
    reviewData: { ...r }
  });
}

// ═══════════ DELETE ═══════════
function openDeleteModal(reviewId){
  deleteTargetId = reviewId;
  document.getElementById('delete-modal').classList.remove('hidden');
}
function closeDeleteModal(){
  deleteTargetId = null;
  document.getElementById('delete-modal').classList.add('hidden');
}
async function confirmDeleteReview(){
  if(!deleteTargetId) return;
  try{
    await sb.delete('wedding_venue_reviews', deleteTargetId);
    showToast('리뷰가 삭제되었습니다.');
    closeDeleteModal();
    await loadAllData();
    renderDetail();
  }catch(e){
    console.error(e);
    showToast('삭제 중 오류가 발생했습니다.');
  }
}

// ═══════════ LEAVE WARNING ═══════════
function closeLeaveModal(){ document.getElementById('leave-modal').classList.add('hidden'); pendingLeaveAction=null; }
function confirmLeave(){
  document.getElementById('leave-modal').classList.add('hidden');
  formDirty = false;
  window.removeEventListener('beforeunload', beforeUnloadHandler);
  if(pendingLeaveAction) pendingLeaveAction();
  pendingLeaveAction = null;
}

// ═══════════ URL PARAMS (index.html 연동용) ═══════════
async function handleUrlParams(){
  const p = new URLSearchParams(location.search);
  const mode = p.get('mode');
  const venue = p.get('venue');
  const hall = p.get('hall');
  const date = p.get('date');
  const scheduleIdParam = p.get('schedule_id');

  if(mode==='view' && venue){
    const v = venuesData.find(x=>x.venue_name===venue);
    if(v){
      const h = hall ? v.halls.find(x=>x.hall_name===hall) : v.halls[0];
      if(h){ openDetail(v.id, h.id); return; }
    }
    showToast('해당 예식장/홀 정보를 찾을 수 없습니다.');
  }else if(mode==='write' && scheduleIdParam){
    switchMainTab('write');
    try{
      const rows = await sb.get('schedules', `?id=eq.${Number(scheduleIdParam)}&select=id,date,hall,groom_name,bride_name`);
      const s = rows[0];
      if(s){
        renderWriteForm({
          venueName: s.hall || '',
          date: s.date || undefined,
          reviewerName: currentUser.name,
          scheduleId: s.id
        });
        showToast('담당 예식 정보를 불러왔습니다. 홀명은 직접 선택해주세요.');
      }else{
        showToast('해당 일정을 찾을 수 없습니다.');
        renderWriteForm();
      }
    }catch(e){
      console.error(e);
      showToast('일정 조회 중 오류가 발생했습니다.');
      renderWriteForm();
    }
  }else if(mode==='write'){
    switchMainTab('write');
    renderWriteForm({ venueName: venue||'', hallName: hall||'', date: date||undefined });
  }
}

// ═══════════ START ═══════════
init();

</script>
